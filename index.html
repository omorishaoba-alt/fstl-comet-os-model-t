<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FSTL COMET OS</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:#fff;
}

.card{
  background:#111c2e;
  padding:14px;
  margin:10px;
  border-radius:12px;
}

button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#1e88e5;
  color:#fff;
  font-weight:bold;
}

select,input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
  background:#152238;
  color:#fff;
}

.small{font-size:12px;color:#9fb3c8}
.badge{padding:6px 10px;border-radius:8px;font-weight:bold;display:inline-block}
.green{background:#2e7d32}
.orange{background:#f9a825}
.red{background:#c62828}
</style>
</head>

<body>

<div class="card">
<b>COMET OS Assistant</b><br>
<span class="small">
We help structure transaction and identity information clearly and consistently.
</span>
</div>

<div class="card">
<b>Current Case Summary</b>
<div id="summary">No data captured yet.</div>
</div>

<div class="card" id="questionCard">
<div id="questionText"></div>

<select id="dropdown"></select>
<input id="textInput" style="display:none"/>

<div class="small" id="whyText"></div>

<button onclick="nextStep()">Continue</button>
</div>

<div class="card" id="resultCard" style="display:none">
<div id="result"></div>
</div>

<script>

/* ================= STATE ================= */

let step = 0;

let data = {};

const flow = [

{
key:"role",
q:"Who are you in this transaction?",
type:"select",
options:["Owner","Buyer","Seller","Agent","Executor"],
why:"Defines your role in the transaction structure"
},

{
key:"transaction",
q:"What type of transaction is this?",
type:"select",
options:["Sale","Probate","Transfer","Mortgage"],
why:"Defines transaction context for consistency rules"
},

{
key:"structure",
q:"How is this transaction arranged?",
type:"select",
options:["Direct","Indirect (via agent)"],
why:"Defines relationship between parties"
},

{
key:"owner",
q:"Enter Owner Name",
type:"text",
why:"Establishes ownership identity reference"
},

{
key:"seller",
q:"Enter Seller Name",
type:"text",
why:"Defines selling party identity"
},

{
key:"buyer",
q:"Enter Buyer Name",
type:"text",
why:"Defines receiving party identity"
},

{
key:"kyc_name",
q:"KYC Name (Person completing this)",
type:"text",
why:"Identity of user completing structured input"
},

{
key:"kyc_idType",
q:"Select ID Type",
type:"select",
options:["NIN","BVN","PASSPORT","DRIVERS_LICENSE"],
why:"Standard identity classification"
},

{
key:"kyc_capacity",
q:"Select Capacity",
type:"select",
options:["OWNER","BUYER","SELLER","AGENT","EXECUTOR","ADMINISTRATOR"],
why:"Defines legal/transactional capacity context"
}

];

/* ================= RENDER ================= */

function renderStep(){

let f = flow[step];

document.getElementById("questionText").innerText = f.q;
document.getElementById("whyText").innerText = f.why;

let dd = document.getElementById("dropdown");
let inp = document.getElementById("textInput");

dd.innerHTML = "";

if(f.type === "select"){
  dd.style.display = "block";
  inp.style.display = "none";

  f.options.forEach(o=>{
    let opt = document.createElement("option");
    opt.text = o;
    dd.add(opt);
  });

}else{
  dd.style.display = "none";
  inp.style.display = "block";
  inp.value = "";
}
}

/* ================= NEXT ================= */

function nextStep(){

let f = flow[step];

let value = (f.type === "select")
  ? document.getElementById("dropdown").value
  : document.getElementById("textInput").value.trim();

if(!value){
  alert("Please provide an answer");
  return;
}

data[f.key] = value;

/* LIVE SUMMARY */
document.getElementById("summary").innerHTML =
Object.entries(data)
.map(([k,v])=>`- ${k}: ${v}`)
.join("<br>");

step++;

if(step < flow.length){
  renderStep();
}else{
  runEngine();
}
}

/* ================= ENGINE ================= */

function norm(s){
return (s||"").toLowerCase().replace(/[^a-z0-9]/g,"");
}

function runEngine(){

let flags = [];
let score = 0;

function add(msg, w){
flags.push({msg,w});
score += w;
}

/* Identity checks */
if(!data.owner) add("Missing Owner",2);
if(!data.seller) add("Missing Seller",2);
if(!data.buyer && data.transaction !== "PROBATE") add("Missing Buyer",2);

/* Role conflicts */
if(data.owner && data.buyer && norm(data.owner) === norm(data.buyer)){
add("Owner = Buyer identity overlap",3);
}

if(data.buyer && data.seller && norm(data.buyer) === norm(data.seller)){
add("Buyer = Seller identity overlap",3);
}

/* Structure logic */
if(data.structure === "DIRECT" && data.agent1){
add("Agent present in DIRECT transaction",2);
}

if(data.structure === "INDIRECT" && !data.agent1){
add("Missing agent in INDIRECT transaction",3);
}

/* KYC validation */
if(!data.kyc_name) add("Missing KYC Name",2);
if(!data.kyc_idType) add("Missing ID Type",2);
if(!data.kyc_capacity) add("Missing Capacity",2);

/* Classification */
let level = "CLEAN";
let color = "green";

if(score >= 8){
level = "RED FLAGS";
color = "red";
}else if(score >= 3){
level = "WATCH";
color = "orange";
}

/* Output */
document.getElementById("resultCard").style.display = "block";

document.getElementById("result").innerHTML =
`<span class="badge ${color}">${level}</span><br><br>
Score: ${score}<br><br>
${flags.length ?
flags.map(f=>`- ${f.msg}`).join("<br>")
: "No inconsistencies detected"}`;
}

/* ================= INIT ================= */

renderStep();

</script>

</body>
</html>
