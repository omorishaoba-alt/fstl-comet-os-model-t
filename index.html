<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FSTL COMET OS</title>

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  width:100%;
  overflow:hidden;
  font-family:Arial;
  background:#0b1220;
  color:#fff;
}

.app{
  height:100vh;
  display:flex;
  flex-direction:column;
}

.scroll{
  flex:1;
  overflow-y:auto;
  overflow-x:hidden;
}

.card{
  background:#111c2e;
  padding:14px;
  margin:10px;
  border-radius:12px;
  box-sizing:border-box;
}

button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#1e88e5;
  color:#fff;
  font-weight:bold;
}

select,input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
  background:#152238;
  color:#fff;
  box-sizing:border-box;
}

.small{font-size:12px;color:#9fb3c8}

.badge{
  padding:6px 10px;
  border-radius:8px;
  font-weight:bold;
  display:inline-block;
}

.green{background:#2e7d32}
.orange{background:#f9a825}
.red{background:#c62828}

.fixed-result{
  position:sticky;
  bottom:0;
  background:#0b1220;
  padding:10px;
  border-top:1px solid #1e2a3a;
}
</style>
</head>

<body>

<div class="app">

<div class="scroll">

<div class="card">
<b>COMET OS Assistant</b><br>
<span class="small">Structured identity + transaction intelligence system</span>
</div>

<div class="card">
<b>Case Summary</b>
<div id="summary">No data captured yet.</div>
</div>

<div class="card" id="questionCard">

<div id="questionText"></div>

<select id="dropdown"></select>
<input id="textInput" style="display:none"/>

<div class="small" id="whyText"></div>

<button onclick="nextStep()">Continue</button>

</div>

<div class="card" id="resultCard" style="display:none">
<div id="result"></div>
</div>

</div>

</div>

<script>

/* ================= STATE MACHINE ================= */

let step = 0;
let data = {};
let mode = "FLOW";

/* ================= FLOW ================= */

const flow = [

{
key:"role",
q:"Who are you in this transaction?",
type:"select",
options:["Owner","Buyer","Seller","Agent","Executor"],
why:"Defines role context"
},

{
key:"transaction",
q:"What type of transaction is this?",
type:"select",
options:["Sale","Probate","Transfer","Mortgage"],
why:"Defines transaction type"
},

{
key:"structure",
q:"Direct or Indirect transaction?",
type:"select",
options:["Direct","Indirect"],
why:"Defines linkage model"
},

{
key:"owner",
q:"Enter Owner Name",
type:"text",
why:"Ownership identity"
},

{
key:"seller",
q:"Enter Seller Name",
type:"text",
why:"Seller identity"
},

{
key:"buyer",
q:"Enter Buyer Name",
type:"text",
why:"Buyer identity"
},

{
key:"agent_status",
q:"Is an Agent involved?",
type:"select",
options:["NO AGENT","AGENT INVOLVED"],
why:"Determines intermediary presence"
},

{
key:"agent_name",
q:"Select Agent Name (if applicable)",
type:"select",
options:["N/A","Agent A","Agent B","Agent C","Other"],
why:"Agent identity (controlled state)"
},

{
key:"kyc_name",
q:"KYC Name",
type:"text",
why:"User identity anchor"
},

{
key:"kyc_idType",
q:"Select ID Type",
type:"select",
options:["NIN","BVN","PASSPORT","DRIVERS_LICENSE"],
why:"Identity classification"
},

{
key:"kyc_capacity",
q:"Select Capacity",
type:"select",
options:["OWNER","BUYER","SELLER","AGENT","EXECUTOR","ADMINISTRATOR"],
why:"Legal role classification"
}

];

/* ================= UTILS ================= */

function clean(v){
if(!v) return "";
v = v.trim().toUpperCase();
if(v === "NONE" || v === "N/A") return "";
return v;
}

function norm(s){
return (s||"").toLowerCase().replace(/[^a-z0-9]/g,"");
}

/* ================= RENDER ================= */

function renderStep(){

let f = flow[step];

document.getElementById("questionText").innerText = f.q;
document.getElementById("whyText").innerText = f.why;

let dd = document.getElementById("dropdown");
let inp = document.getElementById("textInput");

dd.innerHTML = "";

if(f.type === "select"){
  dd.style.display = "block";
  inp.style.display = "none";

  f.options.forEach(o=>{
    let opt = document.createElement("option");
    opt.value = o;
    opt.text = o;
    dd.appendChild(opt);
  });

  dd.selectedIndex = 0;

}else{
  dd.style.display = "none";
  inp.style.display = "block";
  inp.value = "";
}
}

/* ================= FLOW CONTROL ================= */

function nextStep(){

if(mode !== "FLOW") return;

let f = flow[step];

let value = (f.type === "select")
  ? document.getElementById("dropdown").value
  : document.getElementById("textInput").value.trim();

data[f.key] = clean(value);

/* summary */
document.getElementById("summary").innerHTML =
Object.entries(data)
.map(([k,v])=>`- ${k}: ${v || "❌ EMPTY"}`)
.join("<br>");

step++;

/* FLOW END */
if(step >= flow.length){
  runEngine();
  return;
}

renderStep();
}

/* ================= ENGINE ================= */

function runEngine(){

mode = "RESULT";

/* LOCK UI */
document.getElementById("questionCard").style.display = "none";

/* AGENT LOGIC (CONTROLLED STATE) */
const hasAgent =
data.agent_status === "AGENT INVOLVED" &&
data.agent_name &&
data.agent_name !== "N/A";

/* VALIDATION */
let flags = [];
let score = 0;

function add(m,w){ flags.push(m); score += w; }

if(!data.owner) add("Missing Owner",2);
if(!data.seller) add("Missing Seller",2);
if(!data.buyer && data.transaction !== "PROBATE") add("Missing Buyer",2);

/* conflicts */
if(data.owner && data.buyer &&
norm(data.owner) === norm(data.buyer)){
add("Owner = Buyer overlap",3);
}

if(data.buyer && data.seller &&
norm(data.buyer) === norm(data.seller)){
add("Buyer = Seller overlap",3);
}

/* structure logic */
if(data.structure === "Direct" && hasAgent){
add("Agent present in Direct transaction",2);
}

if(data.structure === "Indirect" && !hasAgent){
add("Missing agent in Indirect transaction",3);
}

/* KYC */
if(!data.kyc_name) add("Missing KYC Name",2);
if(!data.kyc_idType) add("Missing ID Type",2);
if(!data.kyc_capacity) add("Missing Capacity",2);

/* classification */
let level = "CLEAN";
let color = "green";

if(score >= 8){
level = "HIGH RISK";
color = "red";
}else if(score >= 3){
level = "WATCH";
color = "orange";
}

/* RESULT */
document.getElementById("resultCard").style.display = "block";

document.getElementById("result").innerHTML =
`<span class="badge ${color}">${level}</span><br><br>
Score: ${score}<br><br>
${flags.length ? flags.join("<br>") : "No inconsistencies detected"}`;

/* anchor */
document.getElementById("resultCard")
.scrollIntoView({behavior:"smooth"});
}

/* ================= INIT ================= */

renderStep();

</script>

</body>
</html>
