<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMET OS v10 FINAL</title>

<style>
html{font-size:20px}
body{margin:0;font-family:Arial;background:#0b2a4a;color:#fff;font-size:1rem;line-height:1.6}
.container{max-width:520px;margin:auto;padding:20px;text-align:center}

input,select,button{
  width:100%;
  padding:16px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  font-size:1.1rem;
}

button{
  background:#fff;
  color:#0b2a4a;
  font-weight:bold;
}

h2{font-size:1.6rem}
h3{font-size:1.3rem}

pre{
  white-space:pre-wrap;
  text-align:left;
  background:#062033;
  padding:12px;
  border-radius:10px;
  font-size:0.95rem;
}

.small{font-size:0.95rem;opacity:0.85}

hr{opacity:0.3}
</style>

<!-- QR + PDF ENGINE -->
<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>
<div class="container" id="app"></div>

<script>

/* ================= STATE ================= */

let state = {
  role:"",
  kyc:{},
  contract:{},
  payment:{},
  events:[],
  history: JSON.parse(localStorage.getItem("comet_history")||"[]")
};

let screen="cover";

/* ================= FSTL + BANK ================= */

const FSTL = {
  company:"First Standard Title Limited (FSTL)",
  address:"No. 19 Egbor Avenue, GRA, Benin City, Nigeria",
  phone:"+2358035888622",
  email:"fstlsite@gmail.com",
  role:"COMET OS Issuer & Verification Authority",
  function:"Identity, risk scoring, transaction structuring"
};

const BANK = {
  institution:"First Bank of Nigeria PLC",
  accountHolder:"First Standard Title Limited",
  settlementId:"FSTL-FBN-SETTLEMENT-001"
};

/* ================= HASH ================= */

async function hash(data){
  const buf = await crypto.subtle.digest("SHA-256",
    new TextEncoder().encode(JSON.stringify(data)));
  return [...new Uint8Array(buf)]
    .map(b=>b.toString(16).padStart(2,"0")).join("");
}

/* ================= LOG ================= */

async function log(step,val){
  let prev=state.events.length?state.events[state.events.length-1].hash:"GENESIS";
  let e={step,val,time:Date.now(),prev};
  e.hash=await hash(e);
  state.events.push(e);
}

/* ================= IDENTITY ================= */

function identityScore(k,role){
let score=0;

if(role==="TENANT"||role==="BUYER"||role==="LANDLORD"){
if(k.name) score+=10;
if(k.phone) score+=10;
if(k.bvn) score+=25;
if(k.nin) score+=25;
if(k.address) score+=10;
}

if(role==="AGENT"){
if(k.name) score+=10;
if(k.phone) score+=10;
if(k.bvn) score+=20;
if(k.nin) score+=20;
}

if(role==="INSTITUTION"){
if(k.rc) score+=30;
if(k.license) score+=30;
}

let level=score<30?"CRITICAL":score<50?"HIGH":score<70?"MEDIUM":"LOW";
return {score,level};
}

/* ================= TRIANGULATION ================= */

function triangulate(){
let score=100;
let flags=[];

if(!state.contract.asset){score-=20;flags.push("missing contract");}
if(!state.payment.amount){score-=20;flags.push("missing payment");}

if(state.contract.price && state.payment.amount &&
state.contract.price != state.payment.amount){
score-=20;flags.push("value mismatch");
}

if(state.payment.amount>100000000){
score-=20;flags.push("high value risk");
}

return {score,flags};
}

/* ================= TX (TRIANGLE GATE) ================= */

function generateTX(id){
let valid =
id.score>=30 &&
state.payment.amount &&
state.payment.ref &&
state.contract.asset;

if(!valid) return null;

return "TX-" + Date.now().toString(36).toUpperCase();
}

/* ================= QR ================= */

async function qr(text){
return await QRCode.toDataURL(text,{width:180,margin:1});
}

/* ================= FLOW ================= */

function render(){

let html="";

if(screen==="cover"){
html=`
<h2>COMET OS</h2>
<button onclick="go('intro')">ENTER</button>`;
}

if(screen==="intro"){
html=`
<h3>INTRODUCTION</h3>

<div class="small">
COMET OS is a structured verification system for identity, contract and transaction integrity.
</div>

<hr>

<div class="small" style="text-align:left">

<b>FSTL ISSUER</b><br><br>
${FSTL.company}<br>
${FSTL.address}<br>
${FSTL.phone}<br>
${FSTL.email}<br><br>

Role: ${FSTL.role}<br>
Function: ${FSTL.function}

</div>

<button onclick="go('role')">CONTINUE</button>`;
}

if(screen==="role"){
html=`
<h3>ROLE</h3>
<select id="role">
<option value="">--</option>
<option>TENANT</option>
<option>LANDLORD</option>
<option>BUYER</option>
<option>SELLER</option>
<option>AGENT</option>
<option>INSTITUTION</option>
</select>
<button onclick="setRole()">NEXT</button>`;
}

if(screen==="kyc"){
html=`
<h3>KYC</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="bvn" placeholder="BVN">
<input id="nin" placeholder="NIN">
<input id="address" placeholder="Address">
<button onclick="saveKYC()">NEXT</button>`;
}

if(screen==="contract"){
html=`
<h3>CONTRACT</h3>
<input id="asset" placeholder="Asset / Property">
<input id="price" placeholder="Price / Rent">
<button onclick="saveContract()">NEXT</button>`;
}

if(screen==="payment"){
html=`
<h3>PAYMENT</h3>
<input id="ref" placeholder="Reference">
<input id="amount" placeholder="Amount">
<button onclick="finalize()">FINALIZE</button>`;
}

document.getElementById("app").innerHTML=html;
}

function go(s){screen=s;render();}

async function setRole(){
state.role=role.value;
await log("role",state.role);
go("kyc");
}

async function saveKYC(){
state.kyc={
name:name.value,
phone:phone.value,
bvn:bvn.value,
nin:nin.value,
address:address.value
};
await log("kyc",state.kyc);
go("contract");
}

async function saveContract(){
state.contract={
asset:asset.value,
price:price.value
};
await log("contract",state.contract);
go("payment");
}

/* ================= FINAL ================= */

async function finalize(){

state.payment={
ref:ref.value,
amount:amount.value
};

await log("payment",state.payment);

let id=identityScore(state.kyc,state.role);
let tri=triangulate();

let txid=generateTX(id);

if(!txid){
document.getElementById("app").innerHTML=
"<h3>TRANSACTION INVALID</h3><div class='small'>Triangle incomplete</div>";
return;
}

let fingerprint=await hash(state.events);
let seal=await hash({txid,fingerprint,id,tri});

/* QR */
let qrPayload={
txid,
role:state.role,
score:id.score,
level:id.level,
seal,
fstl:FSTL.company,
bank:BANK.settlementId
};

let qrImg=await qr(JSON.stringify(qrPayload));

state.history.push({txid,status:"complete"});
localStorage.setItem("comet_history",JSON.stringify(state.history));

/* FINAL OUTPUT */
document.getElementById("app").innerHTML=`

<h3>COMET OS CASE FILE</h3>

<img src="${qrImg}" style="margin:10px auto;display:block"/>

<pre id="caseBlock">

TX: ${txid}

ROLE: ${state.role}

IDENTITY:
Score: ${id.score}
Level: ${id.level}

TRIANGULATION:
${JSON.stringify(tri,null,2)}

KYC:
${JSON.stringify(state.kyc,null,2)}

CONTRACT:
${JSON.stringify(state.contract,null,2)}

PAYMENT:
${JSON.stringify(state.payment,null,2)}

SEAL:
${seal}

FSTL:
${FSTL.company}
${FSTL.address}

BANK:
${BANK.institution}
${BANK.settlementId}

</pre>

<button onclick="downloadPDF()">DOWNLOAD PDF</button>
<button onclick="location.reload()">NEW CASE</button>

`;

}

/* ================= PDF EXPORT (FIXED) ================= */

async function downloadPDF(){

const { jsPDF } = window.jspdf;

const canvas = await html2canvas(document.getElementById("app"),{
scale:2,
useCORS:true,
backgroundColor:"#0b2a4a"
});

const img = canvas.toDataURL("image/png");

const pdf = new jsPDF("p","mm","a4");

const w = 210;
const h = (canvas.height * w) / canvas.width;

pdf.addImage(img,"PNG",0,0,w,h);
pdf.save("COMET_OS_CASE.pdf");

}

/* INIT */
render();

</script>
</body>
</html>
