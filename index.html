/* ================= HASH ================= */

async function hash(data){
  const buf = await crypto.subtle.digest("SHA-256",
    new TextEncoder().encode(JSON.stringify(data)));
  return [...new Uint8Array(buf)]
    .map(b=>b.toString(16).padStart(2,"0")).join("");
}

/* ================= LOG ================= */

async function log(step,val){
  let prev=state.events.length?state.events[state.events.length-1].hash:"GENESIS";
  let e={step,val,time:Date.now(),prev};
  e.hash=await hash(e);
  state.events.push(e);
}

/* ================= IDENTITY ================= */

function identityScore(k,role){
let score=0;

if(role==="TENANT"||role==="BUYER"||role==="LANDLORD"){
if(k.name) score+=10;
if(k.phone) score+=10;
if(k.bvn) score+=25;
if(k.nin) score+=25;
if(k.address) score+=10;
}

if(role==="AGENT"){
if(k.name) score+=10;
if(k.phone) score+=10;
if(k.bvn) score+=20;
if(k.nin) score+=20;
}

if(role==="INSTITUTION"){
if(k.rc) score+=30;
if(k.license) score+=30;
}

let level=score<30?"CRITICAL":score<50?"HIGH":score<70?"MEDIUM":"LOW";
return {score,level};
}

/* ================= TRIANGULATION ================= */

function triangulate(){
let score=100;
let flags=[];

if(!state.contract.asset){score-=20;flags.push("missing contract");}
if(!state.payment.amount){score-=20;flags.push("missing payment");}

if(state.contract.price && state.payment.amount &&
state.contract.price != state.payment.amount){
score-=20;flags.push("value mismatch");
}

if(state.payment.amount>100000000){
score-=20;flags.push("high value risk");
}

return {score,flags};
}

/* ================= TX (TRIANGLE GATE) ================= */

function generateTX(id){
let valid =
id.score>=30 &&
state.payment.amount &&
state.payment.ref &&
state.contract.asset;

if(!valid) return null;

return "TX-" + Date.now().toString(36).toUpperCase();
}
