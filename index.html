<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>COMET OS</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#000;color:#fff;font-size:18px;}
#app{height:100vh;display:flex;flex-direction:column;}
.topbar{padding:14px;text-align:center;background:#0f172a;font-weight:bold;}
.screen{flex:1;padding:16px;overflow-y:auto;}
.card{background:#1f2937;padding:14px;border-radius:10px;margin-top:10px;}
input,select{width:100%;padding:14px;margin-top:10px;font-size:18px;border-radius:8px;border:none;background:#111827;color:#fff;}
button{width:100%;padding:16px;margin-top:12px;background:#2563eb;border:none;color:#fff;font-size:18px;border-radius:10px;}
</style>
</head>

<body>
<div id="app"></div>

<script>

/* ================= STATE ================= */

let state = {

transactionId: "",
step: 0,

uiRole: "USER", // USER | AGENT | INSTITUTION

role:{},
purpose:"",
kyc:{},
agent:{},
asset:{},

paymentMode:"DIRECT",
payment:{},

escrow:{
status:"NOT_INITIATED",
releaseCondition:"",
confirmations:{landlord:false,tenant:false,agent:false}
},

risk:{},
pool:{},

poolLedger:{
LOW:{total:0,success:0,dispute:0,fail:0,score:100},
MEDIUM:{total:0,success:0,dispute:0,fail:0,score:100},
HIGH:{total:0,success:0,dispute:0,fail:0,score:100}
},

poolPricing:{},

capital:{
LOW:{totalWeight:0,transactions:0},
MEDIUM:{totalWeight:0,transactions:0},
HIGH:{totalWeight:0,transactions:0}
},

liquidity:{
LOW:{flow:0,stress:0,capacity:100,score:100},
MEDIUM:{flow:0,stress:0,capacity:100,score:100},
HIGH:{flow:0,stress:0,capacity:100,score:100},
systemIndex:100
}

};

/* ================= HELPERS ================= */

function next(){state.step++;render();}

function generateTransactionId(){
return "TRX-"+Date.now()+"-"+Math.floor(Math.random()*999);
}

/* ================= ROLE SELECT ================= */

function roleSelect(){
return `
<h3>Select Dashboard</h3>

<select id="r">
<option value="USER">User</option>
<option value="AGENT">Agent</option>
<option value="INSTITUTION">Institution</option>
</select>

<button onclick="
state.uiRole=r.value;
state.transactionId=generateTransactionId();
next();
">Continue</button>
`;
}

/* ================= USER FLOW ================= */

function intro(){
return `
<h3>COMET OS</h3>

<div class="card">
Structured Transaction Intelligence System
</div>

<div class="card">
FSTL SYSTEM ENTRY POINT
</div>

<button onclick="next()">Start</button>
`;
}

function role(){
return `
<h3>Role</h3>
<select id="r">
<option>Seller / Landlord</option>
<option>Buyer / Tenant</option>
<option>Agent</option>
</select>
<button onclick="state.role.type=r.value;next()">Continue</button>
`;
}

function purpose(){
return `
<h3>Purpose</h3>
<select id="p">
<option>Property Sale</option>
<option>Rental</option>
<option>Transfer</option>
</select>
<button onclick="state.purpose=p.value;next()">Continue</button>
`;
}

function kyc(){
return `
<h3>KYC</h3>
<input id="n" placeholder="Name"/>
<input id="ph" placeholder="Phone/WhatsApp"/>
<input id="nin" placeholder="NIN"/>
<input id="bvn" placeholder="BVN"/>
<input id="ad" placeholder="Address"/>

<button onclick="
state.kyc={name:n.value,phone:ph.value,nin:nin.value,bvn:bvn.value,address:ad.value};
next();
">Continue</button>
`;
}

function asset(){
return `
<h3>Asset</h3>

<select id="t">
<option>Property</option>
<option>Farm</option>
<option>Equipment</option>
</select>

<select id="pt">
<option>Residential</option>
<option>Commercial</option>
<option>Land</option>
</select>

<input id="r" placeholder="Rooms"/>
<input id="a" placeholder="Asset Address"/>

<button onclick="
state.asset={type:t.value,ptype:pt.value,rooms:r.value,address:a.value};
next();
">Continue</button>
`;
}

function paymentMode(){
return `
<h3>Payment Mode</h3>
<select id="m">
<option value="DIRECT">Direct</option>
<option value="ESCROW">Escrow</option>
</select>

<button onclick="state.paymentMode=m.value;next()">Continue</button>
`;
}

function escrow(){
if(state.paymentMode!=="ESCROW"){next();return"";}

return `
<h3>Escrow</h3>

<select id="c">
<option>Handover Confirmed</option>
<option>Inspection Approved</option>
<option>Tenant Occupied</option>
</select>

<button onclick="
state.escrow.releaseCondition=c.value;
state.escrow.status='HELD';
next();
">Continue</button>
`;
}

/* ================= CORE ENGINE ================= */

function engine(){

// RISK
let s=0;
if(state.purpose==="Property Sale")s+=3;
if(state.asset.ptype==="Commercial")s+=3;
if(state.paymentMode==="DIRECT")s+=2;

state.risk.score=s;
state.risk.level=s<=2?"LOW":s<=5?"MEDIUM":"HIGH";
state.pool.level=state.risk.level;

// POOL UPDATE
let p=state.poolLedger[state.pool.level];
p.total++;p.success++;

// CAPITAL
let w=state.pool.level==="LOW"?1:state.pool.level==="MEDIUM"?3:5;
state.capital[state.pool.level].totalWeight+=w;

// LIQUIDITY
let l=state.liquidity[state.pool.level];
l.flow++;l.stress+=w;
l.capacity=Math.max(0,100-l.stress*5);
l.score=(l.capacity*100)/(l.stress+1);

state.liquidity.systemIndex=
(state.liquidity.LOW.score+
state.liquidity.MEDIUM.score+
state.liquidity.HIGH.score)/3;

return review();
}

/* ================= REVIEW ================= */

function review(){
return `
<h3>REVIEW</h3>

<div class="card">
TRX: ${state.transactionId}<br>
Risk: ${state.risk.level}<br>
Pool: ${state.pool.level}<br>
Liquidity: ${state.liquidity.systemIndex.toFixed(2)}
</div>

<button onclick="next()">LOCK</button>
`;
}

/* ================= COMPLETE ================= */

function complete(){
setTimeout(()=>{
QRCode.toCanvas(document.getElementById("q"),JSON.stringify(state));
},300);

return `
<h3>COMPLETE</h3>
<canvas id="q"></canvas>

<button onclick="pdf()">PDF</button>
`;
}

/* ================= PDF ================= */

function pdf(){
const {jsPDF}=window.jspdf;
const d=new jsPDF();
let y=10;

d.text("COMET OS RECORD",10,y);y+=8;

d.text("TRX:"+state.transactionId,10,y);y+=6;
d.text("RISK:"+state.risk.level,10,y);y+=6;
d.text("POOL:"+state.pool.level,10,y);y+=6;
d.text("LIQUIDITY:"+state.liquidity.systemIndex.toFixed(2),10,y);

d.save("COMET_OS.pdf");
}

/* ================= DASHBOARDS ================= */

function userDashboard(){
return `
<h3>USER DASHBOARD</h3>

<div class="card">
TRX:${state.transactionId}<br>
Risk:${state.risk.level}<br>
Pool:${state.pool.level}
</div>

<button onclick="next()">Continue</button>
`;
}

function agentDashboard(){
return `
<h3>AGENT DASHBOARD</h3>

<div class="card">
TRX:${state.transactionId}<br>
Escrow:${state.escrow.status}
</div>
`;
}

function institutionDashboard(){
return `
<h3>INSTITUTION VIEW</h3>

<div class="card">
POOL PERFORMANCE + CAPITAL + LIQUIDITY SYSTEM ACTIVE
</div>
`;
}

/* ================= ROUTER ================= */

function view(){

if(state.uiRole==="USER"){

switch(state.step){
case 0:return intro();
case 1:return role();
case 2:return purpose();
case 3:return kyc();
case 4:return asset();
case 5:return paymentMode();
case 6:return escrow();
case 7:return engine();
case 8:return complete();
}

}

if(state.uiRole==="AGENT")return agentDashboard();
if(state.uiRole==="INSTITUTION")return institutionDashboard();

return roleSelect();
}

/* ================= RENDER ================= */

function render(){
document.getElementById("app").innerHTML=`
<div class="topbar">COMET OS</div>
<div class="screen">${view()}</div>
`;
}

render();

</script>
</body>
</html>
