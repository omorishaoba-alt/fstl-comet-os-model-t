<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSTL COMET OS</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#0a2a66;
    display:flex;
    justify-content:center;
}

.container{
    width:95%;
    max-width:420px;
    background:#fff;
    margin:20px 0;
    border-radius:12px;
    padding:15px;
}

h2{font-size:16px;margin:10px 0;}
input, select, textarea{
    width:100%;
    padding:10px;
    margin:6px 0;
    border:1px solid #ccc;
}

button{
    width:100%;
    padding:14px;
    margin-top:10px;
    background:#0a2a66;
    color:#fff;
    border:none;
}

.qr{
    display:flex;
    justify-content:center;
    margin:10px 0;
}

.small{font-size:12px;color:#555;}
</style>
</head>

<body>

<div class="container">

    <h2>FSTL COMET OS</h2>
    <div class="small">Structured Transaction Record</div>

    <!-- QR ALWAYS ACTIVE -->
    <div id="qr" class="qr"></div>

    <!-- IDENTITY -->
    <h2>Identity</h2>
    <input id="nin" placeholder="NIN">
    <input id="bvn" placeholder="BVN">
    <input id="address" placeholder="Residential / Office Address">

    <!-- ROLE -->
    <h2>Role</h2>
    <select id="role">
        <option>Owner / Landlord</option>
        <option>Buyer</option>
        <option>Tenant</option>
        <option>Agent</option>
    </select>

    <!-- PURPOSE -->
    <h2>Purpose</h2>
    <select id="purpose">
        <option>Sale</option>
        <option>Rent</option>
    </select>

    <!-- ASSET -->
    <h2>Asset Details</h2>
    <input id="type" placeholder="Property Type">
    <input id="location" placeholder="Location">
    <input id="value" placeholder="Value">
    <textarea id="desc" placeholder="Description"></textarea>

    <!-- POSSESSION -->
    <h2>Possession Disclosure</h2>
    <textarea id="possession" placeholder="How was the property acquired?"></textarea>

    <!-- TERMS -->
    <h2>Confirmation</h2>
    <label class="small">
        <input type="checkbox" id="terms">
        I accept full responsibility for all information provided.
    </label>

    <!-- PAYMENT SIMULATION -->
    <button onclick="pay()">PAY ₦25,000</button>

    <!-- OUTPUT -->
    <button onclick="generatePDF()">DOWNLOAD PDF</button>

</div>

<script>
let recordId = "FSTL-" + Date.now();

/* QR GENERATION */
new QRCode(document.getElementById("qr"), {
    text: recordId,
    width:120,
    height:120
});

/* PAYMENT GATE */
let paid = false;

function pay(){
    if(!document.getElementById("terms").checked){
        alert("Accept terms first");
        return;
    }
    paid = true;
    alert("Payment Successful (Simulation)");
}

/* PDF GENERATION */
function generatePDF(){

    if(!paid){
        alert("Payment required");
        return;
    }

    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();

    doc.text("FSTL COMET OS RECORD",20,20);
    doc.text("ID: "+recordId,20,30);

    doc.text("IDENTITY",20,45);
    doc.text("NIN: "+val("nin"),20,55);
    doc.text("BVN: "+val("bvn"),20,65);
    doc.text("Address: "+val("address"),20,75);

    doc.text("ROLE & PURPOSE",20,90);
    doc.text("Role: "+val("role"),20,100);
    doc.text("Purpose: "+val("purpose"),20,110);

    doc.text("ASSET",20,125);
    doc.text("Type: "+val("type"),20,135);
    doc.text("Location: "+val("location"),20,145);
    doc.text("Value: "+val("value"),20,155);

    doc.text("DISCLOSURE",20,170);
    doc.text(val("possession"),20,180);

    doc.text("SYSTEM NOTE:",20,200);
    doc.text("User is responsible for all inputs.",20,210);

    doc.save("FSTL_Record.pdf");
}

function val(id){
    return document.getElementById(id).value;
}
</script>

</body>
</html>
