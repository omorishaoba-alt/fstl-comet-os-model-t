<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMET OS v10 OFFLINE CORE</title>

<style>
html{font-size:20px}
body{
  margin:0;
  font-family:Arial;
  background:#0b2a4a;
  color:#fff;
  font-size:1rem;
  line-height:1.6;
}

.container{
  max-width:520px;
  margin:auto;
  padding:20px;
  text-align:center;
}

input,select,button{
  width:100%;
  padding:16px;
  margin:10px 0;
  border:none;
  border-radius:10px;
  font-size:1.1rem;
  box-sizing:border-box;
}

button{
  background:#fff;
  color:#0b2a4a;
  font-weight:bold;
}

h2{font-size:1.6rem}
h3{font-size:1.3rem}

pre{
  white-space:pre-wrap;
  text-align:left;
  background:#062033;
  padding:12px;
  border-radius:10px;
  font-size:0.95rem;
}

.small{font-size:0.95rem;opacity:0.85}
hr{opacity:0.3}
</style>
</head>

<body>
<div class="container" id="app"></div>

<script>

/* ================= SAFE BOOT ================= */

window.onerror = function(e){
document.getElementById("app").innerHTML =
"<h3>COMET OS SAFE MODE</h3><div class='small'>"+e+"</div>";
};

window.onload = function(){
render();
};

/* ================= STATE ================= */

let state = {
role:"",
kyc:{},
contract:{},
payment:{},
events:[]
};

let screen="cover";

/* ================= FSTL + BANK ================= */

const FSTL = {
company:"First Standard Title Limited (FSTL)",
address:"No. 19 Egbor Avenue, GRA, Benin City, Nigeria",
phone:"+2358035888622",
email:"fstlsite@gmail.com",
role:"COMET OS Issuer & Verification Authority",
function:"Identity, risk scoring, transaction structuring"
};

const BANK = {
institution:"First Bank of Nigeria PLC",
accountHolder:"First Standard Title Limited",
settlementId:"FSTL-FBN-SETTLEMENT-001"
};

/* ================= HASH (NATIVE SAFE) ================= */

async function hash(data){
const txt = JSON.stringify(data);
let h = 0;
for(let i=0;i<txt.length;i++){
h = (h << 5) - h + txt.charCodeAt(i);
h |= 0;
}
return "HX" + Math.abs(h);
}

/* ================= LOG ================= */

async function log(step,val){
state.events.push({
step,
val,
time:Date.now()
});
}

/* ================= IDENTITY ENGINE ================= */

function identityScore(k,role){
let score=0;

if(k.name) score+=10;
if(k.phone) score+=10;
if(k.bvn) score+=25;
if(k.nin) score+=25;
if(k.address) score+=10;

if(role==="AGENT") score+=5;
if(role==="INSTITUTION") score+=10;

let level=score<30?"CRITICAL":score<50?"HIGH":score<70?"MEDIUM":"LOW";
return{score,level};
}

/* ================= TRIANGULATION ================= */

function triangulate(){
let score=100;
let flags=[];

if(!state.contract.asset){score-=25;flags.push("missing contract");}
if(!state.payment.amount){score-=25;flags.push("missing payment");}

if(state.contract.price && state.payment.amount &&
state.contract.price != state.payment.amount){
score-=20;flags.push("mismatch");
}

return{score,flags};
}

/* ================= TX ENGINE ================= */

function generateTX(id){
let valid =
id.score>=30 &&
state.payment.amount &&
state.payment.ref &&
state.contract.asset;

if(!valid) return null;

return "TX-" + Date.now().toString(36).toUpperCase();
}

/* ================= SIMPLE QR (NO LIBRARY) ================= */

function simpleQR(data){
return "COMET QR PAYLOAD:\n\n" + data;
}

/* ================= RENDER ENGINE ================= */

function render(){

let html="";

if(screen==="cover"){
html=`
<h2>COMET OS</h2>
<button onclick="go('intro')">ENTER</button>`;
}

if(screen==="intro"){
html=`
<h3>INTRODUCTION</h3>

<div class="small">
Frontend-first COMET OS verification engine.
No dependencies. Mobile-safe execution.
</div>

<hr>

<div class="small" style="text-align:left">

<b>FSTL ISSUER</b><br><br>
${FSTL.company}<br>
${FSTL.address}<br>
${FSTL.phone}<br>
${FSTL.email}<br><br>

Role: ${FSTL.role}<br>
Function: ${FSTL.function}

</div>

<button onclick="go('role')">CONTINUE</button>`;
}

if(screen==="role"){
html=`
<h3>ROLE</h3>
<select id="role">
<option value="">--</option>
<option>TENANT</option>
<option>LANDLORD</option>
<option>BUYER</option>
<option>SELLER</option>
<option>AGENT</option>
<option>INSTITUTION</option>
</select>
<button onclick="setRole()">NEXT</button>`;
}

if(screen==="kyc"){
html=`
<h3>KYC</h3>
<input id="name" placeholder="Name">
<input id="phone" placeholder="Phone">
<input id="bvn" placeholder="BVN">
<input id="nin" placeholder="NIN">
<input id="address" placeholder="Address">
<button onclick="saveKYC()">NEXT</button>`;
}

if(screen==="contract"){
html=`
<h3>CONTRACT</h3>
<input id="asset" placeholder="Asset">
<input id="price" placeholder="Price">
<button onclick="saveContract()">NEXT</button>`;
}

if(screen==="payment"){
html=`
<h3>PAYMENT</h3>
<input id="ref" placeholder="Reference">
<input id="amount" placeholder="Amount">
<button onclick="finalize()">FINALIZE</button>`;
}

document.getElementById("app").innerHTML=html;
}

function go(s){screen=s;render();}

/* ================= SAFE INPUT HANDLING ================= */

async function setRole(){
state.role=document.getElementById("role")?.value || "";
await log("role",state.role);
go("kyc");
}

async function saveKYC(){
state.kyc={
name:document.getElementById("name")?.value || "",
phone:document.getElementById("phone")?.value || "",
bvn:document.getElementById("bvn")?.value || "",
nin:document.getElementById("nin")?.value || "",
address:document.getElementById("address")?.value || ""
};
await log("kyc",state.kyc);
go("contract");
}

async function saveContract(){
state.contract={
asset:document.getElementById("asset")?.value || "",
price:document.getElementById("price")?.value || ""
};
await log("contract",state.contract);
go("payment");
}

/* ================= FINAL ENGINE ================= */

async function finalize(){

state.payment={
ref:document.getElementById("ref")?.value || "",
amount:document.getElementById("amount")?.value || ""
};

await log("payment",state.payment);

let id = identityScore(state.kyc,state.role);
let tri = triangulate();
let txid = generateTX(id);

if(!txid){
document.getElementById("app").innerHTML =
"<h3>TRANSACTION INVALID</h3><div class='small'>Triangle incomplete</div>";
return;
}

let fingerprint = await hash(state.events);
let seal = await hash({txid,fingerprint,id,tri});

let qrPayload = {
txid,
role:state.role,
score:id.score,
level:id.level,
seal,
fstl:FSTL.company,
bank:BANK.settlementId
};

let qrText = simpleQR(JSON.stringify(qrPayload));

document.getElementById("app").innerHTML=`

<h3>COMET OS CASE FILE</h3>

<pre>${qrText}</pre>

<pre id="caseBlock">

TX: ${txid}

ROLE: ${state.role}

IDENTITY:
Score: ${id.score}
Level: ${id.level}

TRIANGULATION:
${JSON.stringify(tri,null,2)}

KYC:
${JSON.stringify(state.kyc,null,2)}

CONTRACT:
${JSON.stringify(state.contract,null,2)}

PAYMENT:
${JSON.stringify(state.payment,null,2)}

SEAL:
${seal}

FSTL:
${FSTL.company}
${FSTL.address}

BANK:
${BANK.institution}
${BANK.settlementId}

FINGERPRINT:
${fingerprint}

</pre>

<button onclick="downloadPDF()">DOWNLOAD PDF</button>
<button onclick="location.reload()">NEW CASE</button>

`;

}

/* ================= OFFLINE PDF (TEXT DOWNLOAD ONLY) ================= */

function downloadPDF(){

const text =
document.getElementById("caseBlock")?.innerText || "EMPTY CASE";

const blob = new Blob([text], {type:"text/plain"});
const url = URL.createObjectURL(blob);

const a = document.createElement("a");
a.href = url;
a.download = "COMET_OS_CASE.txt";
a.click();

URL.revokeObjectURL(url);

}

</script>
</body>
</html>
