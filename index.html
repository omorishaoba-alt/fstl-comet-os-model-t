<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FSTL COMET OS</title>
<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#fff}
.wrap{max-width:420px;margin:0 auto;padding:20px}
.card{background:#111c2e;padding:16px;border-radius:12px;margin-bottom:12px}
button,select,input{width:100%;padding:12px;margin-top:10px;border-radius:8px;border:none}
button{background:#1e88e5;color:#fff}
.row{display:flex;gap:10px}
.row button{flex:1}
</style>
</head>

<body>

<div class="wrap" id="app">
<!-- BOOT CONTENT (ALWAYS VISIBLE) -->
<div class="card">
<b>FSTL COMET OS</b><br><br>
Loading system...
</div>
</div>

<script>

/* HARD SAFE BOOT */
(function(){

var app = document.getElementById("app");

/* FORCE FRONT RENDER IMMEDIATELY */
app.innerHTML =
"<div class='card'>"+
"<b>COMET OS ENTRY</b><br><br>"+
"Select Intent"+
"<select id='intent'>"+
"<option>Property Verification</option>"+
"<option>Sale / Purchase</option>"+
"<option>Ownership / Probate</option>"+
"<option>Risk Assessment</option>"+
"</select>"+
"<button id='startBtn'>ENTER SYSTEM</button>"+
"</div>";

/* ENGINE STATE */
var OS = {
step:0,
intent:null,
data:{},
mode:"flow"
};

/* FLOW */
var FLOW = [
{key:"role",label:"Role",options:["Owner","Buyer","Seller","Agent","Tenant"]},
{key:"id_number",label:"ID Number"},
{key:"phone",label:"Phone"},
{key:"location",label:"Property Location"},
{key:"ref",label:"Property Ref"},
{key:"control",label:"Control",options:["Owner","Agent","Family","Unknown"]},
{key:"occupancy",label:"Occupancy",options:["VACANT","TENANTED"]},
{key:"rent",label:"Rent",options:["PAYING","NOT PAYING"]}
];

/* START BUTTON */
document.getElementById("startBtn").onclick = function(){
OS.intent = document.getElementById("intent").value;
renderStep();
};

/* RENDER STEP */
function renderStep(){

if(OS.step >= FLOW.length){
return renderResult();
}

var f = FLOW[OS.step];

var html = "<div class='card'><b>"+f.label+"</b>";

if(f.options){
html += "<select id='input'>";
for(var i=0;i<f.options.length;i++){
html += "<option>"+f.options[i]+"</option>";
}
html += "</select>";
}else{
html += "<input id='input'/>";
}

html += "<div class='row'>";
if(OS.step>0) html += "<button id='back'>Back</button>";
html += "<button id='next'>Next</button>";
html += "</div></div>";

app.innerHTML = html;

/* BUTTON BIND */
if(document.getElementById("next")){
document.getElementById("next").onclick = next;
}
if(document.getElementById("back")){
document.getElementById("back").onclick = back;
}

}

/* NEXT */
function next(){
var val = document.getElementById("input").value;
OS.data[FLOW[OS.step].key] = val;
OS.step++;
renderStep();
}

/* BACK */
function back(){
if(OS.step>0) OS.step--;
renderStep();
}

/* ENGINE */
function engine(){

var score = 0;

if(!OS.data.id_number) score+=4;
if(!OS.data.phone) score+=2;
if(!OS.data.ref) score+=4;

if(OS.data.control==="Unknown") score+=2;

if(OS.data.occupancy==="TENANTED" && OS.data.rent==="NOT PAYING"){
score+=3;
}

var level = "CLEAN";
if(score>=8) level="HIGH RISK";
else if(score>=4) level="WATCH";

return {score:score, level:level};
}

/* RESULT */
function renderResult(){

var r = engine();

app.innerHTML =
"<div class='card'>"+
"<b>CASE COMPLETE</b><br><br>"+
"Intent: "+OS.intent+"<br>"+
"Risk: "+r.level+"<br>"+
"Score: "+r.score+
"</div>"+
"<button onclick='location.reload()'>NEW CASE</button>";

}

})(); // END BOOT WRAPPER

</script>

</body>
</html>
