<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FSTL COMET OS</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  font-family: Arial;
  background:#0b0b0b;
  color:#fff;
  padding:20px;
}

h1 { color:#00ffd0; }

.card {
  background:#1c1c1c;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}

input, select {
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:6px;
}

button {
  width:100%;
  padding:12px;
  background:#00ffd0;
  border:none;
  font-weight:bold;
  margin-top:5px;
  cursor:pointer;
}

pre {
  background:#111;
  padding:10px;
  border-radius:8px;
}
</style>
</head>

<body>

<h1>FSTL COMET OS</h1>

<!-- ================= FRONT GATE ================= -->
<div class="card" id="frontGate">

<h3>Decision Support System</h3>

<p>
COMET OS structures your property decision before you commit money,
reducing the risk of costly mistakes.
</p>

<button onclick="enterSimulation()">START SIMULATION</button>

</div>

<!-- ================= PAYMENT GATE ================= -->
<div class="card" id="paymentGate" style="display:none;">

<h3>Verification Unlock (Payment Required)</h3>

<p><b>Bank:</b> First Bank Nigeria</p>
<p><b>Account:</b> 2025222557</p>
<p><b>Name:</b> First Standard Title Limited</p>

<input id="ref" placeholder="Enter Payment Reference">

<button onclick="confirmPayment()">UNLOCK VERIFICATION MODE</button>

</div>

<!-- ================= MAIN SYSTEM ================= -->
<div class="card" id="system" style="display:none;">

<h3 id="modeLabel">SIMULATION MODE</h3>

<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<input id="location" placeholder="Property Location">

<select id="type">
  <option>Land</option>
  <option>Building</option>
</select>

<button onclick="runSimulation()">RUN ANALYSIS</button>
<button onclick="generatePDF()" id="pdfBtn" style="display:none;">GENERATE PDF (PAID)</button>

</div>

<pre id="out">SYSTEM READY</pre>

<canvas id="qr"></canvas>

<script>

let MODE = "SIMULATION";
let PAYMENT = { status:false };
let SESSION = Date.now();
let CURRENT = null;

/* ENTRY */
function enterSimulation(){
  frontGate.style.display="none";
  system.style.display="block";
  MODE = "SIMULATION";
  modeLabel.innerText = "SIMULATION MODE";
}

/* SIMULATION ENGINE */
function runSimulation(){

  let data = {
    name:name.value,
    phone:phone.value,
    location:location.value,
    type:type.value
  };

  let score = 0;

  if(!data.name) score += 20;
  if(!data.phone) score += 20;
  if(!data.location) score += 20;

  let level = score >= 50 ? "HIGH" : score >= 25 ? "MEDIUM" : "LOW";
  let state = level === "HIGH" ? "FLAGGED"
             : level === "MEDIUM" ? "REVIEW"
             : "APPROVED";

  CURRENT = { data, score, level, state };

  out.innerText =
  "SIMULATION RESULT\n\n" +
  "Risk Score: " + score + "\n" +
  "Level: " + level + "\n" +
  "State: " + state;
}

/* PAYMENT GATE */
function confirmPayment(){

  let r = ref.value;
  if(!r || r.length < 8){
    out.innerText="INVALID PAYMENT REFERENCE";
    return;
  }

  PAYMENT.status = true;
  PAYMENT.ref = r;

  paymentGate.style.display="none";
  system.style.display="block";

  MODE = "VERIFICATION";
  modeLabel.innerText = "VERIFICATION MODE";

  pdfBtn.style.display="block";

  out.innerText="VERIFICATION MODE UNLOCKED";
}

/* HASH */
async function hash(data){
  let enc = new TextEncoder().encode(data);
  let buf = await crypto.subtle.digest("SHA-256", enc);
  return [...new Uint8Array(buf)]
    .map(x => x.toString(16).padStart(2,'0'))
    .join('');
}

/* PDF GENERATION (PAID ONLY) */
async function generatePDF(){

  if(MODE !== "VERIFICATION" || !PAYMENT.status){
    out.innerText="ACCESS DENIED - PAYMENT REQUIRED";
    return;
  }

  let h = await hash(JSON.stringify(CURRENT));

  const { jsPDF } = window.jspdf;
  let doc = new jsPDF();

  doc.text("FSTL COMET OS VERIFICATION REPORT",20,20);

  doc.text("STATE: " + CURRENT.state,20,40);
  doc.text("RISK SCORE: " + CURRENT.score,20,50);
  doc.text("LEVEL: " + CURRENT.level,20,60);

  doc.text("SESSION: " + SESSION,20,80);
  doc.text("HASH: " + h.substring(0,25),20,90);

  doc.save("COMET_VERIFICATION.pdf");

  QRCode.toCanvas(qr, JSON.stringify({
    session:SESSION,
    hash:h,
    state:CURRENT.state
  }));

  out.innerText="VERIFICATION PDF GENERATED";
}

</script>

</body>
</html>
