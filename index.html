<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSTL COMET OS</title>

<style>
html { font-size:16px; }

body {
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b2a4a;
  color:#fff;
  overflow-y:auto;
}

.container {
  max-width:520px;
  margin:auto;
  padding:16px;
}

.screen {
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
  padding-top:20px;
}

.title {
  font-size:1.5rem;
  font-weight:bold;
  margin-bottom:10px;
}

.card {
  background:#062033;
  padding:12px;
  border-radius:10px;
  margin:10px 0;
  line-height:1.4;
}

input, select {
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  font-size:16px;
}

button {
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  font-size:16px;
  font-weight:bold;
  background:#fff;
  color:#0b2a4a;
}

.small {
  font-size:0.85rem;
  opacity:0.8;
}
</style>
</head>

<body>
<div class="container" id="app"></div>

<script>

/* ================= STATE ================= */

let state = JSON.parse(localStorage.getItem("comet_state") || "{}");

if(!state.identity){
state = {
identity:{nin:"", bvn:""},
stability:{},
behavior:{},
transaction:{},
result:null
};
}

let historyStack = [];
let screen = "cover";

/* ================= SAVE ================= */

function save(){
localStorage.setItem("comet_state", JSON.stringify(state));
}

/* ================= NAVIGATION ================= */

function go(next){
historyStack.push(screen);
screen = next;
render();
}

function back(){
if(historyStack.length){
screen = historyStack.pop();
render();
}
}

/* ================= SAFE VALUE ================= */

function val(id){
let el = document.getElementById(id);
return el ? el.value : "";
}

/* ================= VALIDATION ================= */

function valid(){
return state.identity.nin && state.identity.nin.length >= 6;
}

/* ================= ENGINE ================= */

function runEngine(){

if(!valid()){
alert("Enter valid NIN");
return;
}

let score = 0;

if(state.identity.nin) score += 15;

score += state.stability.employment || 0;
score += state.stability.contact || 0;
score += state.stability.residence || 0;

if(state.behavior.income) score += 10;
if(state.behavior.financial) score += 10;

if(state.transaction.ownerMatch) score += 10;
if(state.transaction.valueMatch) score += 10;

let status = "BLOCKED";
if(score >= 75) status = "VERIFIED";
else if(score >= 50) status = "FLAGGED";

state.result = {score, status};
save();

go("result");
}

/* ================= RENDER ================= */

function render(){

let html = "";

/* COVER */
if(screen==="cover"){
html = `
<div class="screen">
<div class="title">FSTL COMET OS</div>

<div class="card">
A silent infrastructure backbone for transaction clarity.
</div>

<div class="card">
See who is involved, what is agreed, how value moves, and what risks exist — before you decide.
</div>

<button onclick="go('value')">ENTER SYSTEM</button>
</div>`;
}

/* VALUE */
if(screen==="value"){
html = `
<div class="screen">
<div class="title">Why This Exists</div>

<div class="card">
All parties see the same structured transaction truth before making a decision.
</div>

<div class="card">
This reduces confusion, hidden risk, and disputes.
</div>

<button onclick="go('identity')">CONTINUE</button>
<button onclick="back()">BACK</button>
</div>`;
}

/* IDENTITY */
if(screen==="identity"){
html = `
<div class="screen">
<div class="title">Identity</div>

<input id="nin" placeholder="NIN (Required)" value="${state.identity.nin}">
<input id="bvn" placeholder="BVN (Optional)" value="${state.identity.bvn}">

<button onclick="
state.identity.nin = val('nin');
state.identity.bvn = val('bvn');
save();
go('stability');
">CONTINUE</button>

<button onclick="back()">BACK</button>
</div>`;
}

/* STABILITY */
if(screen==="stability"){
html = `
<div class="screen">
<div class="title">Stability</div>

<select id="emp">
<option value="0">Employment Duration</option>
<option value="5">< 6 months</option>
<option value="10">6–12 months</option>
<option value="15">1+ years</option>
</select>

<select id="con">
<option value="0">Contact Stability</option>
<option value="5">< 6 months</option>
<option value="10">6–24 months</option>
<option value="15">2+ years</option>
</select>

<select id="res">
<option value="0">Residence</option>
<option value="5">Temporary</option>
<option value="10">Rented</option>
<option value="15">Permanent</option>
</select>

<button onclick="
state.stability.employment=parseInt(val('emp'));
state.stability.contact=parseInt(val('con'));
state.stability.residence=parseInt(val('res'));
save();
go('behavior');
">CONTINUE</button>

<button onclick="back()">BACK</button>
</div>`;
}

/* BEHAVIOR */
if(screen==="behavior"){
html = `
<div class="screen">
<div class="title">Behavior</div>

<select id="inc">
<option value="">Income Stability</option>
<option value="true">Stable</option>
<option value="false">Unstable</option>
</select>

<select id="fin">
<option value="">Financial Independence</option>
<option value="true">Independent</option>
<option value="false">Dependent</option>
</select>

<button onclick="
state.behavior.income = val('inc')==='true';
state.behavior.financial = val('fin')==='true';
save();
go('transaction');
">CONTINUE</button>

<button onclick="back()">BACK</button>
</div>`;
}

/* TRANSACTION */
if(screen==="transaction"){
html = `
<div class="screen">
<div class="title">Transaction</div>

<input id="owner" placeholder="Owner Name">
<input id="buyer" placeholder="Buyer / Tenant">
<input id="property" placeholder="Property">

<select id="own">
<option value="">Ownership Match</option>
<option value="true">Match</option>
<option value="false">Mismatch</option>
</select>

<select id="valm">
<option value="">Value Match</option>
<option value="true">Yes</option>
<option value="false">No</option>
</select>

<button onclick="
state.transaction.owner = val('owner');
state.transaction.buyer = val('buyer');
state.transaction.property = val('property');
state.transaction.ownerMatch = val('own')==='true';
state.transaction.valueMatch = val('valm')==='true';
save();
runEngine();
">RUN CHECK</button>

<button onclick="back()">BACK</button>
</div>`;
}

/* RESULT */
if(screen==="result"){
let r = state.result || {};

html = `
<div class="screen">
<div class="title">Result</div>

<div class="card">
Status: ${r.status}<br>
Score: ${r.score}/100
</div>

<div class="card">
Owner: ${state.transaction.owner || ""}<br>
Buyer: ${state.transaction.buyer || ""}<br>
Property: ${state.transaction.property || ""}
</div>

<button onclick="downloadReport()">DOWNLOAD REPORT</button>
<button onclick="location.reload()">NEW</button>
</div>`;
}

document.getElementById("app").innerHTML = html;
}

/* ================= REPORT ================= */

function downloadReport(){

let r = state.result || {};

let text = `
FSTL COMET OS REPORT
----------------------

STATUS: ${r.status}
SCORE: ${r.score}/100

OWNER: ${state.transaction.owner}
BUYER: ${state.transaction.buyer}

PROPERTY:
${state.transaction.property}

NIN: ${state.identity.nin}

SYSTEM:
COMET OS - Transaction Clarity Infrastructure
`;

let blob = new Blob([text], {type:"text/plain"});
let url = URL.createObjectURL(blob);

let a = document.createElement("a");
a.href = url;
a.download = "COMET_OS_REPORT.txt";
a.click();

URL.revokeObjectURL(url);
}

/* INIT */
render();

</script>
</body>
</html>
