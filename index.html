<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSTL COMET OS</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
body{margin:0;font-family:Arial;background:#0a2a66;color:#fff}
.screen{display:none;padding:20px;max-width:420px;margin:auto}
.active{display:block}
button{width:100%;padding:15px;margin-top:15px;border:none;border-radius:8px;background:#FFD700;color:#000;font-weight:bold}
input,select{width:100%;padding:12px;margin-top:10px;border-radius:6px;border:none}
.qr{background:#fff;padding:10px;margin-top:15px}
h2,h3{text-align:center}
</style>
</head>
<body><!-- FRONT --><div id="front" class="screen active">
<h2>FSTL COMET OS</h2>
<p style="text-align:center">Secure Pre-Transaction Trust System</p>
<div id="frontQR" class="qr"></div>
<button onclick="next('truth')">START</button>
</div><!-- TRUTH --><div id="truth" class="screen">
<h3>TRUTH DECLARATION</h3>
<p>I confirm all inputs are truthful and legally traceable.</p>
<input type="checkbox" id="truthCheck"> ACCEPT
<button onclick="toSecurity()">PROCEED</button>
</div><!-- IDENTITY --><div id="identity" class="screen">
<h3>IDENTITY</h3>
<select id="role">
<option value="">Select Role</option>
<option>Owner</option>
<option>Seller</option>
<option>Buyer</option>
<option>Tenant</option>
<option>Agent</option>
</select>
<input id="name" placeholder="Full Name">
<input id="bvn" placeholder="BVN">
<input id="nin" placeholder="NIN">
<input id="address" placeholder="Address">
<button onclick="toAsset()">PROCEED</button>
</div><!-- ASSET --><div id="asset" class="screen">
<h3>ASSET</h3>
<input id="property" placeholder="Property Description">
<input id="location" placeholder="Property Location">
<input id="scope" placeholder="Scope of Possession">
<button onclick="finalize()">VERIFY</button>
</div><!-- RESULT --><div id="result" class="screen">
<h3>TRUST RECORD</h3>
<p id="vid"></p>
<div id="qr1" class="qr"></div>
<div id="qr2" class="qr"></div>
<div id="qr3" class="qr"></div>
<div id="qr4" class="qr"></div>
<div id="qr5" class="qr"></div>
<button onclick="downloadPDF()">DOWNLOAD PDF</button>
<button onclick="next('verify')">VERIFY RECORD</button>
</div><!-- VERIFY --><div id="verify" class="screen">
<h3>VERIFY</h3>
<input id="verifyInput" placeholder="Enter Verification ID">
<button onclick="verifyRecord()">VERIFY</button>
<p id="verifyResult"></p>
</div><script>
const { jsPDF } = window.jspdf;

function next(id){
 document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

function toSecurity(){
 if(!truthCheck.checked) return alert('Accept truth');
 next('identity');
}

function toAsset(){
 if(!role.value||!name.value||!bvn.value||!nin.value) return alert('Complete identity');
 next('asset');
}

function finalize(){
 if(!property.value||!location.value||!scope.value) return alert('Complete asset');

 const id = 'FSTL-'+Date.now();
 const time = new Date().toISOString();

 const identityData = `${name.value}|${role.value}|${bvn.value}|${nin.value}`;
 const assetData = `${property.value}|${location.value}|${scope.value}`;
 const networkData = `Agent:N/A`;
 const timeData = time;
 const masterData = btoa(identityData+assetData+networkData+timeData);

 const record = {id,identityData,assetData,networkData,timeData,masterData};
 localStorage.setItem(id, JSON.stringify(record));

 vid.innerText = id;

 new QRCode(qr1,{text:identityData,width:100,height:100});
 new QRCode(qr2,{text:assetData,width:100,height:100});
 new QRCode(qr3,{text:networkData,width:100,height:100});
 new QRCode(qr4,{text:timeData,width:100,height:100});
 new QRCode(qr5,{text:masterData,width:100,height:100});

 next('result');
}

function verifyRecord(){
 const id = verifyInput.value;
 const data = localStorage.getItem(id);

 if(data){
  const d = JSON.parse(data);
  verifyResult.innerText = 'VALID RECORD: '+d.id;
 } else {
  verifyResult.innerText = 'INVALID RECORD';
 }
}

function downloadPDF(){
 const doc = new jsPDF();
 doc.text('FSTL COMET OS TRUST DOCUMENT',10,20);
 doc.text('ID: '+vid.innerText,10,40);
 doc.text('This document establishes pre-transaction trust.',10,60);
 doc.addPage();
 doc.text('IDENTITY',10,20);
 doc.text(name.value,10,40);
 doc.text(role.value,10,50);
 doc.addPage();
 doc.text('ASSET',10,20);
 doc.text(property.value,10,40);
 doc.text(location.value,10,50);
 doc.addPage();
 doc.text('VERIFICATION STATUS: CONFIRMED',10,20);
 doc.save('FSTL_TRUST.pdf');
}

new QRCode(frontQR,{text:'FSTL ENTRY LOCK',width:100,height:100});
</script></body>
</html>
