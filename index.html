<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>COMET OS</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f19;
  color: white;
}

.screen { padding: 18px; }

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  background: #3b82f6;
  border: none;
  border-radius: 8px;
  color: white;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 6px;
  border: none;
}
</style>
</head>

<body>

<div id="app"></div>

<script>
/* =========================
   COMET OS SINGLE FILE CORE
========================= */

class CometOS {
  constructor() {
    this.state = { memory: [] };
  }

  boot() {
    this.root = document.getElementById("app");
    this.home();
  }

  /* =========================
     HOME UI
  ========================== */
  home() {
    this.root.innerHTML = `
      <div class="screen">
        <h2>COMET OS</h2>

        <button onclick="os.openKYC()">
          Start KYC Flow
        </button>

        <button onclick="os.testFlow()">
          Run Value Engine Test
        </button>
      </div>
    `;
  }

  /* =========================
     VALUE ENGINE
  ========================== */
  execute(input, metrics) {
    const intent = this.classify(input);
    const action = this.route(intent);
    const value = this.score(metrics);

    const result = {
      intent,
      action,
      valueScore: value,
      success: value > 0.5,
      time: Date.now()
    };

    this.state.memory.push(result);
    return result;
  }

  classify(input) {
    if (input.verify) return "IDENTITY";
    if (input.action === "submit") return "TRANSACTIONAL";
    if (input.action === "query") return "INFORMATIONAL";
    return "GENERAL";
  }

  route(intent) {
    if (intent === "IDENTITY") return "KYC_FLOW";
    if (intent === "TRANSACTIONAL") return "EXEC_FLOW";
    return "DEFAULT";
  }

  score(m) {
    return (m.completion * 0.4) +
           (m.quality * 0.4) +
           ((1 - m.friction) * 0.2);
  }

  /* =========================
     KYC FLOW
  ========================== */
  openKYC() {
    this.root.innerHTML = `
      <div class="screen">
        <h3>KYC Verification</h3>

        <input id="name" placeholder="Full Name"/>
        <input id="phone" placeholder="Phone"/>

        <button onclick="os.submitKYC()">
          Submit
        </button>
      </div>
    `;
  }

  submitKYC() {
    const name = document.getElementById("name").value;
    const phone = document.getElementById("phone").value;

    const result = this.execute(
      { verify: true, name, phone },
      { completion: 0.95, quality: 0.9, friction: 0.2 }
    );

    this.renderResult(result);
  }

  /* =========================
     TEST FLOW
  ========================== */
  testFlow() {
    const result = this.execute(
      { action: "submit" },
      { completion: 0.8, quality: 0.7, friction: 0.3 }
    );

    this.renderResult(result);
  }

  /* =========================
     RESULT SCREEN
  ========================== */
  renderResult(result) {
    this.root.innerHTML = `
      <div class="screen">
        <h3>Result</h3>

        <pre>${JSON.stringify(result, null, 2)}</pre>

        <button onclick="os.home()">
          Back Home
        </button>
      </div>
    `;
  }
}

/* =========================
   BOOT STRAP
========================= */
const os = new CometOS();
os.boot();

</script>

</body>
</html>
