<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FSTL COMET OS</title>

<style>
body { font-family: Arial; margin:0; background:#0b0f14; color:#fff; }

.screen { display:none; padding:16px; }
.active { display:block; }

.header {
  padding:18px;
  background:#111826;
  font-weight:bold;
  text-align:center;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#1f6feb;
  color:#fff;
  border:none;
  border-radius:6px;
  font-weight:bold;
}

input, textarea, select {
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:6px;
  border:none;
}

.card {
  background:#111826;
  padding:12px;
  margin-top:12px;
  border-radius:8px;
}

.small { font-size:12px; opacity:0.8; }
.status { font-weight:bold; margin-top:10px; }

</style>
</head>

<body>

<!-- ================= FRONT COVER ================= -->
<div id="front" class="screen active">
  <div class="header">FSTL COMET OS</div>

  <div class="card">
    <h3>PROPERTY VERIFICATION SYSTEM</h3>
    <p class="small">
      Structured Property Certification & Risk-Control Engine
    </p>

    <button onclick="goTo('form')">ENTER SYSTEM</button>
  </div>
</div>

<!-- ================= SPCR FORM ================= -->
<div id="form" class="screen">
  <div class="header">SPCR SUBMISSION</div>

  <input id="declarant" placeholder="Declarant ID (DID-COMET)" />
  <input id="property" placeholder="Property Description" />
  <input id="location" placeholder="Location" />

  <select id="claim">
    <option value="OWNERSHIP">Ownership Claim</option>
    <option value="VERIFICATION">Verification Request</option>
    <option value="TRANSFER">Transfer Intent</option>
  </select>

  <textarea id="evidence" placeholder="Supporting Notes"></textarea>

  <button onclick="submitSPCR()">SUBMIT TRANSACTION</button>
</div>

<!-- ================= PAYMENT SCREEN ================= -->
<div id="payment" class="screen">
  <div class="header">PAYMENT REQUIRED</div>

  <div class="card" id="paymentInfo"></div>

  <button onclick="confirmPayment()">CONFIRM BANK TRANSFER</button>
</div>

<!-- ================= RESULT ================= -->
<div id="result" class="screen">
  <div class="header">TRANSACTION RESULT</div>

  <div class="card" id="output"></div>

  <button onclick="downloadPDF()">DOWNLOAD PDF</button>
</div>

<script>

// ================= STATE =================
let transaction = null;

const BANK = {
  name: "First Bank Nigeria",
  account: "2025222557",
  holder: "First Standard Title Limited"
};

// ================= NAV =================
function goTo(screen) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screen).classList.add('active');
}

// ================= QRS ENGINE =================
function qrsScore(property, location, evidence) {
  let score = 20;

  if (!property || property.length < 5) score += 30;
  if (!location || location.length < 3) score += 25;
  if (evidence && evidence.length > 50) score -= 10;

  score += Math.floor(Math.random() * 20);

  return Math.min(score, 100);
}

// ================= STEP 1: SUBMIT =================
function submitSPCR() {

  const declarant = document.getElementById("declarant").value;
  const property = document.getElementById("property").value;
  const location = document.getElementById("location").value;
  const claim = document.getElementById("claim").value;
  const evidence = document.getElementById("evidence").value;

  if (!declarant || !property || !location) {
    alert("SPCR INCOMPLETE");
    return;
  }

  const txID = "TX-" + Date.now();
  const risk = qrsScore(property, location, evidence);

  transaction = {
    txID,
    declarant,
    property,
    location,
    claim,
    evidence,
    risk,
    timestamp: new Date().toISOString()
  };

  showPayment();
}

// ================= STEP 2: PAYMENT =================
function showPayment() {

  const baseFee = 5000;
  let multiplier = 1;

  if (transaction.risk > 60) multiplier = 2;
  if (transaction.risk > 85) multiplier = 3;

  const amount = baseFee * multiplier;

  transaction.amount = amount;

  document.getElementById("paymentInfo").innerHTML = `
    <div><b>BANK:</b> ${BANK.name}</div>
    <div><b>ACCOUNT:</b> ${BANK.account}</div>
    <div><b>NAME:</b> ${BANK.holder}</div>
    <br/>
    <div><b>AMOUNT:</b> ₦${amount}</div>
    <div><b>REFERENCE:</b> ${transaction.txID}</div>
    <br/>
    <div class="small">Transfer must include reference exactly.</div>
  `;

  goTo('payment');
}

// ================= STEP 3: CONFIRM PAYMENT =================
function confirmPayment() {

  transaction.payment = {
    method: "BANK_TRANSFER",
    amount: transaction.amount,
    reference: transaction.txID,
    status: "CONFIRMED"
  };

  runQRS();
}

// ================= STEP 4: QRS =================
function runQRS() {

  let status = "VERIFIED";
  let qrsA = "ISSUED";

  if (transaction.risk > 60) {
    status = "FLAGGED";
    qrsA = "PENDING";
  }

  if (transaction.risk > 85) {
    status = "BLOCKED";
    qrsA = "DENIED";
  }

  transaction.finalStatus = status;
  transaction.qrsA = qrsA;

  saveRegistry();
}

// ================= STEP 5: REGISTRY =================
function saveRegistry() {

  let reg = JSON.parse(localStorage.getItem("COMET_REGISTRY") || "[]");
  reg.push(transaction);
  localStorage.setItem("COMET_REGISTRY", JSON.stringify(reg));

  showResult();
}

// ================= STEP 6: OUTPUT =================
function showResult() {

  const r = transaction;

  const pdf = `
FSTL COMET OS REPORT

TX: ${r.txID}
DECLARANT: ${r.declarant}
PROPERTY: ${r.property}
LOCATION: ${r.location}
CLAIM: ${r.claim}

PAYMENT: ₦${r.amount} (${r.payment.status})
REFERENCE: ${r.payment.reference}

QRS-A: ${r.qrsA}
RISK: ${r.risk}
STATUS: ${r.finalStatus}
TIME: ${r.timestamp}
`;

  document.getElementById("output").innerHTML = `
    <div><b>TRANSACTION COMPLETE</b></div>
    <div class="status">${r.finalStatus}</div>
    <div class="small">QRS: ${r.qrsA}</div>
    <div class="small">RISK: ${r.risk}</div>
    <div class="small">PAYMENT: ₦${r.amount}</div>
  `;

  transaction.pdf = pdf;

  goTo('result');
}

// ================= STEP 7: PDF =================
function downloadPDF() {

  const blob = new Blob([transaction.pdf], {type:"text/plain"});
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  a.download = "COMET_OS_TRANSACTION.pdf.txt";
  a.click();
}

</script>

</body>
</html>
