<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>COMET OS</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:#fff;
}

.screen{display:none;padding:16px;}
.active{display:block;}

.card{
  background:#111c2e;
  padding:14px;
  border-radius:12px;
  margin-top:10px;
}

button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#1e88e5;
  color:#fff;
  font-weight:bold;
}

input,select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
  background:#152238;
  color:#fff;
}

.badge{
  padding:6px 10px;
  border-radius:8px;
  font-weight:bold;
  display:inline-block;
}

.low{background:#2e7d32;}
.mid{background:#f9a825;}
.high{background:#c62828;}

.small{font-size:12px;color:#9fb3c8;}
</style>
</head>

<body>

<!-- 0 FRONT COVER -->
<div id="s0" class="screen active">
  <div class="card">
    <h2>COMET OS</h2>
    <p class="small">Landed Property Verification System</p>
    <button onclick="startOS()">START</button>
  </div>
</div>

<!-- 1 ROLE -->
<div id="s1" class="screen">
  <div class="card">
    <h3>Select Role</h3>

    <button onclick="setRole('OWNER')">Owner</button>
    <button onclick="setRole('BUYER')">Buyer</button>
    <button onclick="setRole('SELLER')">Seller</button>
    <button onclick="setRole('AGENT')">Agent</button>
  </div>
</div>

<!-- 2 ASSET -->
<div id="s2" class="screen">
  <div class="card">
    <h3>Asset Details</h3>

    <input id="type" placeholder="Property Type"/>
    <input id="location" placeholder="Location"/>

    <select id="condition">
      <option>GOOD</option>
      <option>FAIR</option>
      <option>UNCERTAIN</option>
      <option>DISPUTED</option>
    </select>

    <button onclick="saveAsset()">CONTINUE</button>
  </div>
</div>

<!-- 3 COUNTERPARTY -->
<div id="s3" class="screen">
  <div class="card">
    <h3>Counterparty</h3>

    <input id="cp" placeholder="Name"/>
    <input id="cpRole" placeholder="Role"/>

    <button onclick="runEngine()">RUN VERIFICATION</button>
  </div>
</div>

<!-- 4 RESULT -->
<div id="s4" class="screen">
  <div class="card" id="out"></div>

  <button onclick="location.reload()">NEW CASE</button>
</div>

<script>

/* =========================
   CORE STATE (TIR)
========================= */

let TIR = {
  stage: 0,
  role: "",
  asset: {},
  counterparty: {},
  risk: 0,
  decision: ""
};

/* =========================
   SCREEN CONTROL
========================= */

function show(i){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("s"+i).classList.add("active");
}

/* =========================
   FRONT COVER CONTROL
========================= */

function startOS(){
  TIR.stage = 1;
  show(1);
}

/* =========================
   ROLE FIX (GLOBAL BIND)
========================= */

window.setRole = function(r){
  TIR.role = r;
  TIR.stage = 2;
  show(2);
};

/* =========================
   ASSET SAVE
========================= */

window.saveAsset = function(){

  TIR.asset = {
    type: document.getElementById("type").value,
    location: document.getElementById("location").value,
    condition: document.getElementById("condition").value
  };

  TIR.stage = 3;
  show(3);
};

/* =========================
   CORE ENGINE
========================= */

window.runEngine = function(){

  TIR.counterparty = {
    name: document.getElementById("cp").value,
    role: document.getElementById("cpRole").value
  };

  let r = 0;

  if(TIR.asset.condition === "DISPUTED") r += 5;
  if(TIR.asset.condition === "UNCERTAIN") r += 3;
  if(!TIR.asset.type) r += 2;
  if(!TIR.counterparty.name) r += 2;

  TIR.risk = r;

  if(r >= 7){
    TIR.decision = "BLOCKED";
  } else if(r >= 3){
    TIR.decision = "CONDITIONAL";
  } else {
    TIR.decision = "APPROVED";
  }

  let cls = r >= 7 ? "high" : r >= 3 ? "mid" : "low";

  document.getElementById("out").innerHTML = `
    <span class="badge ${cls}">${TIR.decision}</span><br><br>

    <b>Role:</b> ${TIR.role}<br>
    <b>Property:</b> ${TIR.asset.type}<br>
    <b>Location:</b> ${TIR.asset.location}<br>
    <b>Condition:</b> ${TIR.asset.condition}<br><br>

    <b>Risk Score:</b> ${TIR.risk}
  `;

  TIR.stage = 4;
  show(4);
};

</script>

</body>
</html>
