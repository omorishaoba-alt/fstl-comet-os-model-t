<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>COMET OS</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#000;color:#fff;font-size:18px;}
#app{height:100vh;display:flex;flex-direction:column;}
.topbar{padding:14px;text-align:center;background:#0f172a;font-weight:bold;}
.screen{flex:1;padding:16px;overflow-y:auto;}
.card{background:#1f2937;padding:14px;border-radius:10px;margin-top:10px;}
input,select{width:100%;padding:14px;margin-top:10px;font-size:18px;border-radius:8px;border:none;background:#111827;color:#fff;}
button{width:100%;padding:16px;margin-top:12px;background:#2563eb;border:none;color:#fff;font-size:18px;border-radius:10px;}
</style>
</head>

<body>
<div id="app"></div>

<script>

/* ================= PERSISTENT SYSTEM ================= */

let system = JSON.parse(localStorage.getItem("COMET_OS")) || {
  transactions: [],
  activeId: null,
  uiRole: "USER"
};

function save(){
  localStorage.setItem("COMET_OS", JSON.stringify(system));
}

/* ================= BOOT GUARANTEE (FIX FOR BLANK PAGE) ================= */

function ensureSystemReady(){

  if(!system.transactions.length){
    createTransaction();
  }

  if(!system.activeId){
    system.activeId = system.transactions[0].id;
  }

  save();
}

/* ================= ACTIVE TRANSACTION ================= */

function active(){
  if(!system.activeId) return null;
  return system.transactions.find(t => t.id === system.activeId) || null;
}

/* ================= TRANSACTION FACTORY ================= */

function createTransaction(){

  let trx = {
    id:"TRX-"+Date.now(),
    step:0,

    role:{},
    purpose:"",
    kyc:{},
    agent:{},
    asset:{},

    paymentMode:"DIRECT",
    escrow:{status:"NONE"},

    risk:{},
    pool:{},

    poolLedger:{
      LOW:{total:0,success:0,dispute:0,fail:0,score:100},
      MEDIUM:{total:0,success:0,dispute:0,fail:0,score:100},
      HIGH:{total:0,success:0,dispute:0,fail:0,score:100}
    },

    capital:{
      LOW:{totalWeight:0},
      MEDIUM:{totalWeight:0},
      HIGH:{totalWeight:0}
    },

    liquidity:{
      LOW:{flow:0,stress:0,capacity:100,score:100},
      MEDIUM:{flow:0,stress:0,capacity:100,score:100},
      HIGH:{flow:0,stress:0,capacity:100,score:100},
      systemIndex:100
    }
  };

  system.transactions.push(trx);
  system.activeId = trx.id;

  save();
}

/* ================= FLOW CONTROL ================= */

function next(){
  let t = active();
  if(!t) return;

  t.step++;
  save();
  render();
}

/* ================= ROLE SELECT ================= */

function roleSelect(){
return `
<h3>Select Dashboard</h3>

<select id="r">
<option value="USER">User</option>
<option value="AGENT">Agent</option>
<option value="INSTITUTION">Institution</option>
</select>

<button onclick="
system.uiRole=r.value;
createTransaction();
render();
">Continue</button>
`;
}

/* ================= FRONT PAGE ================= */

function intro(){
return `
<h3>COMET OS</h3>

<div class="card">
Transaction Intelligence Ledger System
</div>

<button onclick="next()">Start Transaction</button>
`;
}

/* ================= TRANSACTION FLOW ================= */

function role(){
return `
<h3>Role</h3>

<select id="r">
<option>Seller / Landlord</option>
<option>Buyer / Tenant</option>
<option>Agent</option>
</select>

<button onclick="
active().role.type=r.value;
next();
">Continue</button>
`;
}

function purpose(){
return `
<h3>Purpose</h3>

<select id="p">
<option>Property Sale</option>
<option>Rental</option>
<option>Transfer</option>
</select>

<button onclick="
active().purpose=p.value;
next();
">Continue</button>
`;
}

function kyc(){
return `
<h3>KYC</h3>

<input id="n" placeholder="Name"/>
<input id="ph" placeholder="Phone/WhatsApp"/>
<input id="nin" placeholder="NIN"/>
<input id="bvn" placeholder="BVN"/>
<input id="ad" placeholder="Address"/>

<button onclick="
let t=active();
t.kyc={name:n.value,phone:ph.value,nin:nin.value,bvn:bvn.value,address:ad.value};
next();
">Continue</button>
`;
}

function asset(){
return `
<h3>Asset</h3>

<select id="t">
<option>Property</option>
<option>Farm</option>
<option>Equipment</option>
</select>

<select id="pt">
<option>Residential</option>
<option>Commercial</option>
<option>Land</option>
</select>

<input id="r" placeholder="Rooms"/>
<input id="a" placeholder="Asset Address"/>

<button onclick="
let t=active();
t.asset={type:t.value,ptype:pt.value,rooms:r.value,address:a.value};
next();
">Continue</button>
`;
}

function paymentMode(){
return `
<h3>Payment Mode</h3>

<select id="m">
<option value="DIRECT">Direct</option>
<option value="ESCROW">Escrow</option>
</select>

<button onclick="
active().paymentMode=m.value;
next();
">Continue</button>
`;
}

function escrow(){

let t=active();

if(!t) return `<div class="card">Loading...</div>`;

if(t.paymentMode!=="ESCROW"){
  return engine();
}

return `
<h3>Escrow Setup</h3>

<select id="c">
<option>Handover Confirmed</option>
<option>Inspection Approved</option>
<option>Tenant Occupied</option>
</select>

<button onclick="
active().escrow.status='HELD';
active().escrow.releaseCondition=c.value;
next();
">Continue</button>
`;
}

/* ================= ENGINE ================= */

function engine(){

let t = active();
if(!t) return "";

let s=0;

if(t.purpose==="Property Sale")s+=3;
if(t.asset.ptype==="Commercial")s+=3;
if(t.paymentMode==="DIRECT")s+=2;

t.risk.score=s;
t.risk.level=s<=2?"LOW":s<=5?"MEDIUM":"HIGH";
t.pool.level=t.risk.level;

/* POOL */
let p=t.poolLedger[t.pool.level];
p.total++;p.success++;

/* CAPITAL */
let w=t.pool.level==="LOW"?1:t.pool.level==="MEDIUM"?3:5;
t.capital[t.pool.level].totalWeight+=w;

/* LIQUIDITY */
let l=t.liquidity[t.pool.level];
l.flow++;l.stress+=w;
l.capacity=Math.max(0,100-l.stress*5);
l.score=(l.capacity*100)/(l.stress+1);

t.liquidity.systemIndex=
(t.liquidity.LOW.score+
t.liquidity.MEDIUM.score+
t.liquidity.HIGH.score)/3;

save();

return review();
}

/* ================= REVIEW ================= */

function review(){

let t=active();
if(!t) return "";

return `
<h3>REVIEW</h3>

<div class="card">
TRX: ${t.id}<br>
Risk: ${t.risk.level}<br>
Pool: ${t.pool.level}<br>
Liquidity: ${t.liquidity.systemIndex.toFixed(2)}
</div>

<button onclick="next()">LOCK</button>
`;
}

/* ================= COMPLETE ================= */

function complete(){

let t=active();
if(!t) return "";

setTimeout(()=>{
QRCode.toCanvas(document.getElementById("q"),JSON.stringify(t));
},300);

return `
<h3>COMPLETE</h3>
<canvas id="q"></canvas>

<button onclick="pdf()">PDF</button>
`;
}

/* ================= PDF ================= */

function pdf(){

let t=active();
if(!t) return;

const {jsPDF}=window.jspdf;
let d=new jsPDF();
let y=10;

d.text("COMET OS RECORD",10,y);y+=8;
d.text("TRX:"+t.id,10,y);y+=6;
d.text("RISK:"+t.risk.level,10,y);y+=6;
d.text("POOL:"+t.pool.level,10,y);y+=6;
d.text("LIQ:"+t.liquidity.systemIndex.toFixed(2),10,y);

d.save("COMET_OS.pdf");
}

/* ================= DASHBOARDS ================= */

function userDashboard(){
let t=active();
return `
<h3>USER DASHBOARD</h3>

<div class="card">
TRX: ${t?.id || "None"}<br>
Risk: ${t?.risk?.level || "N/A"}<br>
Pool: ${t?.pool?.level || "N/A"}
</div>

<button onclick="next()">Continue</button>
`;
}

function agentDashboard(){
let t=active();
return `
<h3>AGENT DASHBOARD</h3>

<div class="card">
TRX: ${t?.id || "None"}<br>
Escrow: ${t?.escrow?.status || "NONE"}
</div>
`;
}

function institutionDashboard(){
return `
<h3>INSTITUTION VIEW</h3>

<div class="card">
TOTAL TRANSACTIONS: ${system.transactions.length}
</div>

${system.transactions.map(t=>`
<div class="card">
${t.id}<br>
Risk:${t.risk?.level||"N/A"}<br>
Pool:${t.pool?.level||"N/A"}<br>
Liquidity:${t.liquidity?.systemIndex?.toFixed?.(2)||0}
</div>
`).join("")}
`;
}

/* ================= ROUTER ================= */

function view(){

ensureSystemReady();

if(system.uiRole==="USER"){
  let t = active();

  if(!t){
    return `<div class="card">Initializing...</div>`;
  }

  switch(t.step){
    case 0:return intro();
    case 1:return role();
    case 2:return purpose();
    case 3:return kyc();
    case 4:return asset();
    case 5:return paymentMode();
    case 6:return escrow();
    case 7:return engine();
    case 8:return complete();
  }
}

if(system.uiRole==="AGENT")return agentDashboard();
if(system.uiRole==="INSTITUTION")return institutionDashboard();

return roleSelect();
}

/* ================= RENDER ================= */

function render(){
ensureSystemReady();

document.getElementById("app").innerHTML=`
<div class="topbar">COMET OS</div>
<div class="screen">${view()}</div>
`;
}

render();

</script>
</body>
</html>
