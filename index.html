<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSTL COMET OS - MVP</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;background:#0b1c2c;color:#fff;text-align:center;padding:10px}
input,textarea{width:90%;padding:10px;margin:5px;border-radius:5px;border:none}
button{width:92%;padding:12px;margin:8px;background:#1f6feb;color:#fff;border:none;border-radius:5px}
.card{background:#13263a;padding:10px;border-radius:10px;margin-top:10px}
</style>
</head>

<body>

<h2>FSTL COMET OS</h2>
<p>Mobile Property Verification MVP</p>

<div class="card">

<input id="owner" placeholder="Owner Name">
<input id="buyer" placeholder="Buyer Name">
<input id="tenant" placeholder="Tenant (optional)">
<textarea id="property" placeholder="Property Details"></textarea>

<button onclick="createTX()">CREATE TRANSACTION</button>
<button onclick="lockTX()" id="lockBtn" style="display:none">LOCK TRANSACTION</button>

</div>

<div id="output" class="card"></div>
<div id="qrcode" class="card"></div>

<script>
let TX = null;
let REGISTRY = JSON.parse(localStorage.getItem("REGISTRY")||"{}");

function hash(data){
let str = JSON.stringify(data);
let h = 0;
for(let i=0;i<str.length;i++){
h = (h<<5)-h+str.charCodeAt(i);
h|=0;
}
return "FSTL-"+Math.abs(h);
}

function createTX(){

let data = {
owner:owner.value,
buyer:buyer.value,
tenant:tenant.value,
property:property.value
};

TX = {
id:"TX-"+Date.now(),
data:data,
hash:hash(data),
state:"EDGE",
time:Date.now()
};

document.getElementById("output").innerHTML =
"<b>TX CREATED</b><br>ID: "+TX.id+"<br>STATE: "+TX.state;

document.getElementById("lockBtn").style.display="block";

showQR(TX);
}

function lockTX(){

TX.state = "NATIONAL_LOCKED";

REGISTRY[TX.id] = TX;
localStorage.setItem("REGISTRY",JSON.stringify(REGISTRY));

document.getElementById("output").innerHTML =
"<b>LOCKED CERTIFICATE</b><br>ID: "+TX.id+"<br>STATE: "+TX.state;

generatePDF(TX);
showQR(TX);
}

function showQR(tx){
document.getElementById("qrcode").innerHTML="";
new QRCode(document.getElementById("qrcode"),{
text: JSON.stringify(tx),
width:150,
height:150
});
}

function verify(id){
let tx = REGISTRY[id];
if(!tx) return "INVALID";

let recomputed = hash(tx.data);
if(recomputed !== tx.hash) return "TAMPERED";

if(tx.state !== "NATIONAL_LOCKED") return "PENDING";

return "VALID";
}

function generatePDF(tx){
const { jsPDF } = window.jspdf;
let doc = new jsPDF();

doc.text("FSTL COMET OS CERTIFICATE",10,10);
doc.text("TX ID: "+tx.id,10,20);
doc.text("OWNER: "+tx.data.owner,10,30);
doc.text("BUYER: "+tx.data.buyer,10,40);
doc.text("STATE: "+tx.state,10,50);

doc.save(tx.id+".pdf");
}
</script>

</body>
</html>
