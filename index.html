<style>
:root{
  --bg:#000000;
  --card:#0a0a0a;
  --accent:#00e6ff;
  --text:#ffffff;
  --muted:#bbbbbb;
  --border:#333333;
}

*{
  box-sizing:border-box;
  font-family:system-ui;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
}

header{
  padding:20px;
  border-bottom:2px solid var(--border);
}

h2{
  margin:0;
  font-size:20px;
}

.container{
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:20px;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:14px;
  border:2px solid var(--border);
}

input, select{
  width:100%;
  padding:16px;
  margin-top:12px;
  border-radius:10px;
  border:2px solid var(--border);
  background:#111;
  color:#fff;
  font-size:16px;
}

input::placeholder{
  color:#888;
}

button{
  width:100%;
  margin-top:16px;
  padding:16px;
  border:none;
  border-radius:10px;
  background:var(--accent);
  color:#000;
  font-weight:800;
  font-size:16px;
}

.mode{
  display:flex;
  gap:12px;
}

.mode button{
  background:#222;
  color:#fff;
}

.mode .active{
  background:var(--accent);
  color:#000;
}

.result{
  font-size:26px;
  font-weight:800;
  color:var(--accent);
  margin-top:10px;
}

.small{
  font-size:14px;
  color:var(--muted);
  margin-top:6px;
}
</style>
