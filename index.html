<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMET OS v10 — Full Stack Transaction System</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0a0a0a;
  color:#fff;
}

#app{
  max-width:520px;
  margin:auto;
  padding:16px;
}

.card{
  background:#171717;
  padding:16px;
  border-radius:16px;
  margin-bottom:12px;
  box-shadow:0 0 0 1px #222;
}

input, select{
  width:100%;
  padding:14px;
  margin-top:10px;
  border-radius:12px;
  border:none;
  background:#222;
  color:#fff;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  margin-top:10px;
  font-weight:600;
}

.primary{ background:#00c853; color:#000;}
.secondary{ background:#2c2c2c; color:#fff;}
.danger{ background:#d50000; color:#fff;}

.badge{
  display:inline-block;
  padding:4px 10px;
  background:#333;
  border-radius:8px;
  font-size:12px;
  margin:3px;
}

.small{ font-size:12px; opacity:0.75; }
hr{ border:0; border-top:1px solid #333; margin:12px 0; }

.center{text-align:center;}
</style>
</head>

<body>
<div id="app"></div>

<canvas id="qr" width="220" height="220" style="display:none;"></canvas>

<script>

const app = document.getElementById("app");
const qr = document.getElementById("qr");
const ctx = qr.getContext("2d");

/* ======================
   STATE
====================== */
let state = {
  stage:"kyc",
  mode:null,

  kyc:{
    owner_verified:false,
    buyer_verified:false,
    tenant_verified:false,
    agent_verified:false
  },

  inputs:{
    owner:"",
    seller:"",
    buyer:"",
    tenant:"",
    agent:"",
    property:""
  },

  payment:{
    required:0,
    status:"NOT_INITIATED"
  },

  trust:0,
  verdict:null,
  graph:null
};

/* ======================
   NAV
====================== */
function go(s){
  state.stage=s;
  render();
}

/* ======================
   KYC SCREEN
====================== */
function kyc(){

  app.innerHTML=`
  <div class="card">
    <h2>KYC VERIFICATION</h2>
    <p class="small">Simulated identity binding layer</p>

    <input placeholder="Owner Name" oninput="set('owner',this.value)">
    <input placeholder="Buyer Name" oninput="set('buyer',this.value)">
    <input placeholder="Tenant Name (optional)" oninput="set('tenant',this.value)">
    <input placeholder="Agent Name (optional)" oninput="set('agent',this.value)">

    <button class="primary" onclick="go('mode')">VERIFY & CONTINUE</button>
  </div>`;
}

/* ======================
   MODE SCREEN
====================== */
function mode(){

  app.innerHTML=`
  <div class="card center">
    <h2>Select Transaction</h2>

    <button class="primary" onclick="select('SALE')">SALE</button>
    <button class="primary" onclick="select('LEASE')">LEASE</button>
  </div>`;
}

function select(m){
  state.mode=m;
  go("input");
}

/* ======================
   INPUT SCREEN
====================== */
function input(){

  const m = state.mode;

  app.innerHTML=`
  <div class="card">
    <h2>${m} TRANSACTION</h2>

    <input placeholder="Owner" value="${state.inputs.owner}" oninput="set('owner',this.value)">
    <input placeholder="Seller (optional)" value="${state.inputs.seller}" oninput="set('seller',this.value)">
    <input placeholder="Buyer" value="${state.inputs.buyer}" oninput="set('buyer',this.value)">
    <input placeholder="Tenant" value="${state.inputs.tenant}" oninput="set('tenant',this.value)">
    <input placeholder="Agent (optional)" value="${state.inputs.agent}" oninput="set('agent',this.value)">
    <input placeholder="Property ID" value="${state.inputs.property}" oninput="set('property',this.value)">

    <button class="primary" onclick="run()">RUN VALIDATION</button>
  </div>`;
}

/* ======================
   SET
====================== */
function set(k,v){
  state.inputs[k]=v;
}

/* ======================
   VALIDATION ENGINE
====================== */
function run(){

  const i = state.inputs;
  const m = state.mode;

  let score = 100;

  if(!i.owner) score-=30;
  if(!i.property) score-=30;

  if(m==="SALE" && !i.buyer) score-=25;
  if(m==="LEASE" && !i.tenant) score-=25;

  if(i.buyer && i.tenant) score-=40;
  if(i.owner && i.seller && i.owner!==i.seller) score-=10;

  state.trust = Math.max(0,score);

  state.payment.required = calculateFee();
  state.payment.status = "PENDING";

  state.verdict = null;

  go("payment");
}

/* ======================
   PAYMENT ENGINE
====================== */
function calculateFee(){

  let base = state.mode==="SALE" ? 5000 : 2000;

  if(state.trust < 60) base += 2000;
  if(state.inputs.agent) base += 1000;

  return base;
}

function payment(){

  app.innerHTML=`
  <div class="card">
    <h2>PAYMENT REQUIRED</h2>

    <p class="small">Transaction Fee: ${state.payment.required}</p>
    <p class="small">Status: ${state.payment.status}</p>

    <button class="primary" onclick="pay()">CONFIRM PAYMENT</button>
  </div>`;
}

function pay(){
  state.payment.status="CONFIRMED";
  finalize();
}

/* ======================
   FINAL ENGINE
====================== */
function finalize(){

  const t = state.trust;

  if(state.payment.status!=="CONFIRMED"){
    state.verdict="LOCKED (PAYMENT REQUIRED)";
  } else {
    if(t>=80) state.verdict="APPROVED";
    else if(t>=50) state.verdict="REVIEW";
    else state.verdict="BLOCKED";
  }

  state.graph = state.inputs;

  go("result");
}

/* ======================
   RESULT
====================== */
function result(){

  app.innerHTML=`
  <div class="card center">
    <h2>${state.verdict}</h2>

    <div class="badge">TRUST ${state.trust}</div>
    <div class="badge">FEE ${state.payment.required}</div>

    <hr>

    <pre class="small">${JSON.stringify(state.graph,null,2)}</pre>

    <button class="primary" onclick="qrExport()">EXPORT QR</button>
    <button class="secondary" onclick="download()">DOWNLOAD DOSSIER</button>
    <button class="danger" onclick="reset()">RESET</button>
  </div>`;
}

/* ======================
   QR
====================== */
function qrExport(){

  qr.style.display="block";

  const data = JSON.stringify({
    mode:state.mode,
    trust:state.trust,
    verdict:state.verdict,
    payment:state.payment
  });

  ctx.fillStyle="#fff";
  ctx.fillRect(0,0,220,220);
  ctx.fillStyle="#000";
  ctx.font="9px monospace";

  data.match(/.{1,22}/g).forEach((l,i)=>{
    ctx.fillText(l,10,20+(i*14));
  });

  const a=document.createElement("a");
  a.href=qr.toDataURL();
  a.download="COMET_QR.png";
  a.click();
}

/* ======================
   DOSSIER
====================== */
function download(){

  const blob = new Blob([
    JSON.stringify({
      mode:state.mode,
      trust:state.trust,
      payment:state.payment,
      inputs:state.inputs,
      verdict:state.verdict
    },null,2)
  ],{type:"application/json"});

  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="COMET_DOSSIER.json";
  a.click();
}

/* ======================
   RESET
====================== */
function reset(){
  state = {
    stage:"kyc",
    mode:null,
    inputs:{owner:"",seller:"",buyer:"",tenant:"",agent:"",property:""},
    payment:{required:0,status:"NOT_INITIATED"},
    trust:0,
    verdict:null,
    graph:null
  };
  qr.style.display="none";
  render();
}

/* ======================
   ROUTER
====================== */
function render(){
  if(state.stage==="kyc") return kyc();
  if(state.stage==="mode") return mode();
  if(state.stage==="input") return input();
  if(state.stage==="payment") return payment();
  if(state.stage==="result") return result();
}

render();

</script>
</body>
</html>
