 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMET OS</title>

<style>
body{
  margin:0;
  font-family:system-ui;
  background:#0b0b0b;
  color:#fff;
}

#app{
  padding:20px;
}

.card{
  background:#1a1a1a;
  padding:16px;
  border-radius:12px;
  margin-bottom:12px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  margin-top:10px;
  font-weight:bold;
}

.primary{ background:#00c853; color:#000;}
.warn{ background:#ffab00; color:#000;}
.danger{ background:#d50000; color:#fff;}

input{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:8px;
  border:none;
  background:#2a2a2a;
  color:#fff;
}
</style>
</head>

<body>

<div id="app"></div>

<script>

/* ======================
   STATE (FRONTEND ONLY)
====================== */
let state = {
  role: null,
  data: {
    agent: "",
    owner: "",
    property: ""
  },
  signals: {
    contradictions: 0,
    completeness: 0
  },
  verdict: null
};

/* ======================
   NAV RENDER
====================== */
function render(){

  if(!state.role){
    return roleScreen();
  }

  if(!state.verdict){
    return agentScreen();
  }

  return resultScreen();

}

/* ======================
   ROLE SELECT
====================== */
function roleScreen(){
  app.innerHTML = `
  <div class="card">
    <h2>COMET OS</h2>
    <p>Select Role</p>
    <button class="primary" onclick="setRole('agent')">Agent</button>
    <button onclick="setRole('institution')">Institution</button>
    <button onclick="setRole('government')">Government</button>
  </div>
  `;
}

/* ======================
   SET ROLE
====================== */
function setRole(r){
  state.role = r;
  render();
}

/* ======================
   AGENT INPUT SCREEN
====================== */
function agentScreen(){

  app.innerHTML = `
  <div class="card">
    <h3>Transaction Input</h3>

    <input placeholder="Agent Name"
      oninput="updateField('agent', this.value)">

    <input placeholder="Owner Name"
      oninput="updateField('owner', this.value)">

    <input placeholder="Property ID"
      oninput="updateField('property', this.value)">
      
    <button class="primary" onclick="runComet()">Run COMET OS</button>
  </div>

  <div class="card">
    <h4>System Status</h4>
    <p>Completeness: ${state.signals.completeness}%</p>
    <p>Contradictions: ${state.signals.contradictions}</p>
  </div>
  `;
}

/* ======================
   UPDATE INPUT
====================== */
function updateField(field, value){
  state.data[field] = value;
  patrol(); // continuous observation
}

/* ======================
   PATROL MODEL
====================== */
function patrol(){

  let d = state.data;

  // reset signals
  state.signals.contradictions = 0;
  state.signals.completeness = 0;

  // completeness check
  let filled = Object.values(d).filter(v=>v).length;
  state.signals.completeness = Math.floor((filled/3)*100);

  // contradiction rules
  if(d.agent && d.owner && d.agent === d.owner){
    state.signals.contradictions++;
  }

  if(d.property && d.property.length < 3){
    state.signals.contradictions++;
  }

  render();
}

/* ======================
   COMET PROCESS
====================== */
function runComet(){

  let c = state.signals.contradictions;
  let comp = state.signals.completeness;

  // ZERO TOLERANCE
  if(c > 0){
    state.verdict = "BLOCK";
  }
  else if(comp < 100){
    state.verdict = "REVIEW";
  }
  else{
    state.verdict = "APPROVE";
  }

  render();
}

/* ======================
   RESULT SCREEN
====================== */
function resultScreen(){

  let v = state.verdict;

  let color = "primary";
  if(v === "REVIEW") color = "warn";
  if(v === "BLOCK") color = "danger";

  let explanation = {
    APPROVE: "Transaction structurally sound",
    REVIEW: "Incomplete data detected",
    BLOCK: "Critical inconsistency detected"
  };

  app.innerHTML = `
  <div class="card">
    <h2>VERDICT: ${v}</h2>
    <p>${explanation[v]}</p>
    <button class="${color}" onclick="reset()">Start New</button>
  </div>
  `;

}

/* ======================
   RESET
====================== */
function reset(){
  state.verdict = null;
  state.data = {agent:"", owner:"", property:""};
  state.signals = {contradictions:0, completeness:0};
  render();
}

/* INIT */
render();

</script>

</body>
</html>
