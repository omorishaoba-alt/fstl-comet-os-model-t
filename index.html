<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FSTL COMET OS — Auto Report</title><style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Arial;background:#070d18;color:#fff}
.header{padding:14px 16px;background:#0b1220;border-bottom:1px solid #1c2a44;font-weight:700}
.container{padding:14px}
.card{background:#111c2e;padding:14px;border-radius:12px;margin-top:12px}
input,select,textarea{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none;background:#152238;color:#fff}
button{width:100%;padding:14px;margin-top:12px;border:none;border-radius:12px;background:#1e88e5;color:#fff;font-weight:600}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.badge{padding:6px 10px;border-radius:8px;font-weight:bold;display:inline-block}
.green{background:#2e7d32}.orange{background:#f9a825}.red{background:#c62828}
.small{font-size:12px;color:#9fb3c8}
pre{white-space:pre-wrap;background:#0b1220;padding:12px;border-radius:10px;border:1px solid #1c2a44}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.hidden{display:none}
</style></head>
<body><div class="header">FSTL COMET OS — Auto Report Generator</div><div class="container">  <!-- INPUT -->  <div class="card">
    <h3>Identity Layer</h3>
    <div class="row">
      <input id="nin" placeholder="NIN (optional)"/>
      <input id="bvn" placeholder="BVN (optional)"/>
    </div>
    <input id="owner" placeholder="Owner"/>
    <input id="seller" placeholder="Seller"/>
    <input id="buyer" placeholder="Buyer"/>
    <input id="agent" placeholder="Agent (optional)"/>
  </div>  <div class="card">
    <h3>Property Layer</h3>
    <div class="row">
      <input id="type" placeholder="Property Type"/>
      <input id="location" placeholder="Location"/>
    </div>
    <select id="condition">
      <option value="GOOD">GOOD</option>
      <option value="FAIR">FAIR</option>
      <option value="UNCERTAIN">UNCERTAIN</option>
      <option value="DISPUTED">DISPUTED</option>
    </select>
    <textarea id="note" rows="3" placeholder="FSTL Observations (optional)"></textarea>
    <button onclick="runCOMET()">RUN COMET OS & GENERATE REPORT</button>
  </div>  <!-- RESULT SUMMARY -->  <div id="summary" class="card hidden"></div>  <!-- REPORT -->  <div class="card hidden" id="reportCard">
    <h3>FSTL Report (Auto-Generated)</h3>
    <pre id="report"></pre>
    <div class="actions">
      <button onclick="copyReport()">COPY REPORT</button>
      <button onclick="downloadReport()">DOWNLOAD .TXT</button>
    </div>
    <p class="small">Tip: Copy and paste into WhatsApp, or download and share as a file.</p>
  </div></div><script>

/* ====== LEDGER (memory) ====== */
let LEDGER = JSON.parse(localStorage.getItem("FSTL_LEDGER") || "[]");

/* ====== HELPERS ====== */
function pad(n){return n<10?"0"+n:n}
function nowDate(){
  const d=new Date();
  return pad(d.getDate())+"/"+pad(d.getMonth()+1)+"/"+d.getFullYear();
}
function makeCaseId(){
  const d=new Date();
  const id = d.getFullYear()+""+pad(d.getMonth()+1)+""+pad(d.getDate())+"-"+pad(d.getHours())+pad(d.getMinutes())+pad(d.getSeconds());
  return "FSTL-CASE-"+id;
}

/* ====== ENGINE ====== */
function runCOMET(){
  // identity score
  let iScore=0;
  if(!nin.value) iScore+=1;
  if(!bvn.value) iScore+=1;
  if(owner.value && buyer.value && owner.value===buyer.value) iScore+=3;
  if(owner.value && seller.value && owner.value===seller.value) iScore+=3;

  // property score
  let pScore=0;
  if(!type.value) pScore+=2;
  if(!location.value) pScore+=2;
  if(condition.value==="UNCERTAIN") pScore+=3;
  if(condition.value==="DISPUTED") pScore+=5;

  // ledger pattern (lightweight)
  let lScore=0;
  LEDGER.forEach(old=>{
    const names=[owner.value,buyer.value,seller.value].filter(Boolean);
    names.forEach(n=>{
      if(old.parties && Object.values(old.parties).includes(n)) lScore+=1;
    });
    if(old.asset && old.asset.location && location.value && old.asset.location===location.value) lScore+=1;
  });

  const risk = iScore + pScore + lScore;

  let decision = "APPROVED";
  if(risk>=8) decision="BLOCKED"; else if(risk>=4) decision="CONDITIONAL";

  const color = (risk>=8)?"red":(risk>=4?"orange":"green");

  // build case
  const CASE = {
    id: makeCaseId(),
    date: nowDate(),
    asset: {type:type.value, location:location.value, condition:condition.value},
    parties: {owner:owner.value, seller:seller.value, buyer:buyer.value, agent:agent.value},
    identity: {nin: nin.value?"Provided":"Not Provided", bvn: bvn.value?"Provided":"Not Provided"},
    scores: {identity:iScore, property:pScore, ledger:lScore, total:risk},
    decision: decision,
    note: note.value
  };

  // save
  LEDGER.push(CASE);
  localStorage.setItem("FSTL_LEDGER", JSON.stringify(LEDGER));

  // summary UI
  summary.classList.remove('hidden');
  summary.innerHTML = `\n    <span class="badge ${color}">${decision}</span><br><br>\n    <b>Risk Score:</b> ${risk}<br>\n    <b>Identity Score:</b> ${iScore} | <b>Property Score:</b> ${pScore} | <b>Ledger Score:</b> ${lScore}<br>\n    <span class="small">Case saved to local ledger.</span>\n  `;

  // generate report text
  const reportText = buildReport(CASE);
  reportCard.classList.remove('hidden');
  report.textContent = reportText;
}

/* ====== REPORT BUILDER ====== */
function buildReport(c){
  const interp = c.decision==="APPROVED" ?
    "APPROVED → Transaction structure is consistent with low risk indicators." :
    (c.decision==="CONDITIONAL" ?
      "CONDITIONAL → Some risk signals present; proceed with caution and further checks." :
      "BLOCKED → High-risk indicators detected; transaction not advised.");

  const obs = c.note && c.note.trim().length>0 ? c.note : "No additional observations provided.";

  return (
`FIRST STANDARD TITLE LIMITED\nTransforming Assets into Capital\n\n----------------------------------------\n\nFSTL PROPERTY VERIFICATION REPORT\n\nCase ID: ${c.id}\nDate: ${c.date}\n\n----------------------------------------\n\nPROPERTY DETAILS\nType: ${c.asset.type || '-'}\nLocation: ${c.asset.location || '-'}\nDeclared Condition: ${c.asset.condition}\n\n----------------------------------------\n\nPARTIES INVOLVED\nOwner: ${c.parties.owner || '-'}\nSeller: ${c.parties.seller || '-'}\nBuyer: ${c.parties.buyer || '-'}\nAgent (if any): ${c.parties.agent || 'N/A'}\n\nIdentity Inputs (where provided):\nNIN: ${c.identity.nin}\nBVN: ${c.identity.bvn}\n\n----------------------------------------\n\nASSESSMENT SUMMARY\n\n• Identity consistency reviewed\n• Transaction structure evaluated\n• Property condition assessed\n• Risk indicators analyzed using COMET OS\n\n----------------------------------------\n\nSYSTEM OUTPUT\n\nDecision: ${c.decision}\nRisk Score: ${c.scores.total}\n\n----------------------------------------\n\nINTERPRETATION\n\n${interp}\n\n----------------------------------------\n\nFSTL OBSERVATIONS\n\n${obs}\n\n----------------------------------------\n\nIMPORTANT NOTICE\n\nThis report is generated using structured inputs and internal verification processes.\nIt is provided strictly for decision support purposes.\n\nClients are strongly advised to independently confirm all critical details, including title status, ownership rights, and legal documentation, before concluding any transaction.\n\n----------------------------------------\n\nFIRST STANDARD TITLE LIMITED\n\nAddress:\nNo. 19 Egbor Avenue, GRA,\nBenin City, Nigeria\n\nTelephone / WhatsApp:\n+234 803 588 8622\n\nEmail:\nfstlsite@gmail.com\n\nBanking Details:\nBank: First Bank of Nigeria Plc (FBHN PLC)\nAccount Name: First Standard Limited\nAccount Number: 2025222557\n\n----------------------------------------`);
}

/* ====== ACTIONS ====== */
function copyReport(){
  const text = report.textContent;
  navigator.clipboard.writeText(text).then(()=>{
    alert('Report copied. Paste into WhatsApp.');
  }).catch(()=>{
    alert('Copy failed. Long-press to select and copy manually.');
  });
}

function downloadReport(){
  const blob = new Blob([report.textContent], {type: 'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'FSTL_Report_'+Date.now()+'.txt';
  a.click();
  URL.revokeObjectURL(a.href);
}

</script></body>
</html>
