<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>FSTL COMET OS</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:#fff;
font-size:16px;
}

.card{
background:#111c2e;
padding:18px;
margin:10px;
border-radius:14px;
}

.screen{display:none;padding:10px;}
.active{display:block;}

button{
width:100%;
padding:16px;
margin-top:12px;
border:none;
border-radius:12px;
background:#1e88e5;
color:#fff;
font-weight:bold;
font-size:16px;
}

input{
width:100%;
padding:14px;
margin-top:10px;
border-radius:10px;
border:none;
background:#152238;
color:#fff;
font-size:16px;
}

label{
display:block;
margin:8px 0;
}

.badge{
padding:6px 10px;
border-radius:8px;
font-weight:bold;
display:inline-block;
}

.green{background:#2e7d32;}
.orange{background:#f9a825;}
.red{background:#c62828;}
.blue{background:#1e88e5;}

.qrbox{
background:#fff;
padding:12px;
border-radius:10px;
text-align:center;
margin-top:10px;
}

.small{font-size:12px;color:#9fb3c8;}
</style>
</head>

<body>

<div class="card">
<b>FSTL COMET OS</b><br>
<span class="small">Land & Property Verification Engine</span>
</div>

<!-- STEP 0 -->
<div id="s0" class="screen active">
<div class="card">
<h2>Start</h2>
<button onclick="go(1)">START</button>
</div>
</div>

<!-- STEP 1 -->
<div id="s1" class="screen">
<div class="card">
<h3>Select Mode</h3>
<button onclick="setRole('USER')">USER</button>
<button onclick="setRole('AGENT')">AGENT</button>
<button onclick="setRole('ADMIN')">ADMIN</button>
<div id="roleOut"></div>
</div>
</div>

<!-- STEP 2 -->
<div id="s2" class="screen">
<div class="card">
<h3>Property Input</h3>
<input id="type" placeholder="Property Type"/>
<input id="location" placeholder="Location"/>
<input id="owner" placeholder="Owner"/>
<input id="buyer" placeholder="Buyer"/>
<input id="seller" placeholder="Seller"/>
<button onclick="createCase()">CONTINUE</button>
</div>
</div>

<!-- STEP 3 -->
<div id="s3" class="screen">
<div class="card">
<h3>Verification</h3>

<label><input type="checkbox" id="v_title"/> Title Verified</label>
<label><input type="checkbox" id="v_id"/> Identity Verified</label>
<label><input type="checkbox" id="v_docs"/> Documents Complete</label>

<hr>

<label><input type="checkbox" id="r_duplicate"/> Duplicate Case</label>
<label><input type="checkbox" id="r_suspect"/> Suspicious Pattern</label>

<button onclick="runDecision()">RUN DECISION</button>
</div>
</div>

<!-- STEP 4 -->
<div id="s4" class="screen">
<div class="card">
<h3>Result</h3>
<div id="result"></div>
<div id="qr" class="qrbox"></div>
<button onclick="resetAll()">NEW CASE</button>
</div>
</div>

<script>

/* STATE */
let STATE = {
role:null,
current:null
};

/* NAV */
function go(i){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById("s"+i).classList.add("active");
}

/* ROLE */
function setRole(r){
STATE.role = r;
document.getElementById("roleOut").innerHTML =
`<span class="badge blue">${r}</span>`;
go(2);
}

/* CREATE CASE */
function createCase(){

let t = document.getElementById("type").value.trim();
let l = document.getElementById("location").value.trim();

if(!t || !l){
alert("Type and Location required");
return;
}

STATE.current = {
id:"CASE-"+Date.now(),
type:t,
location:l,
owner:owner.value,
buyer:buyer.value,
seller:seller.value
};

go(3);
}

/* DECISION ENGINE */
function runDecision(){

let score = 0;

if(!STATE.current.owner) score+=2;
if(!STATE.current.type) score+=2;
if(!STATE.current.location) score+=2;

let verified =
(v_title.checked?2:0)+
(v_id.checked?2:0)+
(v_docs.checked?1:0);

let risk =
(r_duplicate.checked?3:0)+
(r_suspect.checked?3:0);

let finalScore = score + risk - verified;

let decision =
finalScore >=5 ? "BLOCKED" :
finalScore >2 ? "CONDITIONAL" :
"APPROVED";

let color =
decision==="APPROVED"?"green":
decision==="CONDITIONAL"?"orange":"red";

STATE.current.decision = decision;

/* RESULT */
result.innerHTML =
`<span class="badge ${color}">${decision}</span><br><br>
Case ID: ${STATE.current.id}<br>
Score: ${finalScore}`;

/* SIMPLE QR (NO LIBRARY NEEDED) */
qr.innerHTML = `<div style="color:black;font-size:12px;word-break:break-all;">
${btoa(JSON.stringify(STATE.current))}
</div>`;

go(4);
}

/* RESET */
function resetAll(){
STATE.current=null;
go(0);
}

</script>

</body>
</html>
