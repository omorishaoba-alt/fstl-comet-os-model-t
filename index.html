<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMET OS</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#081b2e;
  color:#fff;
}

.container{
  max-width:520px;
  margin:auto;
  padding:16px;
}

.card{
  background:#0d2a45;
  padding:14px;
  border-radius:10px;
  margin-bottom:12px;
}

input{
  width:100%;
  padding:14px;
  margin-bottom:10px;
  border:none;
  border-radius:10px;
  font-size:16px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  margin-top:6px;
}

.primary{
  background:#fff;
  color:#081b2e;
}

.secondary{
  background:#123a5c;
  color:#fff;
}

.log{
  font-family:monospace;
  font-size:12px;
  white-space:pre-wrap;
}

h3{margin:0 0 10px;}
</style>
</head>

<body>

<div class="container">

  <div class="card">
    <h3>CREATE CAPITAL UNIT</h3>

    <input id="asset" placeholder="Asset (Land / Rent / Claim)" />
    <input id="location" placeholder="Location" />
    <input id="claimant" placeholder="Claimant" />
    <input id="value" placeholder="Value" />

    <button class="primary" onclick="createCU()">GENERATE</button>
  </div>

  <div class="card">
    <h3>VALIDATION</h3>

    <input id="signal1" placeholder="Bank Signal" />
    <input id="signal2" placeholder="Community Signal" />

    <button class="secondary" onclick="applySignals()">APPLY</button>
  </div>

  <div class="card">
    <h3>POOL DASHBOARD</h3>
    <div id="dashboard" class="log"></div>
  </div>

  <div class="card">
    <h3>CAPITAL UNITS</h3>
    <div id="units" class="log"></div>
  </div>

</div>

<script>

/* ========= STORAGE ========= */

let state = JSON.parse(localStorage.getItem("comet_pool") || "{}");
state.units = state.units || [];

/* ========= HASH ========= */

async function hash(data){
  const enc = new TextEncoder().encode(JSON.stringify(data));
  const buf = await crypto.subtle.digest("SHA-256", enc);
  return [...new Uint8Array(buf)].map(b=>b.toString(16).padStart(2,"0")).join("");
}

/* ========= CREATE CU ========= */

async function createCU(){

  let unit = {
    id: "CU-" + Date.now().toString(36).toUpperCase(),
    asset: asset.value,
    location: location.value,
    claimant: claimant.value,
    value: parseFloat(value.value) || 0,
    validations: 0,
    time: Date.now()
  };

  // base risk
  let risk = 100;
  if(!unit.asset) risk -= 20;
  if(!unit.location) risk -= 20;
  if(!unit.claimant) risk -= 20;
  if(!unit.value) risk -= 20;

  unit.risk = risk;

  unit.fingerprint = await hash(unit);

  state.units.push(unit);

  save();
  render();

  clearInputs();
}

/* ========= APPLY VALIDATION ========= */

function applySignals(){

  let u = state.units[state.units.length-1];
  if(!u) return;

  let boost = 0;

  if(signal1.value) boost += 10;
  if(signal2.value) boost += 10;

  u.validations += boost > 0 ? 1 : 0;
  u.risk = Math.max(10, u.risk - boost);

  save();
  render();

  signal1.value = "";
  signal2.value = "";
}

/* ========= DASHBOARD ========= */

function renderDashboard(){

  let total = state.units.length;

  let totalValue = state.units.reduce((a,b)=>a+b.value,0);

  let low = state.units.filter(u=>u.risk <= 40).length;
  let med = state.units.filter(u=>u.risk > 40 && u.risk <=70).length;
  let high = state.units.filter(u=>u.risk > 70).length;

  document.getElementById("dashboard").innerText = `
TOTAL UNITS: ${total}
TOTAL VALUE: ${totalValue}

LOW RISK: ${low}
MEDIUM: ${med}
HIGH: ${high}
  `;
}

/* ========= RENDER UNITS ========= */

function renderUnits(){

  document.getElementById("units").innerText = state.units.map(u=>`
ID: ${u.id}
ASSET: ${u.asset}
LOCATION: ${u.location}
CLAIMANT: ${u.claimant}
VALUE: ${u.value}
RISK: ${u.risk}
VALIDATIONS: ${u.validations}
-------------------------
  `).join("\n");
}

/* ========= CORE ========= */

function render(){
  renderDashboard();
  renderUnits();
}

function save(){
  localStorage.setItem("comet_pool", JSON.stringify(state));
}

function clearInputs(){
  asset.value = "";
  location.value = "";
  claimant.value = "";
  value.value = "";
}

/* ========= INIT ========= */

render();

</script>

</body>
</html>
