<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSTL COMET OS</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;margin:0;background:#0b1c2c;color:#fff;}
.header{text-align:center;padding:20px;background:#071521;font-size:22px;font-weight:bold;}
.page{display:none;padding:15px;}
.active{display:block;}
.card{background:#13263a;padding:15px;border-radius:12px;margin-bottom:12px;}
input,textarea,select{width:100%;padding:14px;margin:8px 0;border-radius:8px;border:none;font-size:16px;}
button{width:100%;padding:15px;margin:10px 0;background:#1f6feb;color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:bold;}
.secondary{background:#444;}
.warning{color:#ffcc00;font-size:13px;}
.center{text-align:center;}
</style>
</head>

<body>

<div class="header">FSTL COMET OS</div>

<!-- COVER -->
<div id="p0" class="page active center">
<div class="card">
<h2>Property Verification System</h2>
<p class="warning">FSTL SYSTEM CLEARANCE REQUIRED</p>
</div>
<button onclick="show(1)">Start Verification</button>
</div>

<!-- 1 -->
<div id="p1" class="page">
<div class="card">
<h3>Transaction Roles</h3>

<input id="owner" placeholder="Legal Owner">
<input id="seller" placeholder="Seller (Executor)">
<input id="buyer" placeholder="Buyer">
<input id="tenant" placeholder="Tenant (optional)">

<select id="role">
<option value="">Role</option>
<option value="Agent">Agent</option>
<option value="OwnerRep">Owner Rep</option>
<option value="Buyer">Buyer</option>
<option value="Tenant">Tenant</option>
</select>

<select id="legal">
<option value="">Legal Status</option>
<option value="normal">Normal</option>
<option value="probate">Probate / Estate</option>
</select>

</div>
<button onclick="show(2)">Continue</button>
</div>

<!-- 2 -->
<div id="p2" class="page">
<div class="card">
<h3>Identity</h3>
<input id="nin" placeholder="NIN">
<input id="bvn" placeholder="BVN">
</div>
<button onclick="show(3)">Continue</button>
</div>

<!-- 3 -->
<div id="p3" class="page">
<div class="card">
<h3>Property</h3>
<textarea id="desc" placeholder="Description"></textarea>
<input id="location" placeholder="Location">
</div>
<button onclick="show(4)">Continue</button>
</div>

<!-- 4 -->
<div id="p4" class="page">
<div class="card">
<h3>Payment</h3>

<p><b>₦25,000 Verification Fee</b></p>

<div class="card" style="background:#0f2233;">
<p>First Bank Nigeria</p>
<p>FIRST STANDARD TITLE LIMITED</p>
<p>2025222557</p>
</div>

<input id="receipt" placeholder="Reference">
<label><input type="checkbox" id="paid"> Paid</label><br>
<label><input type="checkbox" id="confirm"> Confirm Accuracy</label>

</div>
<button onclick="show(5)">Continue</button>
</div>

<!-- 5 -->
<div id="p5" class="page center">
<div class="card">
<h3>Final Gate</h3>
<p class="warning">System validates ownership + authority + structure</p>
</div>
<button onclick="generate()">Generate</button>
</div>

<!-- OUTPUT -->
<div id="p6" class="page center">
<div class="card">
<h3>Verified Transaction</h3>
<div id="qr"></div>
<p id="tx"></p>
<p id="state"></p>
</div>

<button onclick="downloadPDF()">Download PDF</button>
<button class="secondary" onclick="resetAll()">Reset</button>
</div>

<script>

/* ================= CORE STATE ================= */
let LOCK = false;
let SEALED = false;
let FORCE_STOP = false;
let STATE = 0;
let DATA = null;
let TX_HASH = "";

/* ================= NAV CONTROL ================= */
function show(n){

if(FORCE_STOP || SEALED){
alert("SYSTEM LOCKED");
return;
}

if(n > STATE + 1){
alert("INVALID STATE JUMP");
return;
}

STATE = n;

document.querySelectorAll(".page")
.forEach(p=>p.classList.remove("active"));

document.getElementById("p"+n).classList.add("active");
}

/* ================= INPUT ================= */
function val(id){
return document.getElementById(id)?.value?.trim() || "";
}

/* ================= VALIDATION ================= */
function validate(){

if(FORCE_STOP || SEALED) return false;

const f = ["owner","seller","buyer","nin","bvn","desc","location"];

for(let x of f){
if(!val(x) || val(x).length < 2) return false;
}

return true;
}

/* ================= HASH ENGINE ================= */
async function hashData(obj){
const msg = JSON.stringify(obj);
const enc = new TextEncoder().encode(msg);
const hashBuffer = await crypto.subtle.digest("SHA-256", enc);
return [...new Uint8Array(hashBuffer)]
.map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* ================= GENERATE ================= */
async function generate(){

if(LOCK || SEALED){
alert("GENERATION BLOCKED");
return;
}

if(!validate()){
alert("Incomplete data");
return;
}

LOCK = true;

DATA = {
owner:val("owner"),
seller:val("seller"),
buyer:val("buyer"),
tenant:val("tenant"),
role:val("role"),
legal:val("legal"),
nin:val("nin"),
bvn:val("bvn"),
desc:val("desc"),
location:val("location"),
time:new Date().toISOString(),
tx:"TX-"+Date.now()
};

TX_HASH = await hashData(DATA);
DATA.hash = TX_HASH;

/* QR */
qr.innerHTML="";
new QRCode(qr,{
text:JSON.stringify(DATA),
width:180,
height:180
});

tx.innerText = DATA.tx;

/* STATE LOCK */
SEALED = true;
STATE = 6;

document.getElementById("state").innerText =
"SYSTEM STATE: SEALED | NO MODIFICATION ALLOWED";

show(6);
}

/* ================= PDF ================= */
function downloadPDF(){

const { jsPDF } = window.jspdf;
let doc = new jsPDF();

doc.text("FSTL COMET OS REPORT",10,10);

doc.text("TX: "+DATA.tx,10,20);
doc.text("HASH: "+DATA.hash,10,30);

doc.text("OWNER: "+DATA.owner,10,40);
doc.text("SELLER: "+DATA.seller,10,50);
doc.text("BUYER: "+DATA.buyer,10,60);
doc.text("TENANT: "+DATA.tenant,10,70);

doc.text("LEGAL: "+DATA.legal,10,80);

doc.text("NIN: "+DATA.nin,10,90);
doc.text("BVN: "+DATA.bvn,10,100);

doc.text("PROPERTY: "+DATA.desc,10,110);
doc.text("LOCATION: "+DATA.location,10,120);

doc.text("FSTL SYSTEM SEALED RECORD",10,140);

doc.save("FSTL_COMET_OS.pdf");
}

/* RESET */
function resetAll(){
location.reload();
}

/* FORCE STOP */
function forceStop(){
FORCE_STOP = true;
SEALED = true;
LOCK = true;
alert("SYSTEM FORCE STOPPED");
}

</script>

</body>
</html>
