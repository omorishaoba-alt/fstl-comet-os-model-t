<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSTL COMET OS</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0a2a66;
}
.app{
    max-width:420px;
    margin:auto;
    background:#fff;
    min-height:100vh;
    padding:16px;
}
h2{
    text-align:center;
    color:#0a2a66;
}
.fee{
    text-align:center;
    padding:10px;
    background:#eef3ff;
    margin-bottom:10px;
    font-weight:bold;
}
input,textarea,select{
    width:100%;
    padding:12px;
    margin:6px 0;
}
button{
    width:100%;
    padding:14px;
    margin-top:10px;
    background:#0a2a66;
    color:#fff;
    border:none;
}
#qr{
    display:flex;
    justify-content:center;
    margin:12px 0;
}
.status{
    text-align:center;
    margin:10px 0;
}
.hidden{
    display:none;
}
</style>
</head>

<body>

<div class="app">

<h2>PROPERTY VERIFICATION</h2>

<div class="fee">
Fee: ₦5,000 — Complete Verification Record
</div>

<div class="status" id="status">ENTER DETAILS</div>

<input id="name" placeholder="Full Name">
<input id="nin" placeholder="NIN / ID">
<input id="bvn" placeholder="BVN (optional)">

<select id="role">
<option>Owner</option>
<option>Buyer</option>
<option>Tenant</option>
<option>Agent</option>
</select>

<input id="property" placeholder="Property Type">
<input id="location" placeholder="Location">
<input id="value" placeholder="Value">

<textarea id="ownership" placeholder="Ownership / Possession History"></textarea>

<label>
<input type="checkbox" id="confirm">
I confirm all information is accurate
</label>

<button onclick="process()">VERIFY & PAY</button>

<div id="output" class="hidden">
<div id="qr"></div>
<div id="ref" class="status"></div>
<button onclick="pdf()">DOWNLOAD PDF</button>
</div>

</div>

<script>

const TX = {
    id: "FSTL-" + Date.now(),
    data: {},
    hash: null
};

function hash(data){
    return btoa(JSON.stringify(data)).slice(0,40);
}

function process(){

    if(!document.getElementById("confirm").checked){
        alert("Confirm details");
        return;
    }

    TX.data = {
        name: v("name"),
        nin: v("nin"),
        bvn: v("bvn"),
        role: v("role"),
        property: v("property"),
        location: v("location"),
        value: v("value"),
        ownership: v("ownership")
    };

    TX.hash = hash(TX.data);

    // simulate payment success
    document.getElementById("status").innerText = "PROCESSING...";
    
    setTimeout(()=>{
        complete();
    },1000);
}

function complete(){

    document.getElementById("status").innerText = "VERIFIED";

    document.getElementById("output").classList.remove("hidden");

    document.getElementById("ref").innerText = TX.id;

    new QRCode(document.getElementById("qr"), {
        text: JSON.stringify({
            id: TX.id,
            hash: TX.hash
        }),
        width:130,
        height:130
    });
}

function pdf(){

    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();

    let y = 20;

    doc.text("FSTL COMET OS VERIFICATION RECORD",20,y); y+=10;
    doc.text("ID: " + TX.id,20,y); y+=10;
    doc.text("HASH: " + TX.hash,20,y); y+=10;

    for(let k in TX.data){
        doc.text(k + ": " + TX.data[k],20,y);
        y+=10;
    }

    doc.addPage();
    doc.text("DECLARATION",20,20);
    doc.text("User confirms accuracy of all submitted data.",20,30);

    doc.addPage();
    doc.text("TRACEABILITY",20,20);
    doc.text("QR-linked transaction record.",20,30);

    doc.addPage();
    doc.text("FINAL STATUS",20,20);
    doc.text("VERIFIED RECORD ISSUED",20,30);

    doc.save("FSTL_RECORD.pdf");
}

function v(id){
    return document.getElementById(id).value;
}

</script>

</body>
</html>
