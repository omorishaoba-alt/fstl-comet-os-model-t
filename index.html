<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FSTL COMET OS</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:#fff;
}

.card{
  background:#111c2e;
  padding:14px;
  margin:10px;
  border-radius:12px;
}

button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#1e88e5;
  color:#fff;
  font-weight:bold;
}

select,input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
  background:#152238;
  color:#fff;
}

.small{font-size:12px;color:#9fb3c8}
.badge{padding:6px 10px;border-radius:8px;font-weight:bold;display:inline-block}
.green{background:#2e7d32}
.orange{background:#f9a825}
.red{background:#c62828}
</style>
</head>

<body>

<div class="card">
<b>COMET OS Assistant</b><br>
<span class="small">Structured transaction + identity engine</span>
</div>

<div class="card">
<b>Case Summary</b>
<div id="summary">No data captured yet.</div>
</div>

<div class="card">

<div id="questionText"></div>

<select id="dropdown"></select>
<input id="textInput" style="display:none"/>

<div class="small" id="whyText"></div>

<button onclick="nextStep()">Continue</button>

</div>

<div class="card" id="resultCard" style="display:none">
<div id="result"></div>
</div>

<script>

/* ================= STATE ================= */

let step = 0;
let data = {};

/* ================= FLOW ================= */

const flow = [

{
key:"role",
q:"Who are you in this transaction?",
type:"select",
options:["Owner","Buyer","Seller","Agent","Executor"],
why:"Defines user role context"
},

{
key:"transaction",
q:"What type of transaction is this?",
type:"select",
options:["Sale","Probate","Transfer","Mortgage"],
why:"Defines transaction category"
},

{
key:"structure",
q:"Is this Direct or Indirect transaction?",
type:"select",
options:["Direct","Indirect"],
why:"Defines relationship structure"
},

{
key:"owner",
q:"Enter Owner Name",
type:"text",
why:"Ownership identity"
},

{
key:"seller",
q:"Enter Seller Name",
type:"text",
why:"Seller identity"
},

{
key:"buyer",
q:"Enter Buyer Name",
type:"text",
why:"Buyer identity"
},

/* ================= FIXED AGENT SYSTEM ================= */

{
key:"agent_status",
q:"Is an Agent involved in this transaction?",
type:"select",
options:["NO AGENT","AGENT INVOLVED"],
why:"Determines if intermediary exists"
},

{
key:"agent_name",
q:"Select Agent Name (if applicable)",
type:"select",
options:["N/A","Agent A","Agent B","Agent C","Other"],
why:"Agent identity (only valid if agent exists)"
},

{
key:"kyc_name",
q:"KYC Name (Person completing this)",
type:"text",
why:"User identity anchor"
},

{
key:"kyc_idType",
q:"Select ID Type",
type:"select",
options:["NIN","BVN","PASSPORT","DRIVERS_LICENSE"],
why:"Identity classification"
},

{
key:"kyc_capacity",
q:"Select Capacity",
type:"select",
options:["OWNER","BUYER","SELLER","AGENT","EXECUTOR","ADMINISTRATOR"],
why:"Legal capacity classification"
}

];

/* ================= RENDER ================= */

function renderStep(){

let f = flow[step];

document.getElementById("questionText").innerText = f.q;
document.getElementById("whyText").innerText = f.why;

let dd = document.getElementById("dropdown");
let inp = document.getElementById("textInput");

dd.innerHTML = "";

if(f.type === "select"){
  dd.style.display = "block";
  inp.style.display = "none";

  f.options.forEach(o=>{
    let opt = document.createElement("option");
    opt.value = o;
    opt.text = o;
    dd.appendChild(opt);
  });

  dd.selectedIndex = 0;

}else{
  dd.style.display = "none";
  inp.style.display = "block";
  inp.value = "";
}
}

/* ================= INPUT STORAGE ================= */

function clean(v){
if(!v) return "";
v = v.trim().toUpperCase();
if(v === "NONE" || v === "N/A") return "";
return v;
}

/* ================= NEXT ================= */

function nextStep(){

let f = flow[step];

let value = (f.type === "select")
  ? document.getElementById("dropdown").value
  : document.getElementById("textInput").value.trim();

/* STORE */
data[f.key] = clean(value);

/* LIVE SUMMARY */
document.getElementById("summary").innerHTML =
Object.entries(data)
.map(([k,v])=>`- ${k}: ${v || "❌ EMPTY"}`)
.join("<br>");

step++;

if(step >= flow.length){
  runEngine();
  return;
}

renderStep();
}

/* ================= ENGINE ================= */

function runEngine(){

let flags = [];
let score = 0;

function add(msg,w){
flags.push({msg,w});
score += w;
}

/* ================= AGENT LOGIC (FIXED) ================= */

const hasAgent =
data.agent_status === "AGENT INVOLVED" &&
data.agent_name &&
data.agent_name !== "N/A";

/* ================= VALIDATION ================= */

if(!data.owner) add("Missing Owner",2);
if(!data.seller) add("Missing Seller",2);
if(!data.buyer && data.transaction !== "PROBATE") add("Missing Buyer",2);

/* identity conflicts */
if(data.owner && data.buyer &&
data.owner.toLowerCase() === data.buyer.toLowerCase()){
add("Owner = Buyer identity overlap",3);
}

if(data.buyer && data.seller &&
data.buyer.toLowerCase() === data.seller.toLowerCase()){
add("Buyer = Seller identity overlap",3);
}

/* structure + agent */
if(data.structure === "Direct" && hasAgent){
add("Agent present in Direct transaction",2);
}

if(data.structure === "Indirect" && !hasAgent){
add("Missing agent in Indirect transaction",3);
}

/* KYC */
if(!data.kyc_name) add("Missing KYC Name",2);
if(!data.kyc_idType) add("Missing ID Type",2);
if(!data.kyc_capacity) add("Missing Capacity",2);

/* classification */
let level = "CLEAN";
let color = "green";

if(score >= 8){
level = "HIGH RISK";
color = "red";
}else if(score >= 3){
level = "WATCH";
color = "orange";
}

/* OUTPUT */
document.getElementById("resultCard").style.display = "block";

document.getElementById("result").innerHTML =
`<span class="badge ${color}">${level}</span><br><br>
Score: ${score}<br><br>
${flags.length ?
flags.map(f=>`- ${f.msg}`).join("<br>")
: "No inconsistencies detected"}`;
}

/* ================= INIT ================= */

renderStep();

</script>

</body>
</html>
