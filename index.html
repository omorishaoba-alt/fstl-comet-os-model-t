<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>FSTL COMET OS</title>

<script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>

<style>
body { font-family: Arial; background:#0b0b0b; color:#fff; padding:20px; }
h1 { color:#00ffd0; }

.card {
    background:#1c1c1c;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
}

input, select, textarea {
    width:100%;
    padding:10px;
    margin:6px 0;
    border:none;
    border-radius:6px;
}

button {
    width:100%;
    padding:12px;
    background:#00ffd0;
    border:none;
    font-weight:bold;
    margin-top:5px;
}

pre {
    background:#111;
    padding:10px;
    border-radius:8px;
    overflow:auto;
}

#report {
    display:none;
    background:#fff;
    color:#000;
    padding:20px;
    margin-top:10px;
}
</style>
</head>

<body>

<h1>FSTL COMET OS — UNIFIED CORE</h1>

<div class="card">
<h3>IDENTITY INPUT</h3>
<input id="name" placeholder="Full Name (REQUIRED)">
<input id="phone" placeholder="Phone (REQUIRED)">
<input id="address" placeholder="Address (REQUIRED)">
<input id="nin" placeholder="NIN">
<input id="bvn" placeholder="BVN">
</div>

<div class="card">
<h3>ASSET INPUT</h3>
<select id="type">
<option>Land</option>
<option>Building</option>
<option>Other</option>
</select>
<input id="location" placeholder="Asset Location (REQUIRED)">
<input id="desc" placeholder="Description">
</div>

<div class="card">
<button onclick="execute()">EXECUTE</button>
<button onclick="verify()">VERIFY</button>
<button onclick="report()">REPORT</button>
</div>

<div class="card">
<h3>OUTPUT</h3>
<pre id="out">READY</pre>
<canvas id="qr"></canvas>
</div>

<div id="report"></div>

<script>

const VERSION = "COMET_OS_FINAL";

/* VALIDATION */
function validate(i,a){
    return !!(i.name && i.phone && i.address && a.location);
}

/* RISK ENGINE */
function risk(i,a){
    let score=0, flags=[];

    if(!i.name){score+=20;flags.push("NAME_MISSING");}
    if(!i.phone){score+=20;flags.push("PHONE_MISSING");}
    if(!i.address){score+=10;flags.push("ADDRESS_MISSING");}
    if(!a.location){score+=20;flags.push("LOCATION_MISSING");}

    if(i.nin && i.bvn && i.nin===i.bvn){
        score+=40;
        flags.push("IDENTITY_COLLISION");
    }

    return {
        score,
        level: score>=60?"HIGH":score>=30?"MEDIUM":"LOW",
        flags
    };
}

/* STATE MACHINE */
function state(valid, level){
    if(!valid) return "REJECTED";
    if(level==="HIGH") return "FLAGGED";
    if(level==="MEDIUM") return "REVIEW";
    return "APPROVED";
}

/* HASH */
async function hash(data){
    const enc = new TextEncoder().encode(data);
    const buf = await crypto.subtle.digest("SHA-256", enc);
    return [...new Uint8Array(buf)]
        .map(x => x.toString(16).padStart(2,'0'))
        .join('');
}

/* STORAGE */
function store(record){
    localStorage.setItem(record.id, JSON.stringify(record));
}

/* QR PAYLOAD (MINIMAL TRUST OBJECT) */
function qrPayload(r){
    return {
        v: VERSION,
        id: r.id,
        h: r.hash,
        s: r.state
    };
}

/* EXECUTE */
async function execute(){

    const identity={
        name:name.value,
        phone:phone.value,
        address:address.value,
        nin:nin.value,
        bvn:bvn.value
    };

    const asset={
        type:type.value,
        location:location.value,
        desc:desc.value
    };

    if(!validate(identity,asset)){
        out.innerText="INVALID INPUT";
        return;
    }

    const r=risk(identity,asset);
    const st=state(true,r.level);

    const payload={
        version:VERSION,
        identity,
        asset,
        risk:r,
        state:st
    };

    const canon=JSON.stringify(payload);
    const h=await hash(canon);

    const record={
        id:Date.now(),
        ...payload,
        hash:h,
        timestamp:new Date().toISOString()
    };

    store(record);
    window.current=record;

    QRCode.toCanvas(document.getElementById("qr"), JSON.stringify(qrPayload(record)));

    out.innerText =
`STATE: ${st}
RISK: ${r.level}
SCORE: ${r.score}
HASH: ${h}`;
}

/* VERIFY */
async function verify(){

    const rec = JSON.parse(prompt("Paste full record JSON"));

    const canon = JSON.stringify({
        version:rec.version,
        identity:rec.identity,
        asset:rec.asset,
        risk:rec.risk,
        state:rec.state
    });

    const h = await hash(canon);

    out.innerText =
`VALID: ${h === rec.hash}`;
}

/* REPORT */
function report(){

    const r = window.current;
    if(!r){ out.innerText="NO RECORD"; return; }

    document.getElementById("report").style.display="block";

    document.getElementById("report").innerHTML=`
<h2>COMET OS REPORT</h2>

<p><b>ID:</b> ${r.id}</p>
<p><b>TIME:</b> ${r.timestamp}</p>

<h3>IDENTITY</h3>
<p>${r.identity.name} | ${r.identity.phone}</p>
<p>${r.identity.address}</p>

<h3>ASSET</h3>
<p>${r.asset.type} | ${r.asset.location}</p>

<h3>RISK</h3>
<p>${r.risk.level} (${r.risk.score})</p>

<h3>STATE</h3>
<p>${r.state}</p>

<h3>HASH</h3>
<p>${r.hash}</p>

<h3>RULE</h3>
<p>Valid only if SHA-256 recomputation matches stored hash exactly.</p>
`;
}

</script>

</body>
</html>
