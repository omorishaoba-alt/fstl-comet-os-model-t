<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>COMET OS - Persistent Kernel</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:#fff;
}

.screen{display:none;padding:16px;}
.active{display:block;}

.card{
  background:#111c2e;
  padding:14px;
  border-radius:12px;
  margin-top:10px;
}

button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#1e88e5;
  color:#fff;
  font-weight:bold;
}

input,select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
  background:#152238;
  color:#fff;
}

.badge{
  padding:6px 10px;
  border-radius:8px;
  font-weight:bold;
  display:inline-block;
}

.low{background:#2e7d32;}
.mid{background:#f9a825;}
.high{background:#c62828;}

.small{font-size:12px;color:#9fb3c8;}
hr{border:0;border-top:1px solid #223;}
</style>
</head>

<body>

<!-- 0 FRONT -->
<div id="s0" class="screen active">
  <div class="card">
    <h2>COMET OS</h2>
    <p class="small">Persistent Property Verification Kernel</p>
    <button onclick="start()">START SYSTEM</button>
    <button onclick="showHistory()">VIEW HISTORY</button>
  </div>
</div>

<!-- 1 ROLE -->
<div id="s1" class="screen">
  <div class="card">
    <h3>Select Role</h3>
    <button onclick="setRole('OWNER')">Owner</button>
    <button onclick="setRole('BUYER')">Buyer</button>
    <button onclick="setRole('SELLER')">Seller</button>
    <button onclick="setRole('AGENT')">Agent</button>
  </div>
</div>

<!-- 2 ASSET -->
<div id="s2" class="screen">
  <div class="card">
    <h3>Asset</h3>
    <input id="type" placeholder="Property Type"/>
    <input id="location" placeholder="Location"/>
    <select id="condition">
      <option>GOOD</option>
      <option>FAIR</option>
      <option>UNCERTAIN</option>
      <option>DISPUTED</option>
    </select>
    <button onclick="nextAsset()">CONTINUE</button>
  </div>
</div>

<!-- 3 COUNTERPARTY -->
<div id="s3" class="screen">
  <div class="card">
    <h3>Counterparty</h3>
    <input id="cp" placeholder="Name"/>
    <input id="cpRole" placeholder="Role"/>
    <button onclick="process()">RUN VERIFICATION</button>
  </div>
</div>

<!-- 4 RESULT -->
<div id="s4" class="screen">
  <div class="card" id="out"></div>
  <button onclick="reset()">NEW CASE</button>
</div>

<!-- 5 HISTORY -->
<div id="s5" class="screen">
  <div class="card">
    <h3>Transaction History</h3>
    <div id="history"></div>
    <button onclick="back()">BACK</button>
  </div>
</div>

<script>

/* =========================
   CORE STATE (TIR)
========================= */

let TIR = {
  role:"",
  asset:{},
  counterparty:{},
  risk:0,
  decision:"",
  id:null
};

/* =========================
   LOCAL LEDGER (OS MEMORY)
========================= */

let LEDGER = JSON.parse(localStorage.getItem("COMET_LEDGER") || "[]");

/* =========================
   NAVIGATION
========================= */

function show(i){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("s"+i).classList.add("active");
}

function start(){ show(1); }

function setRole(r){
  TIR.role = r;
  show(2);
}

function nextAsset(){
  TIR.asset = {
    type: type.value,
    location: location.value,
    condition: condition.value
  };
  show(3);
}

/* =========================
   ENGINE
========================= */

function process(){

  TIR.counterparty = {
    name: cp.value,
    role: cpRole.value
  };

  let r = 0;

  if(TIR.asset.condition === "DISPUTED") r += 5;
  if(TIR.asset.condition === "UNCERTAIN") r += 3;
  if(!TIR.asset.type) r += 2;
  if(!TIR.counterparty.name) r += 2;

  TIR.risk = r;

  if(r >= 7) TIR.decision = "BLOCKED";
  else if(r >= 3) TIR.decision = "CONDITIONAL";
  else TIR.decision = "APPROVED";

  TIR.id = "TX-" + Date.now();

  /* SAVE TO LEDGER */
  LEDGER.push(JSON.parse(JSON.stringify(TIR)));
  localStorage.setItem("COMET_LEDGER", JSON.stringify(LEDGER));

  let cls = r >= 7 ? "high" : r >= 3 ? "mid" : "low";

  out.innerHTML = `
    <span class="badge ${cls}">${TIR.decision}</span><br><br>

    <b>ID:</b> ${TIR.id}<br>
    <b>Role:</b> ${TIR.role}<br>
    <b>Property:</b> ${TIR.asset.type}<br>
    <b>Location:</b> ${TIR.asset.location}<br>
    <b>Condition:</b> ${TIR.asset.condition}<br><br>

    <b>Risk:</b> ${TIR.risk}
  `;

  show(4);
}

/* =========================
   HISTORY ENGINE
========================= */

function showHistory(){
  let h = document.getElementById("history");

  if(LEDGER.length === 0){
    h.innerHTML = "<p class='small'>No transactions yet.</p>";
  } else {
    h.innerHTML = LEDGER.map(t=>`
      <div class="card">
        <b>${t.id}</b><br>
        ${t.asset.type} - ${t.asset.condition}<br>
        Risk: ${t.risk} | ${t.decision}
      </div>
    `).join("");
  }

  show(5);
}

function back(){ show(0); }

function reset(){ location.reload(); }

</script>

</body>
</html>
