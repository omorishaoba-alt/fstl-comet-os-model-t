<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FSTL COMET OS</title>

<style>
body{
margin:0;
font-family:Arial;
background:#08111f;
color:#fff;
}

.app{
max-width:430px;
margin:0 auto;
height:100vh;
display:flex;
flex-direction:column;
}

.header{
background:#101b2e;
padding:12px;
text-align:center;
}

.title{font-size:16px;font-weight:700}
.sub{font-size:12px;color:#9fb3c8}

.mode{
text-align:center;
padding:8px;
background:#0d1626;
font-size:12px;
}

.screen{
flex:1;
padding:14px;
overflow-y:auto;
}

.card{
background:#101b2e;
padding:14px;
border-radius:12px;
margin-bottom:12px;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
background:#16243b;
color:#fff;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:#1e88e5;
color:#fff;
}

.row{
display:flex;
gap:10px;
}

.row button{flex:1}

.badge{
padding:6px 10px;
border-radius:8px;
font-weight:bold;
display:inline-block;
}

.green{background:#2e7d32}
.orange{background:#f9a825}
.red{background:#c62828}

.section{
margin-top:10px;
padding:10px;
background:#16243b;
border-radius:10px;
font-size:13px;
}

pre{
white-space:pre-wrap;
font-size:11px;
background:#000;
padding:10px;
border-radius:8px;
}

</style>
</head>

<body>

<div class="app">

<div class="header">
<div class="title">FIRST STANDARD TITLE LIMITED</div>
<div class="sub">COMET OS · ENGINE CORE</div>
</div>

<div class="mode" id="mode">BOOTING...</div>

<div class="screen" id="screen"></div>

</div>

<script>

# =========================
# HARD BOOT STATE (NO FAILURE MODE)
# =========================

var OS = null;

function BOOT(){

OS = {
mode:"front",
step:0,
intent:null,

participants:{},
property:{},

risk:{score:0,flags:[],level:"INIT"},
service:null
};

document.getElementById("mode").innerText="MODE: FRONT GATE";

RENDER();
}

# =========================
# INTENTS
# =========================

var INTENTS=[
"Property Verification",
"Sale / Purchase",
"Ownership / Probate",
"Risk Assessment"
];

# =========================
# FLOW
# =========================

var FLOW=[
{key:"role",label:"Role",type:"select",options:["Owner","Buyer","Seller","Agent","Tenant","Institution"]},
{key:"id_type",label:"ID Type",type:"select",options:["NIN","Passport","Voter","Driver"]},
{key:"id_number",label:"ID Number",type:"text"},
{key:"phone",label:"Phone",type:"text"},

{key:"type",label:"Property Type",type:"select",options:["Land","Building","Commercial"]},
{key:"location",label:"Location",type:"text"},
{key:"ref",label:"Property Ref",type:"text"},

{key:"control",label:"Ownership Control",type:"select",options:["Owner","Agent","Family","Unknown"]},
{key:"occupancy",label:"Occupancy",type:"select",options:["VACANT","TENANTED","OWNER OCCUPIED","UNKNOWN"]},
{key:"rent",label:"Rent Status",type:"select",options:["PAYING","NOT PAYING","UNKNOWN"]}
];

# =========================
# ENGINE
# =========================

function ENGINE(){

var score=0;
var flags=[];

if(!OS.participants.id_number){score+=4;flags.push("Missing ID");}
if(!OS.participants.phone){score+=2;flags.push("Missing Phone");}

if(!OS.property.ref){score+=4;flags.push("Missing Property Ref");}
if(OS.property.control==="Unknown"){score+=2;flags.push("Ownership Unclear");}

if(OS.property.occupancy==="TENANTED" &&
OS.property.rent==="NOT PAYING"){
score+=3;
flags.push("Tenant Conflict");
}

var level="CLEAN";
if(score>=8)level="HIGH RISK";
else if(score>=4)level="WATCH";

return {score:score,flags:flags,level:level};
}

# =========================
# ROUTER
# =========================

function ROUTER(r){

if(r.level==="HIGH RISK")return"RISK MANAGEMENT";
if(OS.intent==="Ownership / Probate")return"PROBATE STRUCTURING";
if(OS.intent==="Property Verification")return"ASSET VERIFICATION";
return"STANDARD TRANSACTION";
}

# =========================
# FLOW CONTROL
# =========================

function START(){
OS.intent = document.getElementById("intent").value;
OS.mode="flow";
RENDER();
}

function NEXT(){

var v=document.getElementById("input").value;
var k=FLOW[OS.step].key;

if(!OS.participants)OS.participants={};
if(!OS.property)OS.property={};

if(OS.participants[k]!==undefined || k==="role" || k==="id_type" || k==="id_number" || k==="phone"){
OS.participants[k]=v;
}else{
OS.property[k]=v;
}

OS.step++;
RENDER();
}

function BACK(){
if(OS.step>0)OS.step--;
RENDER();
}

# =========================
# EXECUTION
# =========================

function RUN(){

var r=ENGINE();

OS.risk=r;
OS.service=ROUTER(r);

OS.mode="output";

RENDER();
}

# =========================
# RENDER ENGINE (HARD SAFE)
# =========================

function RENDER(){

var screen=document.getElementById("screen");
screen.innerHTML="";

if(OS.mode==="front"){

screen.innerHTML=
"<div class='card'>"+
"<b>COMET OS ENTRY</b><br><br>"+
"Select Intent<br>"+
"<select id='intent'>"+
INTENTS.map(function(i){return "<option>"+i+"</option>";}).join("")+
"</select>"+
"<button onclick='START()'>ENTER SYSTEM</button>"+
"</div>";

return;
}

if(OS.mode==="flow"){

if(OS.step>=FLOW.length){
RUN();
return;
}

var f=FLOW[OS.step];

var html="<div class='card'><b>"+f.label+"</b>";

if(f.type==="select"){
html+="<select id='input'>";
for(var i=0;i<f.options.length;i++){
html+="<option>"+f.options[i]+"</option>";
}
html+="</select>";
}else{
html+="<input id='input' />";
}

html+=
"<div class='row'>"+
(OS.step>0?"<button onclick='BACK()'>Back</button>":"")+
"<button onclick='NEXT()'>Next</button>"+
"</div></div>";

screen.innerHTML=html;

return;
}

if(OS.mode==="output"){

var r=OS.risk;

var color="green";
if(r.level==="WATCH")color="orange";
if(r.level==="HIGH RISK")color="red";

screen.innerHTML=
"<div class='card'>"+
"<b>CASE COMPLETE</b><br><br>"+
"Intent: "+OS.intent+"<br>"+
"Service: "+OS.service+"<br><br>"+
"<span class='badge "+color+"'>"+r.level+"</span><br><br>"+
"Score: "+r.score+"<br><br>"+
"<b>Flags</b><br>"+
(r.flags.length?r.flags.join("<br>"):"None")+
"<div class='section'>"+
"<b>CASE FILE</b>"+
"<pre>"+JSON.stringify(OS,null,2)+"</pre>"+
"</div></div>"+
"<button onclick='location.reload()'>NEW CASE</button>";

return;
}
}

# =========================
# HARD BOOT LOCK
# =========================

window.onload = function(){
BOOT();
};

</script>

</body>
</html>
