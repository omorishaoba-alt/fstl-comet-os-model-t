<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FSTL COMET OS</title>

<style>
html,body{
margin:0;
padding:0;
font-family:Arial;
background:#08111f;
color:#fff;
overflow-x:hidden;
}

.app{
max-width:430px;
margin:0 auto;
height:100vh;
display:flex;
flex-direction:column;
}

.header{
background:#101b2e;
padding:12px;
text-align:center;
}

.title{font-size:16px;font-weight:700}
.sub{font-size:12px;color:#9fb3c8}

.modebar{
padding:8px;
font-size:12px;
text-align:center;
background:#0d1626;
}

.screen{
flex:1;
padding:14px;
overflow-y:auto;
}

.card{
background:#101b2e;
padding:14px;
border-radius:12px;
margin-bottom:12px;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
background:#16243b;
color:#fff;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:#1e88e5;
color:#fff;
}

.row{
display:flex;
gap:10px;
}

.row button{flex:1}

.badge{
padding:6px 10px;
border-radius:8px;
font-weight:bold;
display:inline-block;
}

.green{background:#2e7d32}
.orange{background:#f9a825}
.red{background:#c62828}

.section{
margin-top:10px;
padding:10px;
background:#16243b;
border-radius:10px;
font-size:13px;
}

pre{
white-space:pre-wrap;
font-size:11px;
background:#000;
padding:10px;
border-radius:8px;
}

</style>
</head>

<body>

<div class="app">

<div class="header">
<div class="title">FIRST STANDARD TITLE LIMITED</div>
<div class="sub">COMET OS · Transaction Intelligence System</div>
</div>

<div class="modebar" id="modebar">
MODE: FRONT GATE
</div>

<div class="screen" id="app"></div>

</div>

<script>

# =========================
# SYSTEM STATE
# =========================

const OS = {
case_id:"CASE-"+Date.now(),
mode:"front",
step:0,

intent:null,

participants:{
role:null,
id_type:null,
id_number:null,
phone:null
},

property:{
type:null,
location:null,
ref:null,
control:null,
occupancy:null,
rent:null
},

risk:{
score:0,
flags:[],
level:"INIT"
},

service:null
};

# =========================
# INTENT GATE
# =========================

const INTENTS=[
"Property Verification",
"Sale / Purchase",
"Ownership / Probate",
"Risk Assessment"
];

# =========================
# FLOW
# =========================

const FLOW=[
{key:"role",label:"Role",type:"select",options:["Owner","Buyer","Seller","Agent","Tenant","Institution"]},
{key:"id_type",label:"ID Type",type:"select",options:["NIN","Passport","Voter","Driver"]},
{key:"id_number",label:"ID Number",type:"text"},
{key:"phone",label:"Phone",type:"text"},

{key:"type",label:"Property Type",type:"select",options:["Land","Building","Commercial"]},
{key:"location",label:"Location",type:"text"},
{key:"ref",label:"Property Reference",type:"text"},

{key:"control",label:"Ownership Control",type:"select",options:["Owner","Agent","Family","Unknown"]},
{key:"occupancy",label:"Occupancy",type:"select",options:["VACANT","TENANTED","OWNER OCCUPIED","UNKNOWN"]},
{key:"rent",label:"Rent Status",type:"select",options:["PAYING","NOT PAYING","UNKNOWN"]}
];

# =========================
# ENGINE
# =========================

function ENGINE(){

let score=0;
let flags=[];

if(!OS.participants.id_number){score+=4;flags.push("Missing ID");}
if(!OS.participants.phone){score+=2;flags.push("Missing Phone");}

if(!OS.property.ref){score+=4;flags.push("Missing Property Reference");}
if(OS.property.control==="Unknown"){score+=2;flags.push("Ownership Unclear");}

if(OS.property.occupancy==="TENANTED" &&
OS.property.rent==="NOT PAYING"){
score+=3;
flags.push("Tenant Conflict");
}

let level="CLEAN";

if(score>=8)level="HIGH RISK";
else if(score>=4)level="WATCH";

return{score,flags,level};
}

# =========================
# ROUTER
# =========================

function ROUTE(risk){

if(risk.level==="HIGH RISK")return"RISK MANAGEMENT";
if(OS.intent==="Ownership / Probate")return"PROBATE STRUCTURING";
if(OS.intent==="Property Verification")return"ASSET VERIFICATION";
return"STANDARD TRANSACTION";
}

# =========================
# EXECUTION
# =========================

function RUN(){

let risk=ENGINE();

OS.risk=risk;
OS.service=ROUTE(risk);

OS.mode="output";

render();
}

# =========================
# UI MODE INDICATOR
# =========================

function setMode(text){
document.getElementById("modebar").innerText="MODE: "+text;
}

# =========================
# RENDER
# =========================

function render(){

let app=document.getElementById("app");
app.innerHTML="";

if(OS.mode==="front"){
setMode("FRONT GATE");

app.innerHTML=`
<div class="card">

<b>Select Intent</b>

<select id="input">
${INTENTS.map(i=>`<option>${i}</option>`).join("")}
</select>

<button onclick="start()">Enter OS</button>

</div>`;
return;
}

if(OS.mode==="flow"){
setMode("ACTIVE PROCESSING");

if(OS.step>=FLOW.length){
RUN();
return;
}

let f=FLOW[OS.step];
let val=OS.participants[f.key]||OS.property[f.key]||"";

let html=`<div class="card"><b>${f.label}</b>`;

if(f.type==="select"){
html+=`<select id="input">`;
f.options.forEach(o=>{
html+=`<option ${o===val?"selected":""}>${o}</option>`;
});
html+=`</select>`;
}else{
html+=`<input id="input" value="${val}"/>`;
}

html+=`
<div class="row">
${OS.step>0?`<button onclick="back()">Back</button>`:""}
<button onclick="next()">Next</button>
</div>
</div>`;

app.innerHTML=html;
return;
}

if(OS.mode==="output"){

let r=OS.risk;

let color=r.level==="HIGH RISK"?"red":
r.level==="WATCH"?"orange":"green";

setMode("CASE FINALIZED");

app.innerHTML=`

<div class="card">

<b>CASE COMPLETE</b><br><br>

ID: ${OS.case_id}<br>
Intent: ${OS.intent}<br><br>

<span class="badge ${color}">${r.level}</span><br><br>

Score: ${r.score}<br>
Service: ${OS.service}<br><br>

<b>Flags</b><br>
${r.flags.length?r.flags.join("<br>"):"None"}

<div class="section">
<b>CASE FILE</b>
<pre>${JSON.stringify(OS,null,2)}</pre>
</div>

</div>

<button onclick="location.reload()">New Case</button>

`;
}
}

# =========================
# NAVIGATION
# =========================

function start(){
OS.intent=document.getElementById("input").value;
OS.mode="flow";
render();
}

function next(){
let v=document.getElementById("input").value;
let k=FLOW[OS.step].key;

if(k in OS.participants){
OS.participants[k]=v;
}else{
OS.property[k]=v;
}

OS.step++;
render();
}

function back(){
if(OS.step>0)OS.step--;
render();
}

/* INIT */
render();

</script>

</body>
</html>
