<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>COMET OS</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:#fff;
}

.screen{display:none;padding:16px;}
.active{display:block;}

.card{
  background:#111c2e;
  padding:14px;
  border-radius:12px;
  margin-top:10px;
}

button{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#1e88e5;
  color:#fff;
  font-weight:bold;
}

input,select{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:8px;
  border:none;
  background:#152238;
  color:#fff;
}

.badge{
  padding:6px 10px;
  border-radius:8px;
  font-weight:bold;
  display:inline-block;
}

.low{background:#2e7d32;}
.mid{background:#f9a825;}
.high{background:#c62828;}

.small{font-size:12px;color:#9fb3c8;}
</style>
</head>

<body>

<!-- 0 -->
<div id="s0" class="screen active">
  <div class="card">
    <h2>COMET OS</h2>
    <p class="small">Property Verification System</p>
    <button onclick="next()">START</button>
  </div>
</div>

<!-- 1 -->
<div id="s1" class="screen">
  <div class="card">
    <h3>Select Role</h3>
    <button onclick="role('OWNER')">Owner</button>
    <button onclick="role('BUYER')">Buyer</button>
    <button onclick="role('SELLER')">Seller</button>
    <button onclick="role('AGENT')">Agent</button>
  </div>
</div>

<!-- 2 -->
<div id="s2" class="screen">
  <div class="card">
    <h3>Asset</h3>
    <input id="type" placeholder="Property Type">
    <input id="location" placeholder="Location">
    <select id="condition">
      <option>GOOD</option>
      <option>FAIR</option>
      <option>UNCERTAIN</option>
      <option>DISPUTED</option>
    </select>
    <button onclick="asset()">NEXT</button>
  </div>
</div>

<!-- 3 -->
<div id="s3" class="screen">
  <div class="card">
    <h3>Counterparty</h3>
    <input id="cp" placeholder="Name">
    <input id="cpRole" placeholder="Role">
    <button onclick="run()">PROCESS</button>
  </div>
</div>

<!-- 4 -->
<div id="s4" class="screen">
  <div class="card" id="out"></div>
  <button onclick="location.reload()">NEW CASE</button>
</div>

<script>

let TIR = {
  stage:0,
  role:"",
  asset:{},
  counterparty:{},
  risk:0,
  decision:""
};

function show(i){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById("s"+i).classList.add("active");
}

function next(){
  TIR.stage++;
  show(TIR.stage);
}

function role(r){
  TIR.role = r;
  next();
}

function asset(){
  TIR.asset = {
    type: type.value,
    location: location.value,
    condition: condition.value
  };
  next();
}

function run(){

  TIR.counterparty = {
    name: cp.value,
    role: cpRole.value
  };

  let r = 0;

  if(TIR.asset.condition === "DISPUTED") r += 5;
  if(TIR.asset.condition === "UNCERTAIN") r += 3;
  if(!TIR.asset.type) r += 2;
  if(!TIR.counterparty.name) r += 2;

  TIR.risk = r;

  if(r >= 7){
    TIR.decision = "BLOCKED";
  } else if(r >= 3){
    TIR.decision = "CONDITIONAL";
  } else {
    TIR.decision = "APPROVED";
  }

  let cls = r >= 7 ? "high" : r >= 3 ? "mid" : "low";

  out.innerHTML = `
    <span class="badge ${cls}">${TIR.decision}</span><br><br>

    <b>Role:</b> ${TIR.role}<br>
    <b>Asset:</b> ${TIR.asset.type}<br>
    <b>Location:</b> ${TIR.asset.location}<br>
    <b>Condition:</b> ${TIR.asset.condition}<br><br>

    <b>Risk Score:</b> ${TIR.risk}<br><br>

    <p class="small">Caveat Emptor: informational decision output only.</p>
  `;

  show(4);
}

</script>

</body>
</html>
