<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>FSTL COMET OS</title>

<style>
html,body{
margin:0;
padding:0;
background:#08111f;
color:#fff;
font-family:Arial;
}

.app{
max-width:440px;
margin:0 auto;
height:100vh;
display:flex;
flex-direction:column;
}

.header{
background:#101b2e;
padding:12px;
text-align:center;
}

.title{font-size:16px;font-weight:700}
.sub{font-size:12px;color:#9fb3c8}

.screen{
flex:1;
padding:14px;
overflow-y:auto;
}

.card{
background:#101b2e;
padding:14px;
border-radius:12px;
margin-bottom:12px;
}

input,select{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
background:#16243b;
color:#fff;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:#1e88e5;
color:#fff;
}

.row{
display:flex;
gap:10px;
}

.row button{flex:1}

.badge{
padding:6px 10px;
border-radius:8px;
font-weight:bold;
display:inline-block;
}

.green{background:#2e7d32}
.orange{background:#f9a825}
.red{background:#c62828}

.section{
margin-top:10px;
padding:10px;
background:#16243b;
border-radius:10px;
font-size:13px;
}

pre{
white-space:pre-wrap;
font-size:11px;
background:#000;
padding:10px;
border-radius:8px;
}

</style>
</head>

<body>

<div class="app">

<div class="header">
<div class="title">FIRST STANDARD TITLE LIMITED</div>
<div class="sub">COMET OS · Transaction Authority Engine</div>
</div>

<div class="screen" id="app"></div>

</div>

<script>

# =========================
# 1. CORE AUTHORITY ENGINE
# =========================

const COMET = {
case_id:"CASE-"+Date.now(),

intent:null,

participants:{
owner:{},
buyer:{},
seller:{},
agent:{},
tenant:{}
},

property:{},

risk:{
score:0,
flags:[],
level:"INIT"
},

decision:{
service:null,
authority:"UNVERIFIED"
}
};

# =========================
# 2. INTENT GATE
# =========================

const INTENTS=[
"Property Verification",
"Sale / Purchase",
"Ownership / Probate",
"Risk Assessment"
];

# =========================
# 3. DATA FLOW
# =========================

const FLOW=[
{key:"role",label:"Active Role",type:"select",options:["Owner","Buyer","Seller","Agent","Tenant","Institution"]},

{key:"id_type",label:"ID Type",type:"select",options:["NIN","Passport","Voter","Driver"]},
{key:"id_number",label:"ID Number",type:"text"},
{key:"phone",label:"Phone",type:"text"},

{key:"property_type",label:"Property Type",type:"select",options:["Land","Building","Commercial"]},
{key:"location",label:"Location",type:"text"},
{key:"ref",label:"Property Reference",type:"text"},

{key:"control",label:"Ownership Control",type:"select",options:["Owner","Agent","Family","Disputed"]},
{key:"occupancy",label:"Occupancy",type:"select",options:["VACANT","TENANTED","OWNER OCCUPIED","UNKNOWN"]},
{key:"rent",label:"Rent Status",type:"select",options:["PAYING","NOT PAYING","UNKNOWN"]}
];

let step=0;
let mode="front";

/* =========================
   4. AUTHORITY ENGINE (CORE TRUTH SYSTEM)
========================= */

function AUTH_ENGINE(){

let score=0;
let flags=[];

/* IDENTITY AUTHORITY */
if(!COMET.participants.id_number){
score+=4;
flags.push("Identity Unverified");
}

if(!COMET.participants.phone){
score+=2;
flags.push("Contact Missing");
}

/* PROPERTY AUTHORITY */
if(!COMET.property.ref){
score+=4;
flags.push("Property Not Registered");
}

if(COMET.property.control==="Disputed"){
score+=3;
flags.push("Ownership Dispute Flag");
}

/* OCCUPANCY AUTHORITY */
if(COMET.property.occupancy==="TENANTED" &&
COMET.property.rent==="NOT PAYING"){
score+=3;
flags.push("Tenant Default Conflict");
}

/* CLASSIFICATION */
let level="CLEARED";

if(score>=8)level="HIGH RISK AUTHORITY LOCK";
else if(score>=4)level="RESTRICTED VALIDATION";

return{score,flags,level};
}

# =========================
# 5. SERVICE AUTHORITY ROUTER
# =========================

function ROUTE_ENGINE(risk){

if(risk.level.includes("HIGH")){
return "RISK MANAGEMENT AUTHORITY";
}

if(COMET.intent==="Ownership / Probate"){
return "PROBATE AUTHORIZATION ENGINE";
}

if(COMET.intent==="Property Verification"){
return "ASSET VERIFICATION AUTHORITY";
}

return "STANDARD TRANSACTION CLEARANCE";
}

# =========================
# 6. EXECUTION ENGINE
# =========================

function EXECUTE(){

let risk=AUTH_ENGINE();

COMET.risk=risk;
COMET.decision.service=ROUTE_ENGINE(risk);
COMET.decision.authority="ASSESSED";

renderResult();
}

# =========================
# 7. UI RENDER ENGINE
# =========================

function render(){

let app=document.getElementById("app");
app.innerHTML="";

if(mode==="front"){

app.innerHTML=`
<div class="card">
<b>Select Intent Authority</b>

<select id="input">
${INTENTS.map(i=>`<option>${i}</option>`).join("")}
</select>

<button onclick="start()">Enter System</button>
</div>`;

return;
}

if(step>=FLOW.length){
EXECUTE();
return;
}

let f=FLOW[step];
let val=COMET.participants[f.key]||COMET.property[f.key]||"";

let html=`<div class="card"><b>${f.label}</b>`;

if(f.type==="select"){
html+=`<select id="input">`;
f.options.forEach(o=>{
html+=`<option ${o===val?"selected":""}>${o}</option>`;
});
html+=`</select>`;
}else{
html+=`<input id="input" value="${val}"/>`;
}

html+=`
<div class="row">
${step>0?`<button onclick="back()">Back</button>`:""}
<button onclick="next()">Next</button>
</div>
</div>`;

app.innerHTML=html;
}

# =========================
# 8. FLOW CONTROL
# =========================

function start(){
COMET.intent=document.getElementById("input").value;
mode="flow";
render();
}

function next(){
let v=document.getElementById("input").value;
let k=FLOW[step].key;

if(k in COMET.participants){
COMET.participants[k]=v;
}else{
COMET.property[k]=v;
}

step++;
render();
}

function back(){
if(step>0)step--;
render();
}

# =========================
# 9. FINAL OUTPUT AUTHORITY FILE
# =========================

function renderResult(){

let app=document.getElementById("app");
let r=COMET.risk;

let color=r.level.includes("HIGH")?"red":
r.level.includes("RESTRICTED")?"orange":"green";

app.innerHTML=`

<div class="card">

<b>COMET OS CASE CLOSED</b><br><br>

Case ID: ${COMET.case_id}<br>
Intent: ${COMET.intent}<br><br>

<span class="badge ${color}">${r.level}</span><br><br>

Score: ${r.score}<br>
Service: ${COMET.decision.service}<br><br>

<b>Flags</b><br>
${r.flags.length?r.flags.join("<br>"):"None"}

<div class="section">
<b>AUTHORITY CASE FILE</b>
<pre>${JSON.stringify(COMET,null,2)}</pre>
</div>

<div class="section">
<b>FSTL SERVICE GATE</b><br><br>
₦25,000 Processing Fee<br>
First Bank Nigeria<br>
2025222557<br><br>

<input id="ref" placeholder="Payment Reference"/>
<button onclick="alert('AUTHORITY LOGGED')">Confirm Authority Payment</button>
</div>

</div>

<button onclick="location.reload()">New Authority Case</button>
`;
}

/* INIT */
render();

</script>

</body>
</html>
