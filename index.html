<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FSTL COMET OS</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:#fff;
}

.card{
background:#111c2e;
padding:16px;
margin:10px;
border-radius:12px;
}

.screen{display:none;padding:10px;}
.active{display:block;}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:#1e88e5;
color:#fff;
font-weight:bold;
}

input{
width:100%;
padding:12px;
margin-top:8px;
border-radius:8px;
border:none;
background:#152238;
color:#fff;
}

.badge{
padding:6px 10px;
border-radius:8px;
font-weight:bold;
display:inline-block;
}

.green{background:#2e7d32;}
.orange{background:#f9a825;}
.red{background:#c62828;}
.blue{background:#1e88e5;}

.small{font-size:12px;color:#9fb3c8;}
.qrbox{background:#fff;padding:10px;border-radius:10px;margin-top:10px;text-align:center;}
hr{border:0;border-top:1px solid #223;margin:10px 0;}
</style>
</head>

<body>

<div class="card">
  <b>FSTL COMET OS (TEST MODE)</b>
</div>

<!-- START -->
<div id="s0" class="screen active">
  <div class="card">
    <h2>COMET OS</h2>
    <button onclick="go('1')">START</button>
  </div>
</div>

<!-- ROLE -->
<div id="s1" class="screen">
  <div class="card">
    <h3>Select Mode</h3>
    <button onclick="setRole('USER')">FREE USER</button>
    <button onclick="setRole('AGENT')">AGENT</button>
    <button onclick="setRole('ADMIN')">ADMIN</button>
    <div id="roleOut"></div>
  </div>
</div>

<!-- CASE -->
<div id="s2" class="screen">
  <div class="card">
    <h3>Create Case</h3>
    <input id="type" placeholder="Property Type"/>
    <input id="location" placeholder="Location"/>
    <input id="owner" placeholder="Owner"/>
    <input id="buyer" placeholder="Buyer"/>
    <input id="seller" placeholder="Seller"/>
    <button onclick="createCase()">CONTINUE</button>
  </div>
</div>

<!-- VERIFICATION -->
<div id="s3" class="screen">
  <div class="card">
    <h3>Verification</h3>

    <label><input type="checkbox" id="v_title"/> Title Verified</label><br>
    <label><input type="checkbox" id="v_id"/> Identity Verified</label><br>
    <label><input type="checkbox" id="v_docs"/> Documents Complete</label><br>

    <hr>

    <label><input type="checkbox" id="r_duplicate"/> Duplicate Case</label><br>
    <label><input type="checkbox" id="r_suspect"/> Suspicious Pattern</label><br>

    <button onclick="runDecision()">RUN DECISION</button>
  </div>
</div>

<!-- QR -->
<div id="s4" class="screen">
  <div class="card">
    <h3>Case QR</h3>
    <div id="qr" class="qrbox"></div>
  </div>
</div>

<!-- RESULT -->
<div id="s5" class="screen">
  <div class="card" id="result"></div>
  <button onclick="resetAll()">NEW CASE</button>
</div>

<script>

/* STATE */
let STATE = {
role:null,
current:null,
ledger:[],
freeCount:0
};

/* NAV */
function go(i){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
document.getElementById("s"+i).classList.add("active");
}

/* ROLE */
function setRole(r){
STATE.role = r;
roleOut.innerHTML = `<span class="badge blue">${r}</span>`;
go('2');
}

/* CREATE CASE */
function createCase(){

if(!type.value || !location.value){
alert("TYPE + LOCATION required");
return;
}

STATE.current = {
id:"CASE-"+Date.now(),
type:type.value,
location:location.value,
owner:owner.value,
buyer:buyer.value,
seller:seller.value
};

go('3');
}

/* DECISION ENGINE */
function runDecision(){

let score = 0;

if(!STATE.current.owner) score += 2;
if(!STATE.current.type) score += 2;
if(!STATE.current.location) score += 2;

let verified =
(v_title.checked ? 2 : 0) +
(v_id.checked ? 2 : 0) +
(v_docs.checked ? 1 : 0);

let risk =
(r_duplicate.checked ? 3 : 0) +
(r_suspect.checked ? 3 : 0);

let finalScore = score + risk - verified;

let decision =
finalScore >= 5 ? "BLOCKED" :
finalScore > 2 ? "CONDITIONAL" :
"APPROVED";

let color =
decision === "APPROVED" ? "green" :
decision === "CONDITIONAL" ? "orange" : "red";

STATE.current.decision = decision;

result.innerHTML = `
<span class="badge ${color}">${decision}</span><br><br>
Case ID: ${STATE.current.id}<br>
Score: ${finalScore}
`;

generateQR();
go('5');
}

/* QR */
function generateQR(){
qr.innerHTML="";
new QRCode(qr,{
text:JSON.stringify(STATE.current),
width:140,
height:140
});
}

/* RESET */
function resetAll(){
STATE.current=null;
go('0');
}

</script>

</body>
</html>
