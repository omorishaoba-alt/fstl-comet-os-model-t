<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSTL COMET OS</title>

<!-- QR + PDF LIBRARIES -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {font-family: Arial; margin:0; background:#f4f6f8;}
.screen {display:none; padding:20px;}
.active {display:block;}
button {width:100%; padding:15px; margin-top:15px; background:#0a2a66; color:#fff; border:none;}
input, textarea, select {width:100%; padding:12px; margin-top:10px;}
.qr {margin:20px auto; width:200px;}
.center {text-align:center;}
.step {font-size:12px; color:#555;}
</style>
</head>

<body>

<!-- LANDING -->
<div id="s1" class="screen active center">
<h2>FSTL COMET OS</h2>
<p>Structured Record System</p>
<button onclick="go('s2')">START</button>
</div>

<!-- FORM -->
<div id="s2" class="screen">
<div class="step">STEP 1 — Identity</div>
<input id="name" placeholder="Full Name">
<input id="bvn" placeholder="BVN">
<input id="nin" placeholder="NIN">
<input id="addr" placeholder="Address">
<button onclick="go('s3')">CONTINUE</button>
</div>

<!-- ASSET -->
<div id="s3" class="screen">
<div class="step">STEP 2 — Asset</div>
<textarea id="asset" placeholder="Property Details"></textarea>
<select id="role">
<option>Owner</option>
<option>Buyer</option>
<option>Tenant</option>
<option>Agent</option>
</select>
<button onclick="go('s4')">CONTINUE</button>
</div>

<!-- CONFIRM -->
<div id="s4" class="screen">
<div class="step">STEP 3 — Confirm</div>
<label><input type="checkbox" id="ok"> Confirm details</label>
<button onclick="activate()">ACTIVATE</button>
</div>

<!-- LIVE -->
<div id="s5" class="screen center">
<div class="step">STEP 4 — System Posting</div>
<p id="status">Posting...</p>
<div id="qrlive" class="qr"></div>
<button id="fin" onclick="finalize()" disabled>FINALIZE</button>
</div>

<!-- FINAL -->
<div id="s6" class="screen center">
<h3>RECORD COMPLETED</h3>
<div id="qrfinal" class="qr"></div>
<p id="rid"></p>
<button onclick="pdf()">DOWNLOAD PDF</button>
</div>

<script>
let r = {};

function go(id){
document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function activate(){
if(!document.getElementById('ok').checked){alert("Confirm first");return;}

r = {
id: "FSTL-"+Date.now(),
name: name.value,
bvn: bvn.value,
nin: nin.value,
addr: addr.value,
asset: asset.value,
role: role.value
};

go('s5');

setTimeout(()=>{status.innerText="Generating QR...";},1000);

setTimeout(()=>{
new QRCode(qrlive,{text:r.id,width:200,height:200});
},2000);

setTimeout(()=>{
status.innerText="Record Active";
fin.disabled=false;
},3000);
}

function finalize(){
go('s6');
rid.innerText=r.id;
new QRCode(qrfinal,{text:r.id,width:200,height:200});
}

function pdf(){
const { jsPDF } = window.jspdf;
let doc = new jsPDF();

doc.text("FSTL COMET OS RECORD",20,20);
doc.text("ID: "+r.id,20,30);
doc.text("Name: "+r.name,20,40);
doc.text("BVN: "+r.bvn,20,50);
doc.text("NIN: "+r.nin,20,60);
doc.text("Address: "+r.addr,20,70);
doc.text("Asset: "+r.asset,20,80);
doc.text("Role: "+r.role,20,90);
doc.text("STATUS: FINALIZED",20,110);

doc.save("FSTL_Record.pdf");
}
</script>

</body>
</html>
