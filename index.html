<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>COMET OS</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0f14;
  color:#fff;
}

.header {
  padding:18px;
  text-align:center;
  background:#111826;
  font-weight:bold;
}

.hero {
  padding:24px;
  text-align:center;
}

.hero p {
  opacity:0.8;
  font-size:14px;
}

.grid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:16px;
}

.card {
  background:#111826;
  padding:16px;
  border-radius:10px;
  text-align:center;
  cursor:pointer;
  transition:0.2s;
}

.card:hover {
  background:#1f6feb;
}

.panel {
  display:none;
  padding:16px;
}

.active {
  display:block;
}

button {
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#1f6feb;
  color:#fff;
  border:none;
  border-radius:8px;
  font-weight:bold;
}

.status {
  margin-top:10px;
  font-size:13px;
  opacity:0.8;
}
</style>
</head>

<body>

<div class="header">COMET OS</div>

<!-- FRONT -->
<div id="home" class="panel active">

  <div class="hero">
    <h2>Property Trust Infrastructure</h2>
    <p>Verification • Risk Control • Certification</p>
  </div>

  <div class="grid">

    <div class="card" onclick="startFlow('VERIFY')">
      START VERIFICATION
    </div>

    <div class="card" onclick="startFlow('STATUS')">
      CHECK STATUS
    </div>

    <div class="card" onclick="startFlow('BANK')">
      BANK DETAILS
    </div>

    <div class="card" onclick="startFlow('REGISTRY')">
      REGISTRY
    </div>

  </div>

</div>

<!-- FLOW SCREEN -->
<div id="flow" class="panel">

  <h3 id="flowTitle"></h3>

  <div class="status" id="flowStatus"></div>

  <button onclick="nextStep()">CONTINUE</button>
  <button onclick="backHome()">BACK</button>

</div>

<script>

// ===============================
// HIDDEN SYSTEM CONTROLLER
// ===============================
let currentFlow = null;
let flowStage = 0;

function startFlow(type) {

  currentFlow = type;
  flowStage = 0;

  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('flow').classList.add('active');

  if (type === 'VERIFY') {
    document.getElementById('flowTitle').innerText = "Verification Initiated";
  }

  if (type === 'STATUS') {
    document.getElementById('flowTitle').innerText = "Transaction Lookup";
  }

  if (type === 'BANK') {
    document.getElementById('flowTitle').innerText = "Bank Payment Instructions";
  }

  if (type === 'REGISTRY') {
    document.getElementById('flowTitle').innerText = "Registry Access";
  }

  updateFlow();
}

// ===============================
// FLOW ENGINE (HIDDEN LOGIC)
// ===============================
function updateFlow() {

  const status = document.getElementById('flowStatus');

  if (currentFlow === 'VERIFY') {

    if (flowStage === 0) {
      status.innerText = "Initializing SPCR transaction...";
    }

    if (flowStage === 1) {
      status.innerText = "Generating TX-ID and risk profile...";
    }

    if (flowStage === 2) {
      status.innerText = "Payment instruction prepared (bank transfer mode)";
    }

    if (flowStage === 3) {
      status.innerText = "Awaiting bank confirmation (reference matching)";
    }

  }

  if (currentFlow === 'STATUS') {

    if (flowStage === 0) {
      status.innerText = "Scanning registry ledger...";
    }

    if (flowStage === 1) {
      status.innerText = "Matching transaction records...";
    }

  }

  if (currentFlow === 'BANK') {

    status.innerHTML =
      "Bank: First Bank Nigeria<br>" +
      "Account: 2025222557<br>" +
      "Name: First Standard Title Limited<br><br>" +
      "Use TX-ID as payment reference";

  }

  if (currentFlow === 'REGISTRY') {

    if (flowStage === 0) {
      status.innerText = "Accessing verified transaction ledger...";
    }

    if (flowStage === 1) {
      status.innerText = "Filtering certified records...";
    }
  }
}

// ===============================
// STEP PROGRESSION
// ===============================
function nextStep() {

  flowStage++;

  if (flowStage > 3) flowStage = 3;

  updateFlow();
}

// ===============================
// NAV BACK
// ===============================
function backHome() {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('home').classList.add('active');
}

</script>

</body>
</html>
