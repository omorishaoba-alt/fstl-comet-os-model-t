<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMET OS v1</title>

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#ffffff;
  color:#000000;
}

header{
  padding:16px;
  border-bottom:2px solid #000;
}

h2{
  margin:0;
}

.container{
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:20px;
}

/* CARDS */
.card{
  border:2px solid #000;
  padding:16px;
  border-radius:10px;
  background:#f9f9f9;
}

/* LABEL */
.label{
  font-size:14px;
  font-weight:bold;
  margin-bottom:6px;
}

/* INPUTS — VERY CLEAR */
input, select{
  width:100%;
  padding:18px;
  margin-bottom:12px;
  font-size:18px;
  border:3px solid #000;
  border-radius:8px;
  background:#fff;
  color:#000;
}

/* BUTTONS */
button{
  width:100%;
  padding:18px;
  font-size:18px;
  font-weight:bold;
  border:none;
  border-radius:8px;
  background:#000;
  color:#fff;
}

/* MODE */
.mode{
  display:flex;
  gap:10px;
}

.mode button{
  background:#ccc;
  color:#000;
}

.mode .active{
  background:#000;
  color:#fff;
}

/* OUTPUT */
.result{
  font-size:28px;
  font-weight:bold;
  margin-top:10px;
}

.info{
  font-size:14px;
  margin-top:6px;
}
</style>
</head>

<body>

<header>
  <h2>COMET OS v1</h2>
</header>

<div class="container">

  <!-- MODE -->
  <div class="card">
    <div class="label">MODE</div>
    <div class="mode">
      <button id="privateBtn" class="active">PRIVATE</button>
      <button id="publicBtn">PUBLIC</button>
    </div>
    <div id="modeStatus" class="info">Mode: PRIVATE</div>
  </div>

  <!-- IDENTITY -->
  <div class="card">
    <div class="label">IDENTITY</div>

    <input id="name" placeholder="Full Name">
    <input id="id" placeholder="ID / BVN">
    <input id="phone" placeholder="Phone Number">

    <select id="level">
      <option value="DECLARED">Declared</option>
      <option value="STRUCTURED">Structured</option>
      <option value="ATTESTED">Attested (Agent)</option>
    </select>

    <button id="verifyBtn">VERIFY</button>
    <div id="verifyStatus" class="info">Status: NOT VERIFIED</div>
  </div>

  <!-- ASSET -->
  <div class="card">
    <div class="label">ASSET</div>

    <select id="assetType">
      <option>Land</option>
      <option>Building</option>
      <option>Mortgage</option>
      <option>Other</option>
    </select>

    <input id="location" placeholder="Location">
    <input id="value" type="number" placeholder="Value (₦)">

    <button id="generateBtn">GENERATE VALUE</button>
  </div>

  <!-- OUTPUT -->
  <div class="card">
    <div class="label">OUTPUT</div>

    <div id="liquidity" class="result">₦0</div>
    <div id="tier" class="info"></div>
    <div id="risk" class="info"></div>
    <div id="status" class="info"></div>
  </div>

</div>

<script>

const state = {
  mode: "PRIVATE",
  verified: false,
  level: "DECLARED"
};

/* MODE */
const privateBtn = document.getElementById("privateBtn");
const publicBtn = document.getElementById("publicBtn");
const modeStatus = document.getElementById("modeStatus");

privateBtn.onclick = () => setMode("PRIVATE");
publicBtn.onclick = () => setMode("PUBLIC");

function setMode(mode){
  state.mode = mode;

  privateBtn.classList.remove("active");
  publicBtn.classList.remove("active");

  if(mode === "PRIVATE") privateBtn.classList.add("active");
  else publicBtn.classList.add("active");

  modeStatus.innerText = "Mode: " + mode;
}

/* VERIFY */
const verifyBtn = document.getElementById("verifyBtn");
const verifyStatus = document.getElementById("verifyStatus");

verifyBtn.onclick = function(){

  const name = document.getElementById("name").value.trim();
  const id = document.getElementById("id").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const level = document.getElementById("level").value;

  if(!name || !id || !phone){
    verifyStatus.innerText = "Status: INCOMPLETE";
    state.verified = false;
    return;
  }

  state.verified = true;
  state.level = level;

  verifyStatus.innerText = "Status: VERIFIED (" + level + ")";
};

/* GENERATE */
const generateBtn = document.getElementById("generateBtn");

generateBtn.onclick = function(){

  if(!state.verified){
    alert("VERIFY FIRST");
    return;
  }

  const value = Number(document.getElementById("value").value);
  const location = document.getElementById("location").value.trim();

  if(!value || !location){
    alert("Enter asset value and location");
    return;
  }

  const liquidity = Math.floor(value * 0.65);

  document.getElementById("liquidity").innerText =
    "₦" + liquidity.toLocaleString();

  let tier =
    liquidity > 20000000 ? "Tier A (Institutional)" :
    liquidity > 5000000 ? "Tier B (Structured)" :
    "Tier C (Entry)";

  let risk =
    state.level === "ATTESTED" ? "LOW RISK" :
    state.level === "STRUCTURED" ? "MEDIUM RISK" :
    "HIGH RISK";

  document.getElementById("tier").innerText = "Tier: " + tier;
  document.getElementById("risk").innerText = "Risk: " + risk;
  document.getElementById("status").innerText = "Mode: " + state.mode;
};

</script>

</body>
</html>
