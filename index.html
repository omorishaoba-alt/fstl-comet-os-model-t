<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSTL COMET OS</title>

<style>
html { font-size:18px; }

body {
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b2a4a;
  color:#fff;
}

.container {
  max-width:520px;
  margin:auto;
  padding:18px;
}

.screen {
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:flex-start;
}

.title {
  font-size:1.7rem;
  font-weight:bold;
  margin-bottom:10px;
}

.card {
  background:#062033;
  padding:16px;
  border-radius:12px;
  margin:12px 0;
  line-height:1.6;
}

input, select {
  width:100%;
  padding:16px;
  margin-top:12px;
  border:none;
  border-radius:8px;
  font-size:17px;
}

button {
  width:100%;
  padding:16px;
  margin-top:12px;
  border:none;
  border-radius:10px;
  font-size:17px;
  font-weight:bold;
  background:#fff;
  color:#0b2a4a;
}
</style>
</head>

<body>
<div class="container" id="app"></div>

<script>

/* ================= STATE ================= */

let state = {
role:"",
nin:"",
employment:0,
contact:0,
residence:0,
income:false,
financial:false,
owner:"",
buyer:"",
property:"",
ownerMatch:false,
valueMatch:false,
result:null
};

let screen="intro";

/* ================= NAV ================= */

function go(s){
screen=s;
render();
}

/* ================= ENGINE ================= */

function run(){

if(!state.nin || state.nin.length < 6){
alert("Enter valid NIN");
return;
}

let score = 0;

score += 15;

score += state.employment;
score += state.contact;
score += state.residence;

if(state.income) score += 10;
if(state.financial) score += 10;

if(state.ownerMatch) score += 10;
if(state.valueMatch) score += 10;

let status="BLOCKED";
if(score>=75) status="VERIFIED";
else if(score>=50) status="FLAGGED";

state.result = {score,status};

screen="result";
render();
}

/* ================= UI ================= */

function render(){

let h="";

/* INTRO */
if(screen==="intro"){
h=`
<div class="screen">

<div class="title">FSTL COMET OS</div>

<div class="card">
Before you pay, rent, or agree — see the full picture.
</div>

<div class="card">
This system helps you understand:
who you are dealing with,
what you are agreeing to,
and the risks involved.
</div>

<button onclick="go('role')">START</button>

</div>`;
}

/* ROLE */
if(screen==="role"){
h=`
<div class="screen">

<div class="title">Who are you?</div>

<button onclick="state.role='Tenant'; go('identity')">Tenant</button>
<button onclick="state.role='Landlord'; go('identity')">Landlord</button>
<button onclick="state.role='Agent'; go('identity')">Agent</button>

</div>`;
}

/* IDENTITY */
if(screen==="identity"){
h=`
<div class="screen">

<div class="title">Let's confirm who you are</div>

<input id="nin" placeholder="Enter your NIN">

<button onclick="
state.nin=document.getElementById('nin').value;
go('stability');
">Continue</button>

</div>`;
}

/* STABILITY */
if(screen==="stability"){
h=`
<div class="screen">

<div class="title">Tell us about your current situation</div>

<select id="emp">
<option value="0">How long have you been working?</option>
<option value="5">< 6 months</option>
<option value="10">6–12 months</option>
<option value="15">1+ years</option>
</select>

<select id="res">
<option value="0">Your living situation</option>
<option value="5">Temporary</option>
<option value="10">Rented</option>
<option value="15">Permanent</option>
</select>

<button onclick="
state.employment=parseInt(emp.value);
state.residence=parseInt(res.value);
go('behavior');
">Continue</button>

</div>`;
}

/* BEHAVIOR */
if(screen==="behavior"){
h=`
<div class="screen">

<div class="title">Financial situation</div>

<select id="inc">
<option value="">Is your income stable?</option>
<option value="true">Yes</option>
<option value="false">No</option>
</select>

<select id="fin">
<option value="">Are you financially independent?</option>
<option value="true">Yes</option>
<option value="false">No</option>
</select>

<button onclick="
state.income=(inc.value==='true');
state.financial=(fin.value==='true');
go('transaction');
">Continue</button>

</div>`;
}

/* TRANSACTION */
if(screen==="transaction"){
h=`
<div class="screen">

<div class="title">About this property deal</div>

<input id="owner" placeholder="Who owns the property?">
<input id="buyer" placeholder="Who is paying or renting?">
<input id="property" placeholder="Describe the property">

<select id="own">
<option value="">Does ownership look correct?</option>
<option value="true">Yes</option>
<option value="false">No</option>
</select>

<select id="valm">
<option value="">Does the price/value make sense?</option>
<option value="true">Yes</option>
<option value="false">No</option>
</select>

<button onclick="
state.owner=owner.value;
state.buyer=buyer.value;
state.property=property.value;
state.ownerMatch=(own.value==='true');
state.valueMatch=(valm.value==='true');
run();
">Check this deal</button>

</div>`;
}

/* RESULT */
if(screen==="result"){
h=`
<div class="screen">

<div class="title">Your Result</div>

<div class="card">
Status: ${state.result.status}<br>
Score: ${state.result.score}/100
</div>

<div class="card">
This gives you a clearer view before you decide.
</div>

<button onclick="location.reload()">Start Again</button>

</div>`;
}

document.getElementById("app").innerHTML=h;
}

/* INIT */
render();

</script>
</body>
</html>
