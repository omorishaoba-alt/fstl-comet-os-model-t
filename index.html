<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>COMET OS</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1424;
color:#eaf2ff;
overflow:hidden;
}

.screen{
display:none;
height:100vh;
padding:18px;
box-sizing:border-box;
}

.active{display:block;}

.card{
background:#121f36;
padding:16px;
border-radius:14px;
margin-top:12px;
border:1px solid #1e3a63;
}

input,select{
width:100%;
padding:14px;
margin-top:10px;
border-radius:10px;
border:0;
background:#0f1b30;
color:#fff;
font-size:16px;
}

button{
width:100%;
padding:14px;
margin-top:12px;
border-radius:12px;
border:0;
background:#1976d2;
color:#fff;
font-weight:700;
font-size:16px;
}

.small{font-size:12px;color:#9fb3c8}

.overlay{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:#000000ee;
display:none;
align-items:center;
justify-content:center;
padding:20px;
box-sizing:border-box;
}

.overlay .box{
background:#121f36;
padding:20px;
border-radius:14px;
width:100%;
}
</style>
</head>

<body>

<!-- ABOUT -->
<div id="s0" class="screen active">
<h2>COMET OS</h2>
<p class="small">KYC-Gated Graph Decision System (Frontend Only)</p>
<button onclick="UI.go(1)">Enter</button>
</div>

<!-- FORM -->
<div id="s1" class="screen">
<h3>Form 1 — Intent</h3>

<input id="name" placeholder="Full Name"/>
<input id="phone" placeholder="Phone"/>
<input id="address" placeholder="Address"/>

<select id="intent">
<option>Sell Property</option>
<option>Rent Property</option>
<option>Verify Property</option>
<option>Ownership Dispute</option>
<option>Mortgage Review</option>
</select>

<button onclick="Engine.init()">Continue</button>
</div>

<!-- STATE -->
<div id="s2" class="screen">
<h3>Execution State</h3>

<div class="card">
<p id="state"></p>
<p class="small" id="risk"></p>
</div>

<button onclick="Engine.next()">Next Step</button>
</div>

<!-- REPORT -->
<div id="s3" class="screen">
<h3>Report</h3>

<div class="card" id="report"></div>

<button onclick="Storage.reset()">New Session</button>
</div>

<!-- KYC -->
<div id="kyc" class="overlay">
<div class="box">
<h3>KYC REQUIRED</h3>

<input id="nin" placeholder="NIN"/>
<input id="bvn" placeholder="BVN"/>

<button onclick="Engine.kycComplete()">Complete KYC</button>
</div>
</div>

<script>

/* =========================
STATE
========================= */
const State = {
step:0,
kyc:false,
risk:0,
flow:[],
graph:{nodes:[]},
sessionId:Date.now()
};

/* =========================
STORAGE
========================= */
const Storage = {

save(){
localStorage.setItem("COMET_OS",JSON.stringify(State));
},

load(){
let d=localStorage.getItem("COMET_OS");
if(d){
Object.assign(State,JSON.parse(d));
}
},

reset(){
localStorage.removeItem("COMET_OS");
location.reload();
}
};

/* =========================
UI
========================= */
const UI = {
go(i){
document.querySelectorAll(".screen")
.forEach(s=>s.classList.remove("active"));
document.getElementById("s"+i).classList.add("active");
}
};

/* =========================
ENGINE
========================= */
const Engine = {

/* INIT */
init(){

State.graph.nodes=[
{name:name.value,type:"USER"},
{phone:phone.value,type:"DIRECT"},
{address:address.value,type:"DIRECT"},
{intent:intent.value,type:"INTENT"}
];

/* INDIRECT INFERENCE */
if(intent.value==="Sell Property"){
State.graph.nodes.push({name:"Registry",type:"INDIRECT"});
State.graph.nodes.push({name:"Title",type:"ASSET"});
}

if(intent.value==="Verify Property"){
State.graph.nodes.push({name:"Authority",type:"INDIRECT"});
State.graph.nodes.push({name:"Documents",type:"ASSET"});
}

this.computeRisk();
this.buildFlow();

UI.go(2);
this.render();
Storage.save();
},

/* RISK ENGINE */
computeRisk(){

let r=0;

State.graph.nodes.forEach(n=>{
if(n.type==="USER")r+=1;
if(n.type==="DIRECT")r+=2;
if(n.type==="INDIRECT")r+=3;
if(n.type==="ASSET")r+=2;
});

State.risk=r;
},

/* FLOW ENGINE */
buildFlow(){

State.flow=["INTENT"];

if(State.risk>8){
State.flow.push("KYC");
State.flow.push("ASSET");
State.flow.push("RISK");
}else{
State.flow.push("ASSET");
State.flow.push("KYC");
State.flow.push("RISK");
}

State.flow.push("REPORT");
State.step=0;
},

/* KYC */
requireKYC(){
kyc.style.display="flex";
},

kycComplete(){

if(!nin.value || !bvn.value){
alert("Incomplete KYC");
return;
}

State.kyc=true;
kyc.style.display="none";

Storage.save();
this.render();
},

/* NEXT STEP */
next(){

let stage=State.flow[State.step];

if(stage==="KYC" && !State.kyc){
this.requireKYC();
return;
}

if(State.step<State.flow.length-1){
State.step++;
}

this.render();

if(State.flow[State.step]==="REPORT"){
this.report();
UI.go(3);
}

Storage.save();
},

/* RENDER */
render(){

document.getElementById("state").innerText=
"STEP: "+State.flow[State.step];

document.getElementById("risk").innerText=
"RISK SCORE: "+State.risk;
},

/* REPORT */
report(){

document.getElementById("report").innerHTML=
`
Intent: ${intent.value}<br/>
Risk: ${State.risk}<br/>
KYC: ${State.kyc ? "Verified":"Pending"}<br/>
Nodes: ${State.graph.nodes.length}
`;
}
};

/* =========================
BOOT
========================= */
Storage.load();

</script>

</body>
</html>
