<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSTL COMET OS – Clean Core</title><script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script><style>
body{margin:0;font-family:Arial;background:#f4f6fb}
.hidden{display:none}

#landing{
height:100vh;
background:#0b4ed7;
color:#fff;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.section{padding:16px}
input{
width:100%;
padding:16px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:16px;
margin-top:14px;
border:none;
border-radius:8px;
font-size:16px;
font-weight:bold;
}

.primary{background:#0b4ed7;color:#fff}

.box{
margin-top:12px;
padding:12px;
border:2px solid #0b4ed7;
border-radius:8px;
display:flex;
gap:10px;
align-items:center;
}
</style></head>
<body><!-- LANDING --><div id="landing">
<h1>FSTL COMET OS</h1>
<p>Property Verification</p>
<button class="primary" onclick="start()">START</button>
</div><!-- FORM --><div id="form" class="section hidden">
<h3>Verification</h3>
<input id="name" placeholder="Full Name">
<input id="nin" placeholder="NIN">
<input id="bvn" placeholder="BVN">
<input id="property" placeholder="Property Description"><div class="box">
<input type="checkbox" id="truth">
<span>I confirm this information is true</span>
</div><button class="primary" onclick="generate()">GENERATE RECORD</button>

</div><!-- OUTPUT --><div id="output" class="section hidden">
<h3>Record Generated</h3>
<div id="qr"></div>
<button class="primary" onclick="downloadPDF()">DOWNLOAD PDF</button>
<button onclick="start()">NEW</button>
</div><script>
const { jsPDF } = window.jspdf;
let record = null;

function show(id){
['landing','form','output'].forEach(x=>document.getElementById(x).classList.add('hidden'));
document.getElementById(id).classList.remove('hidden');
window.scrollTo(0,0);
}

function start(){ show('form'); }

function validate(){
if(!name.value||!nin.value||!bvn.value||!property.value)
return "Complete all fields";
if(!truth.checked) return "Confirm truth";
return null;
}

function generate(){
let v = validate();
if(v) return alert(v);

record = {
ref: Date.now(),
name: name.value,
nin: nin.value,
bvn: bvn.value,
property: property.value,
time: new Date().toISOString()
};

Object.freeze(record);

let q = document.getElementById("qr");
q.innerHTML = "";
new QRCode(q, {
text: JSON.stringify(record),
width: 140,
height: 140
});

show('output');
}

function downloadPDF(){
let doc = new jsPDF();

doc.text("FSTL VERIFICATION RECORD",20,20);
doc.text("REF: " + record.ref,20,40);
doc.text("NAME: " + record.name,20,50);
doc.text("NIN: " + record.nin,20,60);
doc.text("BVN: " + record.bvn,20,70);
doc.text("PROPERTY: " + record.property,20,80);
doc.text("TIME: " + record.time,20,90);

doc.text("IMMUTABLE RECORD",20,110);

doc.save("FSTL_RECORD.pdf");
}
</script></body>
</html>
