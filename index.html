<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FSTL COMET OS</title>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#fff}
.card{margin:10px;padding:14px;background:#111c2e;border-radius:12px}
input,select{width:100%;padding:12px;margin-top:10px;border-radius:8px;border:none;background:#152238;color:#fff}
button{width:100%;padding:14px;margin-top:12px;border:none;border-radius:10px;background:#1e88e5;color:#fff}
.badge{padding:6px 10px;border-radius:8px;font-weight:bold}
.green{background:#2e7d32}
.orange{background:#f9a825}
.red{background:#c62828}
.section{margin-top:14px;padding:10px;background:#152238;border-radius:10px}
.small{font-size:12px;color:#9fb3c8}
canvas{background:#fff;padding:10px;border-radius:10px}
</style>
</head>

<body>

<div class="card">
<b>FIRST STANDARD TITLE LIMITED</b><br>
<span class="small">COMET OS – Verification & Service Engine</span>
</div>

<div class="card" id="app"></div>

<script>

/* =========================
   GLOBAL STATE (LOCKED)
========================= */
let step = 0;

let state = {
case_id: "CASE-" + Date.now(),
data: {},
flags: [],
score: 0,
service: "",
paid: false,
receipt: ""
};

/* =========================
   FLOW (STRUCTURED)
========================= */
const flow = [
{key:"case_type",label:"Transaction Type",type:"select",options:["exchange","probate","verification","dispute"]},
{key:"role",label:"Your Role",type:"select",options:["Owner","Seller","Buyer","Agent"]},

{key:"name",label:"Full Name",type:"text"},
{key:"id",label:"ID Number",type:"text"},
{key:"phone",label:"Phone Number",type:"text"},

{key:"property",label:"Property Type",type:"select",options:["Land","Building","Commercial"]},
{key:"location",label:"Property Location",type:"text"},
{key:"ref",label:"Property Reference ID",type:"text"},

{key:"ownership",label:"Ownership Claim",type:"text"},
{key:"control",label:"Control Status",type:"select",options:["Owner","Agent","Family","Unknown"]},

{key:"occupancy",label:"Occupancy",type:"select",options:["VACANT","TENANTED","UNKNOWN"]},
{key:"rent",label:"Rent Status",type:"select",options:["YES","NO","UNKNOWN"]}
];

/* =========================
   RENDER ENGINE (STABLE)
========================= */
function render(){

const app = document.getElementById("app");
app.innerHTML = "";

if(step >= flow.length){
engine();
return;
}

let f = flow[step];

let html = `<b>${f.label}</b><br>`;

if(f.type === "select"){
html += `<select id="input">`;
f.options.forEach(o=>{
html += `<option value="${o}">${o}</option>`;
});
html += `</select>`;
}else{
html += `<input id="input" type="text"/>`;
}

html += `<button onclick="next()">Continue</button>`;

app.innerHTML = html;
}

/* =========================
   STEP CONTROL
========================= */
function next(){
let input = document.getElementById("input");
if(!input) return;

state.data[flow[step].key] = input.value;

step++;
render();
}

/* =========================
   SERVICE ROUTING
========================= */
function route(score){
if(score >= 7) return "RISK MANAGEMENT";
if(score >= 4) return "ASSET VERIFICATION";
return "FAST SETTLEMENT";
}

/* =========================
   QR GENERATOR (SAFE)
========================= */
function drawQR(text){
let canvas = document.getElementById("qrCanvas");
if(!canvas) return;

let ctx = canvas.getContext("2d");
ctx.fillStyle="#000";
ctx.fillRect(0,0,200,200);

ctx.fillStyle="#fff";

for(let i=0;i<text.length;i++){
let x = (i*7)%180;
let y = Math.floor(i/25)*7;
ctx.fillRect(x,y,5,5);
}
}

/* =========================
   CORE ENGINE
========================= */
function engine(){

const app = document.getElementById("app");
app.innerHTML = "";

let d = state.data;
let score = 0;
let flags = [];

/* IDENTITY */
if(!d.name){score+=2;flags.push("Missing Name");}
if(!d.id){score+=3;flags.push("Missing ID");}
if(!d.phone){score+=2;flags.push("Missing Phone");}

/* PROPERTY */
if(!d.ref){score+=3;flags.push("Missing Property Reference");}
if(d.control==="Unknown"){score+=2;flags.push("Unclear Control");}

/* POSSESSION */
if(d.occupancy==="TENANTED" && d.rent==="NO"){
score+=2;flags.push("Rent Conflict");
}

/* RISK LEVEL */
let level="CLEAN", color="green";
if(score>=7){level="HIGH RISK";color="red";}
else if(score>=4){level="WATCH";color="orange";}

/* SERVICE */
let service = route(score);

/* STORE */
state.score = score;
state.flags = flags;
state.service = service;

/* QR PAYLOAD */
let payload = JSON.stringify({
case_id: state.case_id,
score: score,
status: level,
service: service
});

/* OUTPUT */
app.innerHTML = `
<div id="report">

<b>CASE COMPLETE</b><br><br>

<b>CASE ID:</b> ${state.case_id}<br><br>

<span class="badge ${color}">${level}</span><br><br>

<b>Trust Score:</b> ${score}<br><br>

<b>Service Route:</b><br>${service}<br><br>

<b>Flags:</b><br>${flags.join("<br>") || "None"}<br><br>

<canvas id="qrCanvas" width="200" height="200"></canvas>

<div class="section">
<b>FSTL Service Activation</b><br><br>

Service: ${service}<br>
Fee: ₦25,000<br><br>

Bank: First Bank Nigeria (FBHN PLC)<br>
Account Name: First Standard Limited<br>
Account Number: 2025222557<br><br>

<input id="receipt" placeholder="Enter Payment Reference"/>
<button onclick="confirmPayment()">Confirm Payment</button>
</div>

<div class="section">
<b>FSTL Contact</b><br><br>

Address:<br>
No. 19 Egbor Avenue, GRA, Benin City, Nigeria<br><br>

Phone / WhatsApp:<br>
+2348035888622<br><br>

Email:<br>
fstlsite@gmail.com
</div>

</div>

<button onclick="printPDF()">Export PDF</button>
<button onclick="restart()">New Case</button>
`;

drawQR(payload);
}

/* =========================
   PAYMENT CONFIRM
========================= */
function confirmPayment(){
let ref = document.getElementById("receipt").value;

if(!ref){
alert("Enter payment reference");
return;
}

state.paid = true;
state.receipt = ref;

alert("Payment recorded. Contact FSTL to proceed.");
}

/* =========================
   PDF EXPORT
========================= */
function printPDF(){
window.print();
}

/* =========================
   RESET
========================= */
function restart(){
step = 0;
state = {
case_id: "CASE-" + Date.now(),
data: {},
flags: [],
score: 0,
service: "",
paid: false,
receipt: ""
};
render();
}

/* INIT */
render();

</script>

</body>
</html>
