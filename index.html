<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSTL COMET OS</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
body{margin:0;font-family:'Inter',sans-serif;background:#0a0f1f;color:#e5e7eb}
.screen{display:none;max-width:420px;margin:auto;padding:20px}
.active{display:block}
h1{font-size:20px}
p{font-size:13px;color:#9ca3af}

input{
  width:100%;padding:14px;margin-top:10px;
  border:none;border-radius:10px;background:#111827;color:#fff
}

button{
  width:100%;padding:14px;margin-top:14px;
  border:none;border-radius:12px;
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  color:#fff;font-weight:600
}

.result{
  margin-top:16px;padding:16px;border-radius:12px;background:#111827
}

.accept{color:#22c55e}
.review{color:#f59e0b}
.reject{color:#ef4444}
</style>
</head>

<body>

<!-- COVER -->
<div id="cover" class="screen active">
  <h1>FSTL COMET OS</h1>
  <p>Global Asset Trust Decision System</p>
  <button onclick="go('person')">Start</button>
</div>

<!-- PERSON -->
<div id="person" class="screen">
  <h1>Person Details</h1>
  <input id="name" placeholder="Full Name">
  <input id="pid" placeholder="Participant ID">
  <input id="identity" type="number" placeholder="Identity Strength (0–100)">
  <input id="integrity" type="number" placeholder="Document Integrity (0–100)">
  <button onclick="go('property')">Continue</button>
</div>

<!-- PROPERTY -->
<div id="property" class="screen">
  <h1>Property Details</h1>
  <input id="prop" placeholder="Property ID">
  <input id="title" type="number" placeholder="Title Strength (0–100)">
  <input id="clarity" type="number" placeholder="Ownership Clarity (0–100)">
  <button onclick="run()">Run Correlation</button>
</div>

<!-- RESULT -->
<div id="resultScreen" class="screen">
  <h1>Decision</h1>
  <div id="out" class="result"></div>
  <button onclick="pdf()">Generate Report</button>
</div>

<script>

let R=null;

function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function run(){

  let identity=+document.getElementById('identity').value;
  let integrity=+document.getElementById('integrity').value;
  let title=+document.getElementById('title').value;
  let clarity=+document.getElementById('clarity').value;

  if([identity,integrity,title,clarity].some(v=>isNaN(v))){
    alert("Complete all fields");
    return;
  }

  let score=
  (identity*0.3)+
  (integrity*0.2)+
  (title*0.3)+
  (clarity*0.2);

  let status,cls;

  if(score>=80){status="TRUSTED";cls="accept"}
  else if(score>=50){status="CONDITIONAL";cls="review"}
  else{status="HIGH RISK";cls="reject"}

  let id="COMET-"+Date.now();
  let time=new Date().toLocaleString();

  R={score,status,id,time};

  document.getElementById("out").className="result "+cls;
  document.getElementById("out").innerHTML=
  `<b>${status}</b><br>
   Score: ${score.toFixed(2)}<br>
   Ref: ${id}<br>
   ${time}`;

  go('resultScreen');
}

function pdf(){

  if(!R){alert("Run first");return;}

  let w=window.open();

  w.document.write(`
  <h1>FIRST STANDARD TITLE LIMITED</h1>
  <h2>COMET OS GLOBAL REPORT</h2>
  <p>Reference: ${R.id}</p>
  <p>Date: ${R.time}</p>
  <h3>Decision</h3>
  <p>${R.status}</p>
  <h3>Score</h3>
  <p>${R.score}</p>
  <br><br>
  <p>FSTL</p>
  <p>__________________</p>
  `);

  w.print();
}

</script>

</body>
</html>
