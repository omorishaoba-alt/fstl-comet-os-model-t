<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>COMET OS v1</title><style>
:root{
  --bg:#05070d;
  --card:#0f1424;
  --accent:#00f0ff;
  --text:#eaf2ff;
  --muted:#7f8da3;
}

*{box-sizing:border-box;font-family:system-ui;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);} 
header{padding:18px;border-bottom:1px solid #1b233a;}
h1{font-size:18px;}
.container{padding:16px;display:flex;flex-direction:column;gap:16px;}
.card{background:var(--card);border-radius:16px;padding:16px;border:1px solid #1b233a;}
input, select{
  width:100%;padding:14px;border-radius:12px;border:1px solid #243052;
  background:#0a0f1f;color:var(--text);margin-bottom:10px;
}
button{
  width:100%;padding:14px;border:none;border-radius:12px;
  background:var(--accent);color:#001018;font-weight:700;cursor:pointer;
}
.result{font-size:22px;font-weight:700;color:var(--accent);} 
.small{font-size:12px;color:var(--muted);} 
.mode{display:flex;gap:10px;}
.mode button{flex:1;background:#1b233a;color:var(--text);} 
.mode .active{background:var(--accent);color:#001018;}

.status-box{
  padding:10px;
  border-radius:10px;
  background:#0a0f1f;
  border:1px solid #243052;
  margin-top:8px;
}

</style></head>
<body><header>
  <h1>COMET OS v1</h1>
</header><div class="container">  <!-- MODE -->  <div class="card">
    <div class="small">Mode</div>
    <div class="mode">
      <button id="privateBtn" class="active">PRIVATE</button>
      <button id="publicBtn">PUBLIC</button>
    </div>
    <div class="status-box small" id="modeStatus">Mode: PRIVATE</div>
  </div>  <!-- VERIFY -->  <div class="card">
    <div class="small">Step 1: Identity</div>
    <input id="name" placeholder="Full Name" />
    <input id="id" placeholder="ID / BVN" />
    <input id="phone" placeholder="Phone" />
    <select id="attest">
      <option value="DECLARED">Declared</option>
      <option value="STRUCTURED">Structured</option>
      <option value="ATTESTED">Attested (Agent)</option>
    </select>
    <button id="verifyBtn">VERIFY</button>
    <div class="status-box small" id="verifyStatus">Status: NOT VERIFIED</div>
  </div>  <!-- ASSET -->  <div class="card">
    <div class="small">Step 2: Asset</div>
    <select id="assetType">
      <option>Land</option>
      <option>Building</option>
      <option>Mortgage</option>
      <option>Other</option>
    </select>
    <input id="location" placeholder="Location" />
    <input id="assetValue" type="number" placeholder="Value (₦)" />
    <button id="generateBtn">GENERATE VALUE</button>
  </div>  <!-- OUTPUT -->  <div class="card">
    <div class="small">Output</div>
    <div id="output" class="result">₦0</div>
    <div id="tier" class="small"></div>
    <div id="risk" class="small"></div>
    <div id="finalStatus" class="small"></div>
  </div></div><script>

const state = {
  mode: 'PRIVATE',
  verified: false,
  verificationLevel: 'DECLARED'
};

// MODE SWITCH
const privateBtn = document.getElementById('privateBtn');
const publicBtn = document.getElementById('publicBtn');
const modeStatus = document.getElementById('modeStatus');

privateBtn.onclick = () => setMode('PRIVATE');
publicBtn.onclick = () => setMode('PUBLIC');

function setMode(mode){
  state.mode = mode;

  privateBtn.classList.remove('active');
  publicBtn.classList.remove('active');

  if(mode === 'PRIVATE') privateBtn.classList.add('active');
  else publicBtn.classList.add('active');

  modeStatus.innerText = "Mode: " + mode;
}

// VERIFY
const verifyBtn = document.getElementById('verifyBtn');
const verifyStatus = document.getElementById('verifyStatus');

verifyBtn.onclick = () => {
  const name = document.getElementById('name').value.trim();
  const id = document.getElementById('id').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const attest = document.getElementById('attest').value;

  if(!name || !id || !phone){
    verifyStatus.innerText = "Status: INCOMPLETE";
    state.verified = false;
    return;
  }

  state.verified = true;
  state.verificationLevel = attest;

  verifyStatus.innerText = "Status: VERIFIED (" + attest + ")";
};

// GENERATE
const generateBtn = document.getElementById('generateBtn');

const output = document.getElementById('output');
const tier = document.getElementById('tier');
const risk = document.getElementById('risk');
const finalStatus = document.getElementById('finalStatus');

generateBtn.onclick = () => {
  if(!state.verified){
    alert('VERIFY FIRST');
    return;
  }

  const val = Number(document.getElementById('assetValue').value);
  const location = document.getElementById('location').value.trim();

  if(!val || !location){
    finalStatus.innerText = "Missing asset data";
    return;
  }

  const liquidity = Math.floor(val * 0.65);

  output.innerText = "₦" + liquidity.toLocaleString();

  let tierLevel = liquidity > 20000000 ? "Tier A (Institutional)" :
                  liquidity > 5000000 ? "Tier B (Structured)" :
                  "Tier C (Entry)";

  tier.innerText = tierLevel;

  let riskLevel = state.verificationLevel === 'ATTESTED'
    ? "LOW RISK"
    : state.verificationLevel === 'STRUCTURED'
    ? "MODERATE RISK"
    : "HIGH RISK";

  risk.innerText = "Risk: " + riskLevel;

  finalStatus.innerText = "Processed in " + state.mode + " mode";
};

</script></body>
</html>
