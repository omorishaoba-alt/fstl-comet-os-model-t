<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSTL COMET OS</title>

<style>
html { font-size:18px; }

body {
  margin:0;
  font-family:Arial, sans-serif;
  background:#0b2a4a;
  color:#fff;
}

.container {
  max-width:520px;
  margin:auto;
  padding:16px;
}

.header {
  text-align:center;
  margin-bottom:10px;
}

.header h2 {
  margin:5px 0;
}

.card {
  background:#062033;
  padding:14px;
  border-radius:10px;
  margin-bottom:10px;
}

input, select {
  width:100%;
  padding:14px;
  margin-top:8px;
  border:none;
  border-radius:6px;
  font-size:16px;
}

button {
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  font-size:16px;
  font-weight:bold;
  background:#fff;
  color:#0b2a4a;
}

.status {
  background:#001a2e;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<h2>FSTL COMET OS</h2>
<div>Transaction Clarity System</div>
</div>

<!-- ROLE -->
<div class="card">
<select id="role" onchange="update()">
<option value="">Select your role</option>
<option>Tenant</option>
<option>Landlord</option>
<option>Agent</option>
<option>Buyer</option>
<option>Seller</option>
</select>
</div>

<!-- ABOUT YOU -->
<div class="card">
<b>About You</b>
<input id="nin" placeholder="NIN" oninput="update()">

<select id="employment" onchange="update()">
<option value="0">Work stability</option>
<option value="5">Unstable</option>
<option value="10">Average</option>
<option value="15">Stable</option>
</select>

<select id="residence" onchange="update()">
<option value="0">Living situation</option>
<option value="5">Temporary</option>
<option value="10">Rented</option>
<option value="15">Permanent</option>
</select>
</div>

<!-- FINANCE -->
<div class="card">
<b>Financial Position</b>

<select id="income" onchange="update()">
<option value="0">Income stability</option>
<option value="10">Stable</option>
<option value="0">Unstable</option>
</select>

<select id="financial" onchange="update()">
<option value="0">Financial independence</option>
<option value="10">Independent</option>
<option value="0">Dependent</option>
</select>
</div>

<!-- TRANSACTION -->
<div class="card">
<b>About This Deal</b>

<input id="owner" placeholder="Owner name" oninput="update()">
<input id="party" placeholder="Other party" oninput="update()">
<input id="property" placeholder="Property description" oninput="update()">

<select id="ownerMatch" onchange="update()">
<option value="0">Ownership check</option>
<option value="10">Looks correct</option>
<option value="0">Unclear</option>
</select>

<select id="valueMatch" onchange="update()">
<option value="0">Price/value check</option>
<option value="10">Makes sense</option>
<option value="0">Suspicious</option>
</select>
</div>

<!-- LIVE STATUS -->
<div class="status" id="status">
Status: Waiting for input<br>
Score: 0/100
</div>

<!-- ACTION -->
<button onclick="download()">Download Report</button>

</div>

<script>

function update(){

let score = 0;

let nin = document.getElementById("nin").value;
if(nin.length >= 6) score += 15;

score += parseInt(employment.value || 0);
score += parseInt(residence.value || 0);
score += parseInt(income.value || 0);
score += parseInt(financial.value || 0);
score += parseInt(ownerMatch.value || 0);
score += parseInt(valueMatch.value || 0);

let status = "BLOCKED";
if(score >= 75) status = "VERIFIED";
else if(score >= 50) status = "FLAGGED";

document.getElementById("status").innerHTML =
"Status: " + status + "<br>Score: " + score + "/100";

window.current = {
score,status,
owner:owner.value,
party:party.value,
property:property.value,
nin:nin
};
}

function download(){

let d = window.current || {};

let text = `
FSTL COMET OS REPORT

Status: ${d.status}
Score: ${d.score}/100

Owner: ${d.owner}
Other Party: ${d.party}

Property:
${d.property}

NIN: ${d.nin}
`;

let blob = new Blob([text], {type:"text/plain"});
let url = URL.createObjectURL(blob);

let a = document.createElement("a");
a.href = url;
a.download = "COMET_REPORT.txt";
a.click();

URL.revokeObjectURL(url);
}

</script>

</body>
</html>
