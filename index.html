<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FSTL COMET OS Model-T</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/1.5.3/jspdf.min.js"></script>

<style>
html, body {margin:0;padding:0;height:100%;font-family:Arial;background:#eaf3ff;}

.page {
    min-height:100vh;
    padding:40px;
    display:none;
    flex-direction:column;
    justify-content:center;
}

/* LANDING */
#landing {
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    background:#007BFF;
    color:#fff;
}

/* SYSTEM PAGES */
#bank,#verifyStage,#form,#dashboard{
    display:flex;
    flex-direction:column;
    align-items:stretch;
    background:#fff;
    max-width:650px;
    margin:0 auto;
}

/* INPUTS */
label{margin-top:15px;font-weight:bold;}
input,select{
    width:100%;
    padding:14px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:6px;
}

/* BUTTON */
button{
    width:100%;
    padding:15px;
    margin-top:25px;
    background:#007BFF;
    color:#fff;
    border:none;
    border-radius:6px;
}

/* TABLE */
table{width:100%;border-collapse:collapse;margin-top:20px;}
th,td{border:1px solid #ccc;padding:12px;text-align:center;}
th{background:#007BFF;color:#fff;}
</style>
</head>

<body>

<!-- LANDING -->
<div id="landing" class="page" style="display:flex;">
<h1>FSTL COMET OS Model-T</h1>
<p>Digital Property Verification Platform</p>
<button onclick="startPayment()">START PROCESS</button>
</div>

<!-- PAYMENT -->
<div id="bank" class="page">
<h2>Bank Deposit</h2>
<p>Amount: ₦5000</p>
<p>Account: 1234567890 | First Bank</p>
<p>Reference ID: <span id="ref"></span></p>
<button onclick="confirmPayment()">I HAVE PAID</button>
</div>

<!-- STAGE 2 -->
<div id="verifyStage" class="page">
<h2>Access Granted</h2>
<p>You can now proceed to verification</p>
<button onclick="goForm()">CONTINUE</button>
</div>

<!-- FORM -->
<div id="form" class="page">
<h2>Verification</h2>

<label>Name</label><input id="name">
<label>NIN</label><input id="nin">
<label>BVN</label><input id="bvn">
<label>Phone</label><input id="phone">
<label>Email</label><input id="email">
<label>Property</label><input id="prop">

<h3>Agent (Optional)</h3>
<label>Agent Name</label><input id="agent">

<button onclick="submit()">COMPLETE</button>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="page">
<h2>Dashboard</h2>
<table>
<thead><tr><th>ID</th><th>Property</th><th>Status</th><th>PDF</th></tr></thead>
<tbody id="data"></tbody>
</table>
<button onclick="goHome()">NEW</button>
</div>

<script>
let list=[];
let refId=null;

function startPayment(){
refId=Math.floor(Math.random()*1000000);
document.getElementById("ref").innerText=refId;
landing.style.display="none";
bank.style.display="flex";
}

function confirmPayment(){
bank.style.display="none";
verifyStage.style.display="flex";
}

function goForm(){
verifyStage.style.display="none";
form.style.display="flex";
}

function submit(){
list.push({id:refId,prop:prop.value,status:"Verified"});
form.style.display="none";
render();
dashboard.style.display="flex";
}

function render(){
let out="";
list.forEach(x=>{
out+=`<tr>
<td>${x.id}</td>
<td>${x.prop}</td>
<td>${x.status}</td>
<td><button onclick="pdf(${x.id})">PDF</button></td>
</tr>`;
});
data.innerHTML=out;
}

function pdf(id){
let doc=new jsPDF();
doc.text("FSTL COMET OS",20,40);
doc.text("Verification ID: "+id,20,60);
doc.save("FSTL_"+id+".pdf");
}

function goHome(){
dashboard.style.display="none";
form.style.display="flex";
}
</script>

</body>
</html>
