<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FSTL COMET OS</title>

<style>
html,body{
margin:0;
padding:0;
height:100%;
overflow:hidden;
font-family:Arial;
background:#0b1220;
color:#fff;
}

.app{
height:100vh;
display:flex;
flex-direction:column;
}

.scroll{
flex:1;
overflow-y:auto;
overflow-x:hidden;
}

.card{
background:#111c2e;
padding:14px;
margin:10px;
border-radius:12px;
}

button{
width:100%;
padding:14px;
margin-top:10px;
border:none;
border-radius:10px;
background:#1e88e5;
color:#fff;
font-weight:bold;
}

select,input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:8px;
border:none;
background:#152238;
color:#fff;
}

.small{font-size:12px;color:#9fb3c8}

.badge{
padding:6px 10px;
border-radius:8px;
font-weight:bold;
display:inline-block;
}

.green{background:#2e7d32}
.orange{background:#f9a825}
.red{background:#c62828}
</style>
</head>

<body>

<div class="app">
<div class="scroll">

<div class="card">
<b>COMET OS</b><br>
<span class="small">Identity + Property + Possession Verification Engine</span>
</div>

<div class="card">
<b>Case Summary</b>
<div id="summary">No data captured</div>
</div>

<div class="card" id="questionCard">
<div id="questionText"></div>
<select id="dropdown"></select>
<input id="textInput" style="display:none"/>
<div class="small" id="whyText"></div>
<button onclick="nextStep()">Continue</button>
</div>

<div class="card" id="resultCard" style="display:none">
<div id="result"></div>
</div>

</div>
</div>

<script>

/* STATE */
let step=0;
let data={};
let mode="FLOW";

/* FLOW */
const flow=[

/* IDENTITY */
{key:"role",q:"Who are you?",type:"select",options:["Owner","Buyer","Seller","Agent","Executor"]},
{key:"kyc_name",q:"Your Full Name",type:"text"},
{key:"kyc_idType",q:"ID Type",type:"select",options:["NIN","BVN","PASSPORT","DRIVERS_LICENSE"]},
{key:"kyc_capacity",q:"Capacity",type:"select",options:["OWNER","BUYER","SELLER","AGENT","EXECUTOR"]},

/* PROPERTY */
{key:"property_type",q:"Property Type",type:"select",options:["Land","Building","Commercial","Mixed"]},
{key:"property_location",q:"Property Location",type:"text"},
{key:"property_control",q:"Who controls the property?",type:"select",options:["Owner","Family","Agent","Unknown"]},

/* PARTIES */
{key:"owner",q:"Owner Name",type:"text"},
{key:"seller",q:"Seller Name",type:"text"},
{key:"buyer",q:"Buyer Name",type:"text"},

/* AGENT */
{key:"agent_status",q:"Is there an Agent?",type:"select",options:["NO","YES"]},
{key:"agent_name",q:"Agent Name",type:"select",options:["N/A","Agent A","Agent B","Other"]},

/* TENANTS */
{key:"tenant_status",q:"Is property occupied?",type:"select",options:["VACANT","TENANTED","UNKNOWN"]},
{key:"tenant_count",q:"Number of tenants",type:"select",options:["0","1","2-5","5+"]},
{key:"rent_status",q:"Are tenants paying owner?",type:"select",options:["YES","NO","UNKNOWN"]},

/* STRUCTURE */
{key:"structure",q:"Transaction Structure",type:"select",options:["Direct","Indirect"]}

];

/* UTILS */
function clean(v){
if(!v)return"";
v=v.trim().toUpperCase();
if(v==="NONE"||v==="N/A")return"";
return v;
}

function norm(s){
return(s||"").toLowerCase().replace(/[^a-z0-9]/g,"");
}

/* RENDER */
function renderStep(){
let f=flow[step];

document.getElementById("questionText").innerText=f.q;
document.getElementById("whyText").innerText=f.why||"";

let dd=document.getElementById("dropdown");
let inp=document.getElementById("textInput");

dd.innerHTML="";

if(f.type==="select"){
dd.style.display="block";
inp.style.display="none";

f.options.forEach(o=>{
let opt=document.createElement("option");
opt.value=o;
opt.text=o;
dd.appendChild(opt);
});
}else{
dd.style.display="none";
inp.style.display="block";
inp.value="";
}
}

/* NEXT */
function nextStep(){
if(mode!=="FLOW")return;

let f=flow[step];
let value=(f.type==="select")?document.getElementById("dropdown").value:document.getElementById("textInput").value;

data[f.key]=clean(value);

/* SUMMARY */
document.getElementById("summary").innerHTML=
Object.entries(data).map(([k,v])=>`${k}: ${v||"❌"}`).join("<br>");

step++;

if(step>=flow.length){
runEngine();
return;
}

renderStep();
}

/* ENGINE */
function runEngine(){

mode="RESULT";
document.getElementById("questionCard").style.display="none";

let flags=[];
let score=0;
function add(m,w){flags.push(m);score+=w;}

const hasAgent=data.agent_status==="YES"&&data.agent_name;

/* IDENTITY */
if(!data.kyc_name)add("Missing identity",3);

/* PROPERTY */
if(!data.property_location)add("Missing property location",2);
if(data.property_control==="UNKNOWN")add("Property control unclear",3);

/* PARTY CONSISTENCY */
if(norm(data.owner)===norm(data.buyer))add("Owner equals Buyer",3);
if(norm(data.seller)===norm(data.buyer))add("Seller equals Buyer",3);

/* AGENT */
if(data.structure==="Indirect"&&!hasAgent)add("Indirect without agent",3);
if(data.structure==="Direct"&&hasAgent)add("Agent in direct deal",2);

/* TENANTS */
if(data.tenant_status==="TENANTED"&&data.rent_status==="NO")
add("Tenants not paying owner",3);

if(data.tenant_status==="TENANTED"&&data.property_control==="UNKNOWN")
add("Tenants but control unclear",3);

/* CLASSIFY */
let level="CLEAN",color="green";
if(score>=8){level="HIGH RISK";color="red";}
else if(score>=3){level="WATCH";color="orange";}

/* OUTPUT */
document.getElementById("resultCard").style.display="block";
document.getElementById("result").innerHTML=
`<span class="badge ${color}">${level}</span><br><br>
Score: ${score}<br><br>
${flags.length?flags.join("<br>"):"No inconsistencies"}`;

document.getElementById("resultCard").scrollIntoView({behavior:"smooth"});
}

/* INIT */
renderStep();

</script>

</body>
</html>
